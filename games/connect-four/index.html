<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Four</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#13131f;color:#fff;font-family:Inter,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:12px;user-select:none}
h1{font-size:1.4rem;font-weight:800;color:#7c5cfc}
.info{display:flex;gap:20px;align-items:center;font-size:.85rem}
.turn{display:flex;align-items:center;gap:8px;font-weight:600}
.disc-sm{width:18px;height:18px;border-radius:50%}
.p1c{background:#ff4d6d}
.p2c{background:#fbbf24}
.score{display:flex;gap:20px;font-size:.9rem;color:#9898b8}
.score b{color:#fff;font-weight:700}
.board-wrap{position:relative}
.hover-row{display:flex;height:28px;gap:8px;padding:0 8px;margin-bottom:2px}
.hover-cell{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background .15s}
.hover-cell:hover .disc-sm{transform:scale(1.2)}
.hover-cell .disc-sm{opacity:0;transition:opacity .15s}
.hover-cell.active .disc-sm{opacity:1}
.board{background:#1c1c2e;border-radius:16px;padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px;border:2px solid rgba(124,92,252,.3)}
.cell{width:52px;height:52px;border-radius:50%;background:#13131f;cursor:pointer;transition:background .15s;position:relative}
.cell.p1{background:#ff4d6d;box-shadow:0 0 12px rgba(255,77,109,.4)}
.cell.p2{background:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.4)}
.cell.win-cell{animation:pulse .5s infinite alternate}
@keyframes pulse{to{filter:brightness(1.5)}}
.msg{font-size:1.05rem;font-weight:700;min-height:1.5rem;text-align:center;color:#4ade80}
.msg.draw{color:#9898b8}
.btns{display:flex;gap:10px}
.btn{background:#252538;color:#9898b8;border:1.5px solid rgba(255,255,255,.07);padding:9px 22px;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s}
.btn:hover,.btn.active{background:#7c5cfc;color:#fff;border-color:#7c5cfc}
</style>
</head>
<body>
<h1>Connect Four</h1>
<div class="info">
  <div class="score">
    <span><b id="s1">0</b> <span style="color:#ff4d6d">&#9679;</span></span>
    <span><b id="s2">0</b> <span style="color:#fbbf24">&#9679;</span></span>
  </div>
  <div class="turn" id="turnInfo">
    <div class="disc-sm p1c"></div><span id="turnText">Red's turn</span>
  </div>
</div>
<div class="board-wrap">
  <div class="hover-row" id="hoverRow"></div>
  <div class="board" id="board"></div>
</div>
<div class="msg" id="msg"></div>
<div class="btns">
  <button class="btn active" id="vsAI" onclick="setMode('ai')">vs AI</button>
  <button class="btn" id="vs2P" onclick="setMode('2p')">2 Players</button>
  <button class="btn" onclick="resetGame()">New Game</button>
</div>

<script>
const ROWS=6,COLS=7;
let board,turn,gameOver,scores={1:0,2:0},mode='ai';

function setMode(m){
  mode=m;
  document.getElementById('vsAI').classList.toggle('active',m==='ai');
  document.getElementById('vs2P').classList.toggle('active',m==='2p');
  resetGame();
}

function resetGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  turn=1;gameOver=false;
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='msg';
  render();updateTurnInfo();
}

function render(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell'+(board[r][c]?' p'+board[r][c]:'');
      cell.dataset.col=c;
      cell.addEventListener('click',()=>drop(c));
      el.appendChild(cell);
    }
  }
  const hr=document.getElementById('hoverRow');
  hr.innerHTML='';
  for(let c=0;c<COLS;c++){
    const h=document.createElement('div');
    h.className='hover-cell';
    h.innerHTML=`<div class="disc-sm ${turn===1?'p1c':'p2c'}"></div>`;
    h.addEventListener('mouseenter',()=>h.classList.add('active'));
    h.addEventListener('mouseleave',()=>h.classList.remove('active'));
    h.addEventListener('click',()=>drop(c));
    hr.appendChild(h);
  }
}

function drop(col){
  if(gameOver)return;
  if(mode==='ai'&&turn===2)return;
  doMove(col);
  if(!gameOver&&mode==='ai'&&turn===2){
    setTimeout(aiMove,400);
  }
}

function doMove(col){
  if(gameOver)return;
  const row=getRow(col);
  if(row<0)return;
  board[row][col]=turn;
  const wins=checkWin(row,col,turn);
  if(wins){
    gameOver=true;
    scores[turn]++;
    document.getElementById('s'+turn).textContent=scores[turn];
    document.getElementById('msg').textContent=`${turn===1?'Red':'Yellow'} wins! &#127881;`;
    wins.forEach(([r,c])=>document.querySelector(`.board .cell:nth-child(${r*COLS+c+1})`).classList.add('win-cell'));
    render();highlightWin(wins);return;
  }
  if(board[0].every((_,c)=>board[0][c]!==0)){
    gameOver=true;
    document.getElementById('msg').textContent='Draw!';
    document.getElementById('msg').className='msg draw';
    render();return;
  }
  turn=turn===1?2:1;
  updateTurnInfo();
  render();
}

function highlightWin(cells){
  cells.forEach(([r,c])=>{
    const el=document.querySelector(`#board .cell:nth-child(${r*COLS+c+1})`);
    if(el)el.classList.add('win-cell');
  });
}

function getRow(col){
  for(let r=ROWS-1;r>=0;r--) if(!board[r][col]) return r;
  return -1;
}

function checkWin(row,col,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    const cells=[[row,col]];
    for(let i=1;i<4;i++){const r=row+dr*i,c=col+dc*i;if(r>=0&&r<ROWS&&c>=0&&c<COLS&&board[r][c]===p)cells.push([r,c]);else break;}
    for(let i=1;i<4;i++){const r=row-dr*i,c=col-dc*i;if(r>=0&&r<ROWS&&c>=0&&c<COLS&&board[r][c]===p)cells.push([r,c]);else break;}
    if(cells.length>=4)return cells.slice(0,4);
  }
  return null;
}

function aiMove(){
  // Try to win, then block, then pick best
  for(let c=0;c<COLS;c++){const r=getRow(c);if(r>=0){board[r][c]=2;if(checkWin(r,c,2)){board[r][c]=0;doMove(c);return;}board[r][c]=0;}}
  for(let c=0;c<COLS;c++){const r=getRow(c);if(r>=0){board[r][c]=1;if(checkWin(r,c,1)){board[r][c]=0;doMove(c);return;}board[r][c]=0;}}
  // Score each column
  const scores=[0,0,0,0,0,0,0];
  const preferred=[3,2,4,1,5,0,6];
  for(const c of preferred){if(getRow(c)>=0){doMove(c);return;}}
}

function updateTurnInfo(){
  document.getElementById('turnInfo').innerHTML=`<div class="disc-sm ${turn===1?'p1c':'p2c'}"></div><span>${turn===1?'Red':'Yellow'}'s turn${mode==='ai'&&turn===2?' (AI)':''}</span>`;
}

resetGame();
</script>
</body>
</html>
