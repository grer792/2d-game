<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<style>
:root{--bg:#13131f;--bg2:#1c1c2e;--bg3:#252538;--bg4:#2e2e45;--accent:#7c5cfc;--accent-h:#6a4de0;--text:#fff;--text2:#9898b8;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0e0e1a;font-family:Inter,system-ui,sans-serif;color:#fff;overflow:hidden;}
button{font:inherit;cursor:pointer;border:none;}

/* ── Overlay / Card ── */
.ov{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:16px;}
.ov.open{display:flex;}
#menuOv{background:rgba(13,13,25,.72);backdrop-filter:blur(2px);}
#winOv{background:rgba(13,13,25,.92);backdrop-filter:blur(6px);}

.menu-card{background:rgba(22,22,36,.97);border:1px solid rgba(124,92,252,.25);border-radius:22px;padding:28px 26px 22px;display:flex;flex-direction:column;align-items:center;gap:14px;width:min(340px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 48px rgba(124,92,252,.07);}
.game-title{font-size:clamp(1.9rem,7vw,2.8rem);font-weight:950;letter-spacing:-.03em;}
.game-title span{color:var(--accent);}
.game-sub{font-size:.8rem;color:var(--text2);margin-top:-8px;}

.scat{width:100%;display:flex;flex-direction:column;gap:6px;}
.scat-label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);}
.scat-row{display:flex;gap:6px;}
.sopt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 4px;border-radius:12px;background:var(--bg3);border:2px solid var(--border);cursor:pointer;transition:all .13s;}
.sopt:hover{border-color:rgba(124,92,252,.5);}
.sopt.on{border-color:var(--accent);background:rgba(124,92,252,.13);}
.sopt-ico{font-size:1.4rem;line-height:1.2;}
.sopt-lbl{font-size:.68rem;font-weight:700;color:var(--text2);}
.sopt.on .sopt-lbl{color:var(--text);}

.gbtn{width:100%;padding:14px 20px;border-radius:12px;font-size:1rem;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .15s,transform .1s;}
.gbtn:active{transform:scale(.97);}
.gbtn.accent{background:var(--accent);color:#fff;}
.gbtn.accent:hover{background:var(--accent-h);}
.gbtn.ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
.gbtn.ghost:hover{background:var(--bg4);color:var(--text);}
.hint{font-size:.69rem;color:var(--text2);text-align:center;}

/* ── Game area ── */
#gameArea{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#gameArea.show{display:flex;}

/* HUD */
.hud{display:flex;gap:20px;}
.hud-item{background:rgba(22,22,36,.9);border:1px solid var(--border);border-radius:12px;padding:8px 16px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hud-val{font-size:1.2rem;font-weight:800;color:#fff;}
.hud-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);}
.hud-item.best .hud-val{color:var(--accent);}

/* Grid */
#grid{display:grid;gap:8px;}
.card{border-radius:12px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .25s ease;will-change:transform;}
.card.flipped,.card.matched{transform:rotateY(180deg);}
.card.matched .back{background:rgba(124,92,252,.15);border-color:rgba(124,92,252,.45);}
.card-face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.front{background:var(--bg3);border:1.5px solid var(--border);}
.front::after{content:'?';font-size:1.3rem;font-weight:800;color:rgba(255,255,255,.15);}
.back{background:var(--bg2);border:1.5px solid rgba(124,92,252,.3);transform:rotateY(180deg);}

/* Win card */
.win-card{background:rgba(22,22,36,.97);border:1px solid rgba(124,92,252,.25);border-radius:22px;padding:28px 26px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:min(320px,90vw);box-shadow:0 20px 56px rgba(0,0,0,.5);}
.win-card h2{font-size:2.2rem;font-weight:950;background:linear-gradient(135deg,#7c5cfc,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-row{display:flex;gap:20px;}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 18px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.stat-box b{font-size:1.4rem;font-weight:800;color:var(--accent);}
.stat-box span{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.new-best{font-size:.8rem;color:#4ade80;font-weight:700;}

#volWrap{position:absolute;bottom:10px;right:14px;display:flex;align-items:center;gap:6px;opacity:.45;transition:opacity .2s;z-index:30;}
#volWrap:hover{opacity:1;}
#volWrap label{font-size:.68rem;color:var(--text2);}
#volSlider{width:68px;accent-color:var(--accent);}
</style>
</head>
<body>

<!-- Menu -->
<div class="ov open" id="menuOv">
  <div class="menu-card">
    <div class="game-title">Memory <span>Match</span></div>
    <div class="game-sub">Find all matching pairs</div>
    <div class="scat">
      <div class="scat-label">Grid size</div>
      <div class="scat-row">
        <div class="sopt on" id="d4" onclick="setDiff(4)"><div class="sopt-ico">🟦</div><div class="sopt-lbl">4×4</div></div>
        <div class="sopt" id="d5" onclick="setDiff(5)"><div class="sopt-ico">🟪</div><div class="sopt-lbl">5×4</div></div>
        <div class="sopt" id="d6" onclick="setDiff(6)"><div class="sopt-ico">🟥</div><div class="sopt-lbl">6×6</div></div>
      </div>
    </div>
    <button class="gbtn accent" onclick="beginGame()">&#9654;&ensp;Play</button>
    <p class="hint">Tap cards to flip them · Match all pairs to win</p>
  </div>
</div>

<!-- Win overlay -->
<div class="ov" id="winOv">
  <div class="win-card">
    <h2>You Won! 🎉</h2>
    <div class="stat-row">
      <div class="stat-box"><b id="wMoves">0</b><span>Moves</span></div>
      <div class="stat-box"><b id="wTime">0:00</b><span>Time</span></div>
    </div>
    <div class="new-best" id="newBest" style="display:none">⭐ New best time!</div>
    <button class="gbtn accent" onclick="playAgain()">&#9654;&ensp;Play Again</button>
    <button class="gbtn ghost" onclick="showMenu()">&#8592;&ensp;Change Size</button>
  </div>
</div>

<!-- Game area -->
<div id="gameArea">
  <div class="hud">
    <div class="hud-item"><div class="hud-val" id="sMoves">0</div><div class="hud-label">Moves</div></div>
    <div class="hud-item"><div class="hud-val" id="sPairs">0/0</div><div class="hud-label">Pairs</div></div>
    <div class="hud-item"><div class="hud-val" id="sTime">0:00</div><div class="hud-label">Time</div></div>
    <div class="hud-item best"><div class="hud-val" id="sBest">--</div><div class="hud-label">Best</div></div>
  </div>
  <div id="grid"></div>
  <button class="gbtn ghost" style="max-width:200px;margin-top:4px" onclick="showMenu()">&#8592;&ensp;Menu</button>
</div>

<div id="volWrap"><label>Vol</label><input type="range" id="volSlider" min="0" max="100" value="22" oninput="setVol(this.value)"></div>

<script>
const ac=new(window.AudioContext||window.webkitAudioContext)();
const mg=ac.createGain();mg.gain.value=0.22;mg.connect(ac.destination);
function setVol(v){mg.gain.value=v/100;}
function tone(freq,dur=0.1,type='sine',vol=0.5){
  if(ac.state==='suspended')ac.resume();
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.connect(g);g.connect(mg);o.start();o.stop(ac.currentTime+dur+.02);
}
const SFX={flip:()=>tone(380,.06,'sine',.3),match:()=>{tone(523,.1,'sine');setTimeout(()=>tone(659,.12,'sine'),100);},wrong:()=>tone(160,.15,'sawtooth',.4),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.18,'sine'),i*110));}};

const EMOJIS=['&#128054;','&#128049;','&#128007;','&#128015;','&#128008;','&#129411;','&#128059;','&#128060;','&#128047;','&#129408;','&#128046;','&#128056;','&#128053;','&#128052;','&#128039;','&#128045;','&#129412;','&#128029;','&#129419;','&#128034;'];
let cols=4,rows=4,cards=[],flipped=[],matchCount=0,moves=0,locked=false,timerInterval=null,startTime=null,elapsed=0;
let bestTimes={4:null,5:null,6:null};

function setDiff(c){
  cols=c;rows=c===5?4:c;
  document.querySelectorAll('.sopt[id^="d"]').forEach(b=>b.classList.remove('on'));
  document.getElementById('d'+c).classList.add('on');
}
function cardSize(){
  const maxW=Math.min(window.innerWidth-40,480),maxH=window.innerHeight-180;
  const byW=Math.floor((maxW-(cols-1)*8)/cols),byH=Math.floor((maxH-(rows-1)*8)/rows);
  return Math.max(48,Math.min(byW,byH,88));
}
function buildDeck(){const pairs=(cols*rows)/2,chosen=EMOJIS.slice(0,pairs);return[...chosen,...chosen].sort(()=>Math.random()-.5);}
function startGame(){
  clearInterval(timerInterval);
  cards=buildDeck().map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));
  flipped=[];matchCount=0;moves=0;locked=false;startTime=null;elapsed=0;
  document.getElementById('sMoves').textContent='0';document.getElementById('sPairs').textContent=`0/${cols*rows/2}`;
  document.getElementById('sTime').textContent='0:00';
  const b=bestTimes[cols];document.getElementById('sBest').textContent=b?fmtTime(b):'--';
  renderGrid();
}
function beginGame(){
  document.getElementById('menuOv').classList.remove('open');document.getElementById('winOv').classList.remove('open');
  document.getElementById('gameArea').classList.add('show');startGame();
}
function showMenu(){
  clearInterval(timerInterval);document.getElementById('menuOv').classList.add('open');
  document.getElementById('gameArea').classList.remove('show');document.getElementById('winOv').classList.remove('open');
}
function playAgain(){document.getElementById('winOv').classList.remove('open');startGame();}

function renderGrid(){
  const sz=cardSize(),g=document.getElementById('grid');
  g.style.gridTemplateColumns=`repeat(${cols},${sz}px)`;g.innerHTML='';
  cards.forEach(c=>{
    const el=document.createElement('div');
    el.className='card'+(c.flipped||c.matched?' flipped':'')+( c.matched?' matched':'');
    el.style.cssText=`width:${sz}px;height:${sz}px;font-size:${Math.max(sz*.42,18)}px`;
    el.innerHTML=`<div class="card-face front"></div><div class="card-face back">${c.emoji}</div>`;
    el.addEventListener('click',()=>flip(c.id));g.appendChild(el);
  });
}
function flip(id){
  if(locked)return;const c=cards[id];if(c.flipped||c.matched)return;
  SFX.flip();if(!startTime){startTime=Date.now();timerInterval=setInterval(tick,500);}
  c.flipped=true;flipped.push(id);renderGrid();
  if(flipped.length===2){
    moves++;document.getElementById('sMoves').textContent=moves;locked=true;
    const[a,b]=flipped.map(i=>cards[i]);
    if(a.emoji===b.emoji){
      a.matched=b.matched=true;matchCount++;document.getElementById('sPairs').textContent=`${matchCount}/${cols*rows/2}`;
      SFX.match();flipped=[];locked=false;renderGrid();
      if(matchCount===cols*rows/2){clearInterval(timerInterval);setTimeout(showWin,700);}
    }else{
      SFX.wrong();
      setTimeout(()=>{a.flipped=b.flipped=false;flipped=[];locked=false;renderGrid();},800);
    }
  }
}
function tick(){elapsed=Math.floor((Date.now()-startTime)/1000);document.getElementById('sTime').textContent=fmtTime(elapsed);}
function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function showWin(){
  SFX.win();const t=elapsed,isNew=!bestTimes[cols]||t<bestTimes[cols];if(isNew)bestTimes[cols]=t;
  document.getElementById('wMoves').textContent=moves;document.getElementById('wTime').textContent=fmtTime(t);
  document.getElementById('newBest').style.display=isNew?'block':'none';
  document.getElementById('winOv').classList.add('open');
  const b=bestTimes[cols];document.getElementById('sBest').textContent=b?fmtTime(b):'--';
}
window.addEventListener('resize',()=>{if(document.getElementById('gameArea').classList.contains('show'))renderGrid();});
</script>
</body>
</html>
