<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Space Invaders</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#13131f;--bg2:#1c1c2e;--bg3:#252538;--bg4:#2e2e45;
  --accent:#7c5cfc;--accent-h:#6a4de0;
  --text:#fff;--text2:#9898b8;--border:rgba(255,255,255,0.07);
  --red:#ff4d6d;--green:#22c55e;--gold:#f59e0b;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);touch-action:none}

/* MENU */
.ov{position:fixed;inset:0;background:rgba(10,10,20,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}
.menu-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 28px 28px;width:min(380px,94vw);text-align:center}
.menu-card h1{font-size:clamp(1.5rem,5vw,2rem);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.menu-card p{color:var(--text2);font-size:.88rem;margin-bottom:24px}
.sopt-row{display:flex;gap:10px;margin-bottom:24px}
.sopt{flex:1;background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:12px 6px;cursor:pointer;transition:border-color .18s,background .18s}
.sopt:hover{background:var(--bg4);border-color:var(--accent)}
.sopt.sel{background:rgba(124,92,252,.18);border-color:var(--accent)}
.sopt .s-name{font-size:.82rem;font-weight:700;margin-bottom:2px}
.sopt .s-sub{font-size:.68rem;color:var(--text2)}
.btn-play{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:background .15s,transform .1s}
.btn-play:hover{background:var(--accent-h);transform:translateY(-1px)}
.hi-row{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.hi-box{text-align:center}
.hi-lbl{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.hi-val{font-size:1rem;font-weight:800;color:var(--gold)}

/* CANVAS WRAP */
#game-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}

/* HUD overlay */
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;pointer-events:none;z-index:5;background:linear-gradient(to bottom,rgba(10,10,20,.7) 0%,transparent 100%)}
.hud-item{text-align:center}
.hud-lbl{font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.hud-val{font-size:.95rem;font-weight:800}
.hud-val.gold{color:var(--gold)}
.lives-row{display:flex;gap:4px;align-items:center}
.life-icon{width:14px;height:10px;background:var(--green);clip-path:polygon(50% 0%,100% 100%,80% 80%,50% 100%,20% 80%,0% 100%);flex-shrink:0}
.life-icon.lost{opacity:.2}

/* PAUSE BANNER */
#pause-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:14px;padding:16px 32px;font-size:1.3rem;font-weight:800;text-align:center;display:none;z-index:20}

/* MOBILE D-PAD */
#dpad{position:absolute;bottom:16px;left:0;right:0;display:none;pointer-events:none;z-index:10}
.dpad-left{position:absolute;left:16px;bottom:0;display:flex;gap:8px}
.dpad-right{position:absolute;right:16px;bottom:0;display:flex;gap:8px}
.dpad-btn{width:60px;height:60px;border-radius:14px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;pointer-events:all;touch-action:none;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .1s}
.dpad-btn:active,.dpad-btn.pressed{background:rgba(124,92,252,.35);border-color:var(--accent)}

/* WAVE/RESULT FLASH */
#wave-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(1.4rem,4vw,2rem);font-weight:800;pointer-events:none;z-index:15;opacity:0;transition:opacity .4s;text-align:center;white-space:nowrap}
#wave-flash.show{opacity:1}
#wave-flash.hide{opacity:0}
</style>
</head>
<body>

<!-- MENU -->
<div class="ov open" id="overlay">
  <div class="menu-card">
    <h1>Space Invaders</h1>
    <p>Defend Earth from the alien invasion</p>
    <div class="hi-row">
      <div class="hi-box"><div class="hi-lbl">Best Score</div><div class="hi-val gold" id="menu-hi">0</div></div>
      <div class="hi-box"><div class="hi-lbl">Wave Record</div><div class="hi-val gold" id="menu-wave">1</div></div>
    </div>
    <div class="sopt-row">
      <div class="sopt sel" data-d="easy">
        <div class="s-name">Easy</div>
        <div class="s-sub">Slower enemies</div>
      </div>
      <div class="sopt" data-d="normal">
        <div class="s-name">Normal</div>
        <div class="s-sub">Classic feel</div>
      </div>
      <div class="sopt" data-d="hard">
        <div class="s-name">Hard</div>
        <div class="s-sub">Fast &amp; fierce</div>
      </div>
    </div>
    <button class="btn-play" id="btn-start">Launch</button>
  </div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <canvas id="c"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">
    <div class="hud-lbl">Score</div>
    <div class="hud-val gold" id="hud-score">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-lbl">Wave</div>
    <div class="hud-val" id="hud-wave">1</div>
  </div>
  <div class="hud-item">
    <div class="hud-lbl">Lives</div>
    <div class="lives-row" id="hud-lives"></div>
  </div>
  <div class="hud-item">
    <div class="hud-lbl">Best</div>
    <div class="hud-val gold" id="hud-hi">0</div>
  </div>
</div>

<div id="pause-banner">⏸ PAUSED<br><span style="font-size:.75rem;color:var(--text2)">Press P or tap to resume</span></div>
<div id="wave-flash"></div>

<!-- MOBILE -->
<div id="dpad">
  <div class="dpad-left">
    <div class="dpad-btn" id="btn-left">◀</div>
    <div class="dpad-btn" id="btn-right">▶</div>
  </div>
  <div class="dpad-right">
    <div class="dpad-btn" id="btn-fire">🔥</div>
    <div class="dpad-btn" id="btn-pause-m">⏸</div>
  </div>
</div>

<script>
// ── AUDIO ──────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume()}
function snd(type){
  resumeAC();
  const now=AC.currentTime;
  function osc(f,wt,t0,t1,vol,slide){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=wt;o.frequency.setValueAtTime(f,now+t0);
    if(slide)o.frequency.linearRampToValueAtTime(slide,now+t1);
    g.gain.setValueAtTime(vol,now+t0);g.gain.exponentialRampToValueAtTime(0.001,now+t1);
    o.connect(g);g.connect(AC.destination);o.start(now+t0);o.stop(now+t1+.02);
  }
  function noise(t0,t1,vol){
    const buf=AC.createBuffer(1,AC.sampleRate*.3,AC.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='bandpass';f.frequency.value=800;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(vol,now+t0);g.gain.exponentialRampToValueAtTime(0.001,now+t1);
    src.start(now+t0);src.stop(now+t1+.05);
  }
  if(type==='shoot'){osc(660,'square',0,.08,.1,200)}
  else if(type==='invader-shoot'){osc(180,'sawtooth',0,.1,.08,120)}
  else if(type==='hit'){noise(0,.18,.25);osc(180,'sawtooth',0,.12,.12,80)}
  else if(type==='explode'){noise(0,.3,.4);osc(120,'sawtooth',0,.2,.15,60)}
  else if(type==='player-die'){noise(0,.5,.5);osc(80,'sawtooth',0,.4,.2,50)}
  else if(type==='ufo'){osc(400,'sawtooth',0,.08,.12,600);osc(600,'sawtooth',.04,.12,.1,400)}
  else if(type==='wave'){osc(523,'sine',0,.18,.15);osc(659,'sine',.15,.32,.12);osc(784,'sine',.28,.44,.1)}
  else if(type==='gameover'){osc(220,'sawtooth',0,.3,.2);osc(180,'sawtooth',.2,.5,.18)}
}

// ── CANVAS / SCALE ────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const LOGICAL_W=560,LOGICAL_H=620;
let scale=1;

function resize(){
  const wrap=document.getElementById('game-wrap');
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  scale=Math.min(ww/LOGICAL_W,wh/LOGICAL_H);
  canvas.width=LOGICAL_W;canvas.height=LOGICAL_H;
  canvas.style.width=Math.floor(LOGICAL_W*scale)+'px';
  canvas.style.height=Math.floor(LOGICAL_H*scale)+'px';
}
window.addEventListener('resize',resize);resize();

// ── CONSTANTS ─────────────────────────────────────────────
const DIFF={
  easy:  {enemySpd:28, enemyBulletSpd:200, fireDelay:1100, speedMult:1},
  normal:{enemySpd:35, enemyBulletSpd:240, fireDelay:900,  speedMult:1},
  hard:  {enemySpd:45, enemyBulletSpd:290, fireDelay:700,  speedMult:1},
};
const MAX_ENEMY_SPD=130, MAX_BULLET_SPD=420;
const PLAYER_SPD=360, BULLET_SPD=620, COOLDOWN=350;
const COLS=11, ROWS=5;
const E_W=32, E_H=22, E_GAP_X=14, E_GAP_Y=14;
const SHIELD_COUNT=4, SHIELD_HP=40;
const PLAYER_W=34, PLAYER_H=18;
const GRID_TOP=80, GRID_LEFT=40;
const PLAYER_Y=LOGICAL_H-60;
const GROUND_Y=LOGICAL_H-38;

// ── COLORS ────────────────────────────────────────────────
const ECOLS=['#ff6b6b','#ffa94d','#f9dc5c','#a8ff78','#74b9ff']; // row colors

// ── STATE ─────────────────────────────────────────────────
let diff='normal';
let running=false,paused=false,gameOver=false;
let score=0,lives=3,wave=1;
let hiScore=+localStorage.getItem('si_hi')||0;
let hiWave=+localStorage.getItem('si_wave')||1;
let player={x:LOGICAL_W/2-PLAYER_W/2,dx:0};
let bullets=[]; // {x,y,spd,player}
let enemies=[];
let eDx=1,eSpd=0,eBulletSpd=0;
let fireDelay=900;
let shields=[];
let particles=[];
let ufo=null,ufoTimer=0,ufoInterval=0;
let lastTime=0,dt=0;
let shootCooldown=0;
let maxBullets=1;
let keys={};
let mobile=false;
let mobileLeft=false,mobileRight=false,mobileFire=false;

// ── STARS ─────────────────────────────────────────────────
let stars=[];
function makeStars(){
  stars=[];
  for(let i=0;i<80;i++)stars.push({x:Math.random()*LOGICAL_W,y:Math.random()*LOGICAL_H,r:Math.random()*1.2+.3,b:Math.random()*.7+.3});
}
makeStars();

// ── ENEMY GRID ────────────────────────────────────────────
function makeEnemies(){
  enemies=[];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      enemies.push({
        r,c,
        x:GRID_LEFT+c*(E_W+E_GAP_X),
        y:GRID_TOP+r*(E_H+E_GAP_Y),
        alive:true,frame:0,frameTimer:0,
        shootTimer:Math.random()*fireDelay+fireDelay*.5,
        col:ECOLS[r]||'#fff',
        pts:[30,20,20,10,10][r]||10,
      });
    }
  }
}

// ── SHIELDS ───────────────────────────────────────────────
const SHIELD_W=52,SHIELD_H=32;
function makeShields(){
  shields=[];
  const spacing=(LOGICAL_W-SHIELD_COUNT*SHIELD_W)/(SHIELD_COUNT+1);
  const sy=PLAYER_Y-70;
  for(let i=0;i<SHIELD_COUNT;i++){
    const sx=spacing+(i*(SHIELD_W+spacing));
    const blocks=[];
    for(let row=0;row<4;row++){
      for(let col=0;col<6;col++){
        // arch shape — skip top corners
        if(row<2&&(col===0||col===5))continue;
        if(row===0&&(col===1||col===4))continue;
        // bottom center gap
        if(row>=2&&(col===2||col===3))continue;
        blocks.push({col,row,hp:SHIELD_HP,maxHp:SHIELD_HP});
      }
    }
    shields.push({x:sx,y:sy,blocks});
  }
}

const BW=SHIELD_W/6, BH=SHIELD_H/4;
function shieldColor(hp,max){
  const p=hp/max;
  if(p>0.75)return '#22c55e';
  if(p>0.5) return '#f59e0b';
  if(p>0.25)return '#ef4444';
  return '#7f1d1d';
}

function hitShield(bx,by,fromPlayer){
  for(const sh of shields){
    for(const blk of sh.blocks){
      if(blk.hp<=0)continue;
      const bpx=sh.x+blk.col*BW, bpy=sh.y+blk.row*BH;
      if(bx>=bpx&&bx<bpx+BW&&by>=bpy&&by<bpy+BH){
        blk.hp=Math.max(0,blk.hp-10);
        spawnParticles(bx,by,4+Math.floor(Math.random()*4),shieldColor(blk.hp,blk.maxHp));
        snd('hit');return true;
      }
    }
  }
  return false;
}

// ── PARTICLES ─────────────────────────────────────────────
function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=Math.random()*80+40;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,col:col||'#fff',r:Math.random()*2+1});
  }
}

// ── ENEMY SPEED ───────────────────────────────────────────
function alive(){return enemies.filter(e=>e.alive)}
function enemySpeed(){
  const a=alive().length,total=COLS*ROWS;
  let mult=1;
  if(a<=5)mult=2;
  else if(a<=15)mult=1.6;
  else if(a<=30)mult=1.25;
  return Math.min(MAX_ENEMY_SPD,eSpd)*mult;
}

// ── UFO ───────────────────────────────────────────────────
function scheduleUFO(){ufoTimer=20000+Math.random()*15000}
function spawnUFO(){ufo={x:-40,y:30,spd:90};snd('ufo')}

// ── HUD ───────────────────────────────────────────────────
function updHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-wave').textContent=wave;
  document.getElementById('hud-hi').textContent=hiScore;
  const lr=document.getElementById('hud-lives');lr.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='life-icon'+(i>=lives?' lost':'');lr.appendChild(d);
  }
}

// ── INIT WAVE ─────────────────────────────────────────────
function initWave(){
  const cfg=DIFF[diff];
  eSpd=Math.min(MAX_ENEMY_SPD,cfg.enemySpd*(1+wave*.12));
  eBulletSpd=Math.min(MAX_BULLET_SPD,cfg.enemyBulletSpd*(1+wave*.08));
  fireDelay=Math.max(600,cfg.fireDelay-(wave-1)*60);
  maxBullets=wave>=3?2:1;
  eDx=1;
  makeEnemies();
  makeShields();
  bullets=[];particles=[];ufo=null;
  scheduleUFO();
}

// ── START GAME ────────────────────────────────────────────
function startGame(){
  resumeAC();
  score=0;lives=3;wave=1;gameOver=false;paused=false;
  player.x=LOGICAL_W/2-PLAYER_W/2;player.dx=0;
  shootCooldown=0;
  initWave();updHUD();
  mobile=/Mobi|Android|Touch/i.test(navigator.userAgent)||('ontouchstart' in window);
  document.getElementById('dpad').style.display=mobile?'block':'none';
  running=true;
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

// ── GAME LOOP ─────────────────────────────────────────────
function loop(ts){
  if(!running)return;
  dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;

  if(!paused&&!gameOver){update(dt)}
  render();
  requestAnimationFrame(loop);
}

// ── UPDATE ────────────────────────────────────────────────
function update(dt){
  // Player movement
  let mv=0;
  if(keys['ArrowLeft']||keys['a']||mobileLeft)mv=-1;
  if(keys['ArrowRight']||keys['d']||mobileRight)mv=1;
  player.x=Math.max(0,Math.min(LOGICAL_W-PLAYER_W,player.x+mv*PLAYER_SPD*dt));

  // Player shoot
  shootCooldown=Math.max(0,shootCooldown-dt*1000);
  const pBullets=bullets.filter(b=>b.player).length;
  if((keys[' ']||keys['z']||mobileFire)&&shootCooldown===0&&pBullets<maxBullets){
    bullets.push({x:player.x+PLAYER_W/2,y:PLAYER_Y,spd:-BULLET_SPD,player:true});
    shootCooldown=COOLDOWN;snd('shoot');
  }

  // Enemy march
  const espd=enemySpeed();
  const al=alive();
  if(!al.length)return;

  // Find bounds
  let minX=Infinity,maxX=-Infinity;
  al.forEach(e=>{minX=Math.min(minX,e.x);maxX=Math.max(maxX,e.x+E_W)});

  let drop=false;
  if(eDx>0&&maxX>=LOGICAL_W-10){eDx=-1;drop=true}
  if(eDx<0&&minX<=10){eDx=1;drop=true}

  enemies.forEach(e=>{
    if(!e.alive)return;
    e.x+=eDx*espd*dt;
    if(drop)e.y+=12;
    // animate
    e.frameTimer+=dt;
    if(e.frameTimer>0.5){e.frameTimer=0;e.frame^=1}

    // Shoot if front
    e.shootTimer-=dt*1000;
    if(e.shootTimer<=0){
      e.shootTimer=fireDelay*(.7+Math.random()*.9);
      // Check if front of column
      const colEnemies=enemies.filter(x=>x.alive&&x.c===e.c);
      const front=colEnemies.reduce((a,b)=>a.r>b.r?a:b);
      if(front===e){
        bullets.push({x:e.x+E_W/2,y:e.y+E_H,spd:eBulletSpd,player:false});
        snd('invader-shoot');
      }
    }

    // Reached player level?
    if(e.y+E_H>=PLAYER_Y-10)killPlayer(true);
  });

  // UFO
  ufoTimer-=dt*1000;
  if(ufoTimer<=0&&!ufo)spawnUFO();
  if(ufo){
    ufo.x+=ufo.spd*dt;
    if(ufo.x>LOGICAL_W+60)ufo=null;
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.y+=b.spd*dt;
    // off screen
    if(b.y<-10||b.y>LOGICAL_H+10){bullets.splice(i,1);continue}

    // Player bullet hits enemy
    if(b.player){
      // UFO
      if(ufo&&b.x>=ufo.x&&b.x<=ufo.x+40&&b.y>=ufo.y&&b.y<=ufo.y+16){
        score+=100;snd('explode');spawnParticles(ufo.x+20,ufo.y+8,12,'#f59e0b');
        ufo=null;scheduleUFO();bullets.splice(i,1);updHUD();continue;
      }
      // Enemy
      let hit=false;
      for(const e of enemies){
        if(!e.alive)continue;
        if(b.x>=e.x&&b.x<=e.x+E_W&&b.y>=e.y&&b.y<=e.y+E_H){
          e.alive=false;score+=e.pts;snd('explode');
          spawnParticles(e.x+E_W/2,e.y+E_H/2,8+Math.floor(Math.random()*6),e.col);
          bullets.splice(i,1);updHUD();hit=true;
          if(!alive().length){setTimeout(nextWave,1200)}
          break;
        }
      }
      if(hit)continue;
      // Shield
      if(hitShield(b.x,b.y,true)){bullets.splice(i,1);continue}
    } else {
      // Enemy bullet hits player
      if(b.x>=player.x&&b.x<=player.x+PLAYER_W&&b.y>=PLAYER_Y&&b.y<=PLAYER_Y+PLAYER_H){
        bullets.splice(i,1);killPlayer(false);continue;
      }
      // Shield
      if(hitShield(b.x,b.y,false)){bullets.splice(i,1);continue}
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=80*dt;
    p.life-=dt*2.5;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── KILL PLAYER ───────────────────────────────────────────
let dying=false;
function killPlayer(invaded){
  if(dying)return;
  dying=true;lives--;snd('player-die');
  spawnParticles(player.x+PLAYER_W/2,PLAYER_Y+PLAYER_H/2,20,'#7c5cfc');
  updHUD();
  setTimeout(()=>{
    dying=false;
    if(lives<=0||invaded){endGame();return}
    player.x=LOGICAL_W/2-PLAYER_W/2;
    bullets=bullets.filter(b=>b.player);
    shootCooldown=0;
  },1000);
}

function endGame(){
  gameOver=true;running=false;
  snd('gameover');
  if(score>hiScore){hiScore=score;localStorage.setItem('si_hi',hiScore)}
  if(wave>hiWave){hiWave=wave;localStorage.setItem('si_wave',hiWave)}
  // Show game-over screen after short delay
  setTimeout(()=>{
    document.getElementById('menu-hi').textContent=hiScore;
    document.getElementById('menu-wave').textContent=hiWave;
    document.getElementById('overlay').classList.add('open');
  },1500);
}

// ── NEXT WAVE ─────────────────────────────────────────────
function nextWave(){
  if(gameOver)return;
  snd('wave');
  const bonus=250+(lives*100);
  score+=bonus;updHUD();
  flashMsg('Wave '+(wave+1)+'! +'+bonus,1500,()=>{
    wave++;initWave();updHUD();scheduleUFO();
    if(score>hiScore){hiScore=score;localStorage.setItem('si_hi',hiScore)}
    if(wave>hiWave){hiWave=wave;localStorage.setItem('si_wave',hiWave)}
  });
}

function flashMsg(txt,dur,cb){
  const el=document.getElementById('wave-flash');
  el.textContent=txt;el.className='show';
  setTimeout(()=>{el.className='hide';if(cb)cb()},dur);
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

  // Stars
  stars.forEach(s=>{
    ctx.globalAlpha=s.b;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Ground line
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(LOGICAL_W,GROUND_Y);ctx.stroke();

  // Shields
  shields.forEach(sh=>{
    sh.blocks.forEach(blk=>{
      if(blk.hp<=0)return;
      ctx.fillStyle=shieldColor(blk.hp,blk.maxHp);
      const px=sh.x+blk.col*BW,py=sh.y+blk.row*BH;
      ctx.fillRect(px,py,BW-1,BH-1);
    });
  });

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    ctx.fillStyle=e.col;
    drawEnemy(ctx,e.x,e.y,e.r,e.frame);
  });

  // UFO
  if(ufo){
    ctx.fillStyle='#f43f5e';
    drawUFO(ctx,ufo.x,ufo.y);
  }

  // Bullets
  bullets.forEach(b=>{
    if(b.player){
      ctx.fillStyle='#a78bfa';
      ctx.fillRect(b.x-1.5,b.y-8,3,12);
    } else {
      ctx.fillStyle='#fb923c';
      ctx.fillRect(b.x-1.5,b.y,3,10);
    }
  });

  // Player
  if(!dying||Math.floor(lastTime/80)%2===0){
    ctx.fillStyle='#7c5cfc';
    drawPlayer(ctx,player.x,PLAYER_Y);
  }

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Game over overlay on canvas
  if(gameOver){
    ctx.fillStyle='rgba(10,10,20,.6)';ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);
    ctx.fillStyle='#ff4d6d';ctx.font='bold 40px Inter,sans-serif';ctx.textAlign='center';
    ctx.fillText('GAME OVER',LOGICAL_W/2,LOGICAL_H/2-20);
    ctx.fillStyle='#9898b8';ctx.font='18px Inter,sans-serif';
    ctx.fillText('Score: '+score,LOGICAL_W/2,LOGICAL_H/2+20);
    ctx.textAlign='left';
  }
}

// ── DRAW SPRITES ─────────────────────────────────────────
function drawPlayer(ctx,x,y){
  // Ship body
  ctx.beginPath();ctx.moveTo(x+PLAYER_W/2,y);ctx.lineTo(x+PLAYER_W,y+PLAYER_H);ctx.lineTo(x,y+PLAYER_H);ctx.closePath();ctx.fill();
  // Cockpit
  ctx.fillStyle='#c4b5fd';ctx.fillRect(x+PLAYER_W/2-4,y+6,8,6);
  // Cannon
  ctx.fillStyle='#7c5cfc';ctx.fillRect(x+PLAYER_W/2-2,y-6,4,8);
}

function drawEnemy(ctx,x,y,row,frame){
  ctx.save();ctx.translate(x+E_W/2,y+E_H/2);
  if(row===0){
    // Top row: UFO-like
    ctx.beginPath();ctx.ellipse(0,0,13,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.beginPath();ctx.ellipse(frame?-5:5,-2,4,3,0,0,Math.PI*2);ctx.fill();
    // legs
    ctx.strokeStyle=ctx.fillStyle=ECOLS[row];
    [[-10,7],[-5,8],[5,8],[10,7]].forEach(([lx,ly])=>{
      ctx.fillRect(lx-1+frame,ly-1,2,5);
    });
  } else if(row<=2){
    // Mid rows: crab
    ctx.fillStyle=ECOLS[row];
    ctx.beginPath();ctx.roundRect(-11,-7,22,14,3);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.fillRect(-7,-3,4,6);ctx.fillRect(3,-3,4,6);
    // claws
    ctx.fillStyle=ECOLS[row];
    const cf=frame?3:-3;
    ctx.fillRect(-14+cf,-5,4,4);ctx.fillRect(10-cf,-5,4,4);
  } else {
    // Bottom rows: octopus
    ctx.beginPath();ctx.arc(0,-3,10,Math.PI,0);ctx.fillRect(-10,-3,20,10);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.arc(-4,-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(4,-3,3,0,Math.PI*2);ctx.fill();
    // tentacles
    ctx.fillStyle=ECOLS[row];
    const tOff=frame?2:-2;
    [-8,-4,0,4,8].forEach((tx,i)=>{
      ctx.fillRect(tx-1,7,2,5+tOff*(i%2?1:-1));
    });
  }
  ctx.restore();
}

function drawUFO(ctx,x,y){
  ctx.save();ctx.translate(x+20,y+8);
  ctx.beginPath();ctx.ellipse(0,0,20,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fda4af';ctx.beginPath();ctx.ellipse(0,-4,10,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';
  [-8,0,8].forEach(lx=>{ ctx.beginPath();ctx.arc(lx,2,2,0,Math.PI*2);ctx.fill(); });
  ctx.restore();
}

// ── INPUT ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='p'||e.key==='P'||e.key==='Escape')&&running){togglePause()}
  e.preventDefault();
},{passive:false});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function togglePause(){
  paused=!paused;
  document.getElementById('pause-banner').style.display=paused?'block':'none';
  if(!paused)lastTime=performance.now();
}

// Mobile buttons
function mBtn(id,setFn){
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();setFn(true);el.classList.add('pressed')},{passive:false}));
  ['touchend','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();setFn(false);el.classList.remove('pressed')},{passive:false}));
}
mBtn('btn-left',v=>{mobileLeft=v});
mBtn('btn-right',v=>{mobileRight=v});
mBtn('btn-fire',v=>{mobileFire=v});
document.getElementById('btn-pause-m').addEventListener('touchstart',e=>{e.preventDefault();if(running)togglePause()},{passive:false});
document.getElementById('btn-pause-m').addEventListener('click',()=>{if(running)togglePause()});

// Pause on canvas tap
canvas.addEventListener('click',()=>{if(running)togglePause()});

// ── MENU ─────────────────────────────────────────────────
document.querySelectorAll('.sopt').forEach(s=>s.addEventListener('click',()=>{
  document.querySelectorAll('.sopt').forEach(x=>x.classList.remove('sel'));
  s.classList.add('sel');diff=s.dataset.d;
}));
document.getElementById('btn-start').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('menu-hi').textContent=hiScore;
  document.getElementById('menu-wave').textContent=hiWave;
  startGame();
});

// init menu scores
document.getElementById('menu-hi').textContent=hiScore;
document.getElementById('menu-wave').textContent=hiWave;
document.getElementById('hud-hi').textContent=hiScore;
</script>
