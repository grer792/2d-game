<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
:root {
  --bg: #13131f; --bg2: #1c1c2e; --bg3: #252538; --bg4: #2e2e45;
  --accent: #7c5cfc; --accent-h: #6a4de0;
  --text: #ffffff; --text2: #9898b8;
  --border: rgba(255,255,255,0.07);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
button { font: inherit; cursor: pointer; }

header {
  width: 100%; max-width: 420px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 10px;
}
h1 { font-size: 2.4rem; font-weight: 950; letter-spacing: -0.03em; color: var(--accent); }
.scores { display: flex; gap: 8px; }
.score-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; text-align: center; min-width: 64px; }
.score-box .label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); }
.score-box .val { font-size: 1.1rem; font-weight: 900; }

.subheader {
  width: 100%; max-width: 420px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px 10px;
}
.subheader p { font-size: 0.82rem; color: var(--text2); }
.btn-row { display: flex; gap: 8px; }
.btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 8px 16px; font-size: 0.82rem; font-weight: 700; transition: background 0.15s, color 0.15s; }
.btn:hover { background: var(--bg4); color: var(--text); }
.btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
.btn.primary:hover { background: var(--accent-h); }

.board-wrap {
  width: 100%; max-width: 420px; padding: 0 16px;
  flex: 1; display: flex; align-items: center; justify-content: center;
}
.board {
  width: 100%; aspect-ratio: 1;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  display: grid; grid-template-columns: repeat(4,1fr); grid-auto-rows: 1fr;
  gap: 8px; padding: 8px;
}
.cell {
  aspect-ratio: 1;
  background: var(--bg3); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; line-height: 1;
}
.cell.pop  { animation: pop    0.18s ease; }
.cell.appear { animation: appear 0.16s ease; }
@keyframes pop    { 0%{transform:scale(1)} 45%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes appear { 0%{transform:scale(0.25);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }

.overlay {
  position: fixed; inset: 0;
  background: rgba(13,13,25,0.9); backdrop-filter: blur(6px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px;
}
.overlay h2 { font-size: 2.5rem; font-weight: 950; }
.overlay h2.win { color: var(--accent); }
.overlay h2.lose { color: #ff6b7f; }
.overlay p { color: var(--text2); }

/* Tile colours */
.t2    { background:#2e2e48; color:#fff; }
.t4    { background:#3a3060; color:#fff; }
.t8    { background:#5c3fa0; color:#fff; }
.t16   { background:#7c5cfc; color:#fff; }
.t32   { background:#9b7dff; color:#fff; }
.t64   { background:#ff6b7f; color:#fff; }
.t128  { background:#ff8a6b; color:#fff; }
.t256  { background:#ffb347; color:#fff; }
.t512  { background:#f5b84b; color:#13131f; }
.t1024 { background:#4dd6bc; color:#13131f; }
.t2048 { background:#4ade80; color:#13131f; }
.t-big { background:#fff; color:#13131f; }
</style>
</head>
<body>

<header>
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box"><div class="label">Score</div><div class="val" id="scoreVal">0</div></div>
    <div class="score-box"><div class="label">Best</div><div class="val" id="bestVal">0</div></div>
  </div>
</header>

<div class="subheader">
  <p>Combine tiles to reach <strong>2048</strong>!</p>
  <div class="btn-row">
    <button class="btn primary" id="newBtn">New game</button>
  </div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="overlay" id="overlay" style="display:none">
  <h2 id="overlayTitle"></h2>
  <p id="overlayScore"></p>
  <div class="btn-row">
    <button class="btn primary" id="overlayBtn">Play again</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';

const fbApp = initializeApp({
  apiKey: 'AIzaSyBQjDeFUKpleEsc2Fl3yZdnNje0cyAGaKU',
  authDomain: 'd-game-b50ef.firebaseapp.com',
  databaseURL: 'https://d-game-b50ef-default-rtdb.firebaseio.com',
  projectId: 'd-game-b50ef',
  storageBucket: 'd-game-b50ef.firebasestorage.app',
  messagingSenderId: '80712714092',
  appId: '1:80712714092:web:4b15f70196f05942905549'
});
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

// --- Sound ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx;
function _ac() { if (!_ctx) _ctx = new AudioCtx(); if (_ctx.state === 'suspended') _ctx.resume(); return _ctx; }
function beep(freq, dur, vol = 0.12) {
  try {
    const c = _ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}
function sfxSlide() { beep(220, 0.06, 0.08); }
function sfxMerge(val) {
  const freq = Math.min(100 + Math.log2(val) * 40, 900);
  beep(freq, 0.12, 0.15);
  setTimeout(() => beep(freq * 1.25, 0.1, 0.1), 60);
}
function sfxWin()  { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.3, 0.2), i*80)); }
function sfxLose() { [330,262,220].forEach((f,i) => setTimeout(() => beep(f, 0.3, 0.18), i*120)); }

// --- Best score persistence ---
let uid = null;
let best = parseInt(localStorage.getItem('bg2048best') || '0', 10);
document.getElementById('bestVal').textContent = best;

onAuthStateChanged(auth, async user => {
  uid = user ? user.uid : null;
  if (uid) {
    try {
      const snap = await get(ref(db, `users/${uid}/scores/2048`));
      if (snap.exists() && snap.val() > best) {
        best = snap.val();
        localStorage.setItem('bg2048best', best);
        document.getElementById('bestVal').textContent = best;
      }
    } catch(e) {}
  }
});

function saveBest() {
  localStorage.setItem('bg2048best', best);
  if (uid) set(ref(db, `users/${uid}/scores/2048`), best).catch(() => {});
}

// --- Game ---
const SIZE = 4;
let grid, score, won = false, over = false;
let prevGrid = null, newTilePos = -1;

function newGrid() { return Array.from({ length: SIZE }, () => Array(SIZE).fill(0)); }

function addRandom(g) {
  const empty = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!g[r][c]) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  g[r][c] = Math.random() < 0.9 ? 2 : 4;
  newTilePos = r * SIZE + c;
}

function startGame() {
  grid = newGrid(); score = 0; won = false; over = false;
  prevGrid = null; newTilePos = -1;
  addRandom(grid); addRandom(grid);
  newTilePos = -1; // no appear animation for initial tiles
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('bestVal').textContent = best;
  document.getElementById('overlay').style.display = 'none';
  render();
}

function slideRow(row) {
  let arr = row.filter(v => v), merged = false, pts = 0;
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    if (!merged && arr[i + 1] === arr[i]) {
      const val = arr[i] * 2;
      out.push(val); pts += val; i++; merged = false;
      sfxMerge(val);
      if (val === 2048 && !won) { won = true; }
    } else { out.push(arr[i]); merged = false; }
  }
  while (out.length < SIZE) out.push(0);
  return { row: out, pts };
}

function move(dir) {
  if (over) return;
  let moved = false, pts = 0;
  let g = grid.map(r => [...r]);
  const preMove = grid.map(r => [...r]);

  const rotations = { left: 0, right: 2, up: 3, down: 1 };
  const rots = rotations[dir];
  for (let i = 0; i < rots; i++) g = rotateCW(g);

  for (let r = 0; r < SIZE; r++) {
    const old = [...g[r]];
    const { row, pts: p } = slideRow(g[r]);
    g[r] = row; pts += p;
    if (row.some((v, i) => v !== old[i])) moved = true;
  }

  for (let i = 0; i < (4 - rots) % 4; i++) g = rotateCW(g);

  if (!moved) return;
  sfxSlide();
  score += pts;
  if (score > best) { best = score; saveBest(); }
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = best;

  newTilePos = -1;
  addRandom(g);
  prevGrid = preMove;
  grid = g;
  render();

  if (won) { setTimeout(() => showOverlay('You won! 🎉', true), 200); sfxWin(); won = false; return; }
  if (!canMove()) { over = true; setTimeout(() => showOverlay('Game over', false), 300); sfxLose(); }
}

function rotateCW(g) {
  return g[0].map((_, c) => g.map(r => r[c]).reverse());
}

function canMove() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return true;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
    }
  return false;
}

function showOverlay(title, win) {
  const overlay = document.getElementById('overlay');
  const t = document.getElementById('overlayTitle');
  t.textContent = title; t.className = win ? 'win' : 'lose';
  document.getElementById('overlayScore').textContent = `Score: ${score}`;
  overlay.style.display = 'flex';
}

// --- Render ---
function tileClass(v) {
  if (!v) return '';
  if (v <= 2048) return 't' + v;
  return 't-big';
}

function fontSize(v) {
  if (v >= 1024) return 'clamp(1rem, 4vw, 1.4rem)';
  if (v >= 128)  return 'clamp(1.2rem, 5vw, 1.8rem)';
  return 'clamp(1.4rem, 6vw, 2.2rem)';
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const v = grid[r][c];
    const pos = r * SIZE + c;
    const cell = document.createElement('div');
    cell.className = 'cell ' + tileClass(v);
    if (v) {
      cell.textContent = v;
      cell.style.fontSize = fontSize(v);
      if (pos === newTilePos) {
        cell.classList.add('appear');
      } else if (prevGrid && prevGrid[r][c] > 0 && prevGrid[r][c] < v) {
        cell.classList.add('pop');
      }
    }
    board.appendChild(cell);
  }
}

// --- Controls ---
const KEY = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down', a:'left', d:'right', w:'up', s:'down', A:'left', D:'right', W:'up', S:'down' };
document.addEventListener('keydown', e => { const d = KEY[e.key]; if (d) { e.preventDefault(); move(d); } });

let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, { passive: true });

document.getElementById('newBtn').addEventListener('click', startGame);
document.getElementById('overlayBtn').addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
