<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sw-icon:62px;--header-h:64px;--bar-h:52px;--pn-w:250px;--bg:#13131f;--bg2:#1c1c2e;--bg3:#252538;--bg4:#2e2e45;--accent:#7c5cfc;--accent-h:#6a4de0;--text:#ffffff;--text2:#9898b8;--border:rgba(255,255,255,0.07);--red:#ff4d6d;--ease:0.22s ease;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
a{text-decoration:none;color:inherit;}
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;z-index:300;}
.header-left{display:flex;align-items:center;gap:6px;flex:1;}
.hamburger{width:40px;height:40px;flex-shrink:0;background:transparent;border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:background .15s,color .15s;}
.hamburger:hover{background:var(--bg3);color:var(--text);}
.hamburger svg{width:24px;height:24px;fill:currentColor;}
.header-logo{display:flex;align-items:center;padding:4px 8px;border-radius:10px;transition:background .15s;text-decoration:none;color:inherit;}
.header-logo:hover{background:var(--bg3);}
.logo-img{height:56px;width:auto;mix-blend-mode:screen;display:block;}
.header-search{flex:0 0 420px;position:relative;margin:0 16px;}
.header-search input{width:100%;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);padding:10px 18px 10px 44px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.header-search input:focus{border-color:var(--accent);}
.header-search input::placeholder{color:var(--text2);}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);display:flex;align-items:center;pointer-events:none;}
.search-ico svg{width:19px;height:19px;fill:currentColor;}
.header-right{display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end;}
.icon-btn{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);background:transparent;border:none;transition:background .15s,color .15s;position:relative;}
.icon-btn:hover{background:var(--bg3);color:var(--text);}
.icon-btn svg{width:24px;height:24px;fill:currentColor;}
.notif-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg2);}
.header-divider{width:1px;height:24px;background:var(--border);margin:0 4px;}
.btn-login{background:var(--accent);border:none;color:white;padding:10px 22px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;margin-left:4px;}
.btn-login:hover{background:var(--accent-h);}
.layout{display:flex;height:calc(100vh - var(--header-h));margin-top:var(--header-h);}
body.sidebar-off .sidebar{width:0;border-right:none;}
body.sidebar-on .sidebar{width:var(--sw-icon);}
.sidebar{flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);height:100%;overflow:hidden;display:flex;flex-direction:column;transition:width var(--ease),box-shadow var(--ease);}
body.sidebar-on .sidebar:hover{width:230px;box-shadow:4px 0 32px rgba(0,0,0,.5);}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 7px 4px;display:flex;flex-direction:column;}
.sidebar-scroll::-webkit-scrollbar{width:0;}
.sidebar-group{display:flex;flex-direction:column;gap:2px;}
.sidebar-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);padding:10px 8px 4px;white-space:nowrap;opacity:0;transition:opacity var(--ease);}
body.sidebar-on .sidebar:hover .sidebar-label{opacity:1;}
.sidebar-item{display:flex;align-items:center;gap:13px;padding:11px 9px;border-radius:9px;cursor:pointer;color:var(--text2);font-size:.875rem;font-weight:500;white-space:nowrap;overflow:hidden;transition:background .15s,color .15s;}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg3);color:var(--text);}
.sidebar-item .ico{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sidebar-item .ico svg{width:22px;height:22px;fill:currentColor;}
.sidebar-item .label{opacity:0;transition:opacity var(--ease);pointer-events:none;}
body.sidebar-on .sidebar:hover .sidebar-item .label{opacity:1;}
.sidebar-bottom{border-top:1px solid var(--border);padding:8px 7px 10px;display:flex;flex-direction:column;gap:2px;}
.sb-contact{display:flex;align-items:center;gap:13px;padding:10px 9px;border-radius:9px;cursor:pointer;background:var(--accent);color:white;font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;transition:background .15s;}
.sb-contact:hover{background:var(--accent-h);}
.sb-contact .ico{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sb-contact .ico svg{width:22px;height:22px;fill:white;}
.sb-contact .label{opacity:0;transition:opacity var(--ease);}
body.sidebar-on .sidebar:hover .sb-contact .label{opacity:1;}
.play-main{flex:1;min-width:0;display:flex;gap:12px;padding:12px;overflow:hidden;}
.game-section{flex:1;min-width:0;display:flex;flex-direction:column;}
.game-frame-wrap{flex:1;position:relative;background:#000;border-radius:12px 12px 0 0;overflow:hidden;min-height:0;}
.game-iframe{width:100%;height:100%;border:none;display:block;}
.game-bar{height:var(--bar-h);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;}
.game-bar-left{display:flex;align-items:center;gap:10px;}
.bar-logo-wrap{width:48px;height:48px;overflow:hidden;flex-shrink:0;}
.bar-logo{height:48px;width:auto;mix-blend-mode:screen;display:block;}
.bar-game-title{font-size:.95rem;font-weight:700;}
.game-bar-actions{display:flex;align-items:center;gap:4px;}
.bar-btn{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:.78rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s;font-family:'Inter',sans-serif;white-space:nowrap;}
.bar-btn:hover{background:var(--bg4);color:var(--text);}
.bar-btn svg{width:17px;height:17px;fill:currentColor;flex-shrink:0;}
.bar-sep{width:1px;height:22px;background:var(--border);margin:0 2px;}
.play-next{width:var(--pn-w);flex-shrink:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-right:2px;}
.play-next::-webkit-scrollbar{width:0;}
.pn-title{font-size:.88rem;font-weight:700;padding:2px 0 4px;}
.pn-card{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;text-decoration:none;color:inherit;}
.pn-card:hover{border-color:rgba(124,92,252,.4);transform:translateX(3px);}
.pn-thumb{width:80px;height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;position:relative;}
.pn-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.pn-info{flex:1;padding:0 10px;}
.pn-name{font-size:.82rem;font-weight:700;margin-bottom:3px;}
.pn-meta{font-size:.7rem;color:var(--text2);}
#notif-overlay{display:none;position:fixed;top:var(--header-h);left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:298;backdrop-filter:blur(3px);}
#notif-overlay.open{display:block;}
#notif-panel{position:fixed;top:var(--header-h);right:0;bottom:0;width:340px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--border);z-index:299;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
#notif-panel.open{transform:translateX(0);}
.notif-panel-head{display:grid;grid-template-columns:32px 1fr 32px;align-items:center;padding:18px 16px 14px;flex-shrink:0;border-bottom:1px solid var(--border);}
.notif-panel-title{font-size:1rem;font-weight:800;text-align:center;}
.notif-panel-close{background:transparent;border:none;color:var(--text2);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;justify-self:end;}
.notif-panel-close:hover{background:var(--bg3);color:var(--text);}
.notif-scroll{flex:1;overflow-y:auto;padding:12px;}
.notif-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.notif-card-body{padding:12px 14px 14px;}
</style>
</head>

<script>
window.CURRENT_GAME_ID='hangman';
function openNotifPanel(){window._closeAllPanels&&window._closeAllPanels();document.getElementById('notif-overlay').classList.add('open');document.getElementById('notif-panel').classList.add('open');const d=document.querySelector('.notif-dot');if(d)d.style.display='none';}
function closeNotifPanel(){document.getElementById('notif-overlay').classList.remove('open');document.getElementById('notif-panel').classList.remove('open');}
window._closeAllPanels=(function(prev){return function(){if(prev)prev();closeNotifPanel();};})(window._closeAllPanels||null);
</script>
<script type="module" src="/assets/header-auth.js"></script>
<script>
let liked=false,disliked=false,faved=false;
function toggleLike(){liked=!liked;if(liked)disliked=false;document.getElementById('likeBtn').style.color=liked?'#4ade80':'';document.getElementById('dislikeBtn').style.color='';}
function toggleDislike(){disliked=!disliked;if(disliked)liked=false;document.getElementById('dislikeBtn').style.color=disliked?'#f87171':'';document.getElementById('likeBtn').style.color='';}
function toggleFav(){faved=!faved;document.getElementById('favBtn').style.color=faved?'#ff4d6d':'';document.getElementById('favBtn').style.background=faved?'rgba(255,77,109,.1)':'';}
function goFullscreen(){const f=document.getElementById('gameFrame');if(f.requestFullscreen)f.requestFullscreen();else if(f.webkitRequestFullscreen)f.webkitRequestFullscreen();}
document.getElementById('sidebarToggle').addEventListener('click',()=>{document.body.classList.toggle('sidebar-on');document.body.classList.toggle('sidebar-off');});
</script>
