<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #101218; --panel: #191d27; --panel2: #202636; --panel3: #2a3144;
  --text: #f6f7fb; --muted: #9ba4b8; --line: rgba(255,255,255,0.1);
  --x: #ff6b7f; --o: #4dd6bc; --accent: #f5b84b; --accent2: #cc8f28;
}
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; }
button { font: inherit; }

/* ── Layout ── */
.game { width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 320px; gap: 24px; padding: 22px 24px; overflow: hidden; }
body.mode-active .side { display: none; }

/* ── Mode screen ── */
.mode-screen { grid-column: 2; grid-row: 1; display: flex; align-items: stretch; }
.mode-screen.hidden { display: none; }
.mode-card { width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 24px; overflow-y: auto; max-height: calc(100vh - 44px); box-shadow: 0 18px 48px rgba(0,0,0,0.3); }
.mode-title { margin: 0 0 6px; font-size: clamp(2rem,4vw,2.8rem); font-weight: 950; line-height: 1; }
.mode-sub { color: var(--muted); font-size: 0.92rem; line-height: 1.45; margin-bottom: 20px; }
.mode-options { display: grid; gap: 10px; }
.mode-btn { width: 100%; border: 1px solid var(--line); background: var(--panel2); color: var(--text); border-radius: 8px; padding: 15px; cursor: pointer; display: grid; grid-template-columns: 44px 1fr; align-items: center; gap: 12px; text-align: left; }
.mode-btn strong { display: block; font-size: 1.1rem; font-weight: 900; margin-bottom: 2px; }
.mode-btn .sub { color: var(--muted); font-size: 0.86rem; }
.mode-btn.primary { background: var(--accent); border-color: transparent; color: #15100a; }
.mode-btn.primary .sub { color: rgba(0,0,0,0.6); }
.mode-btn:hover { border-color: rgba(245,184,75,0.5); background: var(--panel3); }
.mode-btn.primary:hover { background: var(--accent2); }
.mode-icon { width: 44px; height: 44px; border-radius: 8px; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 900; letter-spacing: 0.04em; }
.friend-setup { margin-top: 14px; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--line); border-radius: 8px; display: none; flex-direction: column; gap: 10px; }
.friend-setup.open { display: flex; }
.friend-title { font-size: 0.9rem; font-weight: 900; }
.code-row { display: flex; gap: 8px; }
.code-input { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--line); border-radius: 7px; color: var(--text); padding: 9px 11px; font: inherit; font-size: 0.82rem; font-weight: 800; text-transform: uppercase; outline: none; }
.code-input:focus { border-color: rgba(245,184,75,0.65); }
.small-btn { border: 1px solid var(--line); background: var(--panel2); color: var(--text); border-radius: 7px; padding: 9px 11px; cursor: pointer; font-size: 0.78rem; font-weight: 850; white-space: nowrap; }
.small-btn:hover { border-color: rgba(245,184,75,0.5); }
.mode-room-line { display: none; gap: 8px; align-items: center; }
.mode-room-line.active { display: flex; }
.mode-room-code { flex: 1; background: var(--bg); border: 1px solid var(--line); border-radius: 7px; padding: 9px 11px; font-size: 0.9rem; font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mode-note { min-height: 18px; color: var(--muted); font-size: 0.8rem; line-height: 1.35; }

/* ── Board zone ── */
.board-zone { grid-column: 1; grid-row: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-width: 0; }
.player-strip { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 1rem; }
.mark-badge { width: 32px; height: 32px; border-radius: 6px; background: var(--panel2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 950; }
.mark-badge.x { color: var(--x); border-color: rgba(255,107,127,0.35); }
.mark-badge.o { color: var(--o); border-color: rgba(77,214,188,0.35); }
.strip-name { flex: 1; }
.strip-score { font-size: 1.3rem; font-weight: 950; color: var(--muted); }
.strip-score.x { color: var(--x); }
.strip-score.o { color: var(--o); }

.board { display: grid; grid-template-columns: repeat(3,1fr); grid-auto-rows: 1fr; gap: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; box-shadow: 0 24px 60px rgba(0,0,0,0.4); width: min(100%, calc(100vh - 200px), 520px); aspect-ratio: 1; }
.cell { aspect-ratio: 1; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(160deg, var(--panel3), var(--panel)); cursor: pointer; display: grid; place-items: center; font-size: clamp(2.5rem,10vw,5.5rem); font-weight: 950; line-height: 1; transition: transform 0.1s, border-color 0.12s, background 0.12s; }
.cell:hover:not(:disabled) { transform: translateY(-2px); border-color: rgba(245,184,75,0.55); background: linear-gradient(160deg,#2e3550,#1e2435); }
.cell:disabled { cursor: default; }
.cell.x { color: var(--x); }
.cell.o { color: var(--o); }
.cell.win { border-color: var(--accent); background: linear-gradient(160deg,#3a2c18,var(--panel2)); }

/* ── Side panel ── */
.side { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; gap: 12px; overflow: hidden; min-width: 0; }
.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.panel-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 10px; }
.status-main { font-size: 1.05rem; font-weight: 900; line-height: 1.25; margin-bottom: 4px; }
.status-sub { color: var(--muted); font-size: 0.86rem; line-height: 1.4; min-height: 36px; }
.ctrl-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 10px; }
.ctrl-btn { border: 1px solid var(--line); background: var(--panel2); color: var(--text); border-radius: 7px; padding: 10px 8px; cursor: pointer; font-size: 0.82rem; font-weight: 850; }
.ctrl-btn:hover { border-color: rgba(245,184,75,0.45); background: var(--panel3); }
.ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.online-btn { width: 100%; border: 1px solid var(--line); background: var(--panel2); color: var(--text); border-radius: 7px; padding: 10px; cursor: pointer; font-size: 0.82rem; font-weight: 850; margin-bottom: 8px; }
.online-btn.primary { background: var(--accent); border-color: transparent; color: #15100a; }
.online-btn:hover { border-color: rgba(245,184,75,0.45); background: var(--panel3); }
.online-btn.primary:hover { background: var(--accent2); }
.online-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.join-line { display: flex; gap: 8px; margin-bottom: 8px; }
.room-line { display: none; gap: 8px; align-items: center; margin-bottom: 8px; }
.room-line.active { display: flex; }
.room-code { flex: 1; min-width: 0; background: rgba(0,0,0,0.2); border: 1px solid var(--line); border-radius: 7px; padding: 8px; font-size: 0.7rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.online-note { color: var(--muted); font-size: 0.8rem; line-height: 1.35; min-height: 28px; }
.score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.score-pill { border: 1px solid var(--line); border-radius: 7px; background: var(--panel2); padding: 10px 8px; text-align: center; }
.score-pill .label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); display: block; margin-bottom: 3px; }
.score-pill .val { font-size: 1.5rem; font-weight: 950; }
.score-pill.x .val { color: var(--x); }
.score-pill.o .val { color: var(--o); }

@media (max-width: 780px) {
  html, body { overflow: auto; }
  .game { height: auto; min-height: 100%; grid-template-columns: 1fr; padding: 14px; gap: 16px; }
  .mode-screen, .board-zone, .side { grid-column: 1; grid-row: auto; }
  .board { width: min(100%, 420px); }
  body.mode-active .side { display: flex; }
}
@media (max-width: 480px) {
  .board { width: 100%; }
  .game { padding: 10px; gap: 12px; }
}
</style>
</head>
<body class="mode-active">
<main class="game">

  <section class="mode-screen" id="modeScreen">
    <div class="mode-card">
      <h1 class="mode-title">Tic Tac Toe</h1>
      <p class="mode-sub">Three in a row wins. Choose how you want to play.</p>
      <div class="mode-options">
        <button class="mode-btn primary" id="vsAiBtn">
          <span class="mode-icon">AI</span>
          <div><strong>vs Computer</strong><span class="sub">You are X. Computer plays O.</span></div>
        </button>
        <button class="mode-btn" id="sameDeviceBtn">
          <span class="mode-icon">2P</span>
          <div><strong>Same device</strong><span class="sub">Two players take turns on this screen.</span></div>
        </button>
        <button class="mode-btn" id="friendModeBtn">
          <span class="mode-icon">FR</span>
          <div><strong>Play with friend</strong><span class="sub">Create a code or join with a friend's code.</span></div>
        </button>
      </div>
      <div class="friend-setup" id="friendSetup">
        <div class="friend-title">Friend game</div>
        <button class="online-btn primary" id="createFriendBtn">Create game code</button>
        <div class="code-row">
          <input class="code-input" id="joinCodeInput" placeholder="Enter code or link">
          <button class="small-btn" id="joinCodeBtn">Join</button>
        </div>
        <div class="mode-room-line" id="modeRoomLine">
          <div class="mode-room-code" id="modeRoomCode"></div>
          <button class="small-btn" id="modeCopyBtn">Copy</button>
          <button class="small-btn" id="modeCancelBtn">Cancel</button>
        </div>
        <div class="mode-note" id="modeNote"></div>
      </div>
    </div>
  </section>

  <section class="board-zone">
    <div class="player-strip" id="topStrip">
      <div class="mark-badge o" id="topBadge">O</div>
      <span class="strip-name" id="topName">Opponent</span>
      <span class="strip-score o" id="topScore">0</span>
    </div>
    <div class="board" id="board"></div>
    <div class="player-strip" id="bottomStrip">
      <div class="mark-badge x" id="bottomBadge">X</div>
      <span class="strip-name" id="bottomName">You</span>
      <span class="strip-score x" id="bottomScore">0</span>
    </div>
  </section>

  <aside class="side">
    <section class="panel">
      <div class="panel-title">Tic Tac Toe</div>
      <div class="status-main" id="statusMain">Pick a mode to start.</div>
      <div class="status-sub" id="statusSub"></div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="newGameBtn">New game</button>
        <button class="ctrl-btn" id="rematchBtn">Rematch</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">Online match</div>
      <button class="online-btn primary" id="friendBtn">Create friend code</button>
      <div class="join-line">
        <input class="code-input" id="sideJoinInput" placeholder="Code or invite link">
        <button class="small-btn" id="sideJoinBtn">Join</button>
      </div>
      <div class="room-line" id="roomLine">
        <div class="room-code" id="roomCode"></div>
        <button class="small-btn" id="copyBtn">Copy</button>
        <button class="small-btn" id="leaveBtn">Leave</button>
      </div>
      <div class="online-note" id="onlineNote">Create a code to play with a friend.</div>
    </section>

    <section class="panel">
      <div class="panel-title">Score</div>
      <div class="score-row">
        <div class="score-pill x"><span class="label">X</span><span class="val" id="scoreX">0</span></div>
        <div class="score-pill o"><span class="label">O</span><span class="val" id="scoreO">0</span></div>
      </div>
    </section>
  </aside>

</main>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getDatabase, ref, set, get, update, remove, onValue, onDisconnect, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';
import { getAuth, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';

const fbApp = initializeApp({
  apiKey: 'AIzaSyBQjDeFUKpleEsc2Fl3yZdnNje0cyAGaKU',
  authDomain: 'd-game-b50ef.firebaseapp.com',
  databaseURL: 'https://d-game-b50ef-default-rtdb.firebaseio.com',
  projectId: 'd-game-b50ef',
  storageBucket: 'd-game-b50ef.firebasestorage.app',
  messagingSenderId: '80712714092',
  appId: '1:80712714092:web:4b15f70196f05942905549'
});
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

// --- Sound ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx;
function _ac() { if (!_ctx) _ctx = new AudioCtx(); if (_ctx.state === 'suspended') _ctx.resume(); return _ctx; }

function sfxPlace(mark) {
  try {
    const ctx = _ac(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    const f = mark === 'X' ? 660 : 440;
    o.frequency.setValueAtTime(f, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f * 0.83, ctx.currentTime + 0.11);
    g.gain.setValueAtTime(0.32, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);
    o.start(); o.stop(ctx.currentTime + 0.13);
  } catch(e) {}
}

function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => {
    try {
      const ctx = _ac(), o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.28, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
      o.start(); o.stop(ctx.currentTime + 0.38);
    } catch(e) {}
  }, i * 90));
}

function sfxDraw() {
  [330, 262].forEach((f, i) => setTimeout(() => {
    try {
      const ctx = _ac(), o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      o.start(); o.stop(ctx.currentTime + 0.45);
    } catch(e) {}
  }, i * 190));
}

// --- Game logic ---
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function checkResult(b) {
  for (const line of WINS) {
    const [a,c,d] = line;
    if (b[a] && b[a] === b[c] && b[c] === b[d]) return { winner: b[a], line };
  }
  if (b.every(Boolean)) return { winner: null, line: null, draw: true };
  return null;
}

function bestAiMove(board, aiMark) {
  const opp = aiMark === 'X' ? 'O' : 'X';
  const empty = board.map((v,i) => v ? -1 : i).filter(i => i >= 0);
  // Win
  for (const i of empty) { const b = [...board]; b[i] = aiMark; if (checkResult(b)?.winner === aiMark) return i; }
  // Block
  for (const i of empty) { const b = [...board]; b[i] = opp; if (checkResult(b)?.winner === opp) return i; }
  // Center
  if (empty.includes(4)) return 4;
  // Corners
  const corners = [0,2,6,8].filter(i => empty.includes(i));
  if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
  return empty[Math.floor(Math.random() * empty.length)];
}

// --- State ---
let board = Array(9).fill(null);
let prevBoard = Array(9).fill(null);
let turn = 'X';
let result = null;
let scoreX = 0, scoreO = 0;
let aiMode = false, aiThinking = false;
let onlineMode = false, currentRoomId = null, playerMark = null, roomState = null, roomUnsub = null;
let myName = 'Guest', opponentName = 'Guest';

const playerId = (() => {
  let id = sessionStorage.getItem('bkTttId');
  if (!id) { id = `p_${Math.random().toString(36).slice(2,10)}`; sessionStorage.setItem('bkTttId', id); }
  return id;
})();

const urlRoom = new URLSearchParams(location.search).get('room');

onAuthStateChanged(auth, async user => {
  if (user) {
    try { const s = await get(ref(db, `profiles/${user.uid}/username`)); myName = s.exists() ? s.val() : 'Guest'; }
    catch { myName = 'Guest'; }
  } else { myName = 'Guest'; }
  render();
});

function rRef(id) { return ref(db, `tttRooms/${id}`); }
function makeId() { return Math.random().toString(36).slice(2,8).toUpperCase(); }

function roomUrl(id) {
  try { if (window.parent !== window) { const u = new URL(window.parent.location.href); u.searchParams.set('room',id); return u.toString(); } } catch {}
  const u = new URL(location.href); u.searchParams.set('room',id); return u.toString();
}
function setUrlRoom(id) {
  try { if (window.parent !== window) { const u = new URL(window.parent.location.href); id ? u.searchParams.set('room',id) : u.searchParams.delete('room'); window.parent.history.replaceState(null,'',u); return; } } catch {}
  const u = new URL(location.href); id ? u.searchParams.set('room',id) : u.searchParams.delete('room'); history.replaceState(null,'',u);
}

// --- DOM ---
const boardEl = document.getElementById('board');
const statusMain = document.getElementById('statusMain');
const statusSub = document.getElementById('statusSub');
const topName = document.getElementById('topName');
const bottomName = document.getElementById('bottomName');
const topBadge = document.getElementById('topBadge');
const bottomBadge = document.getElementById('bottomBadge');
const topScore = document.getElementById('topScore');
const bottomScore = document.getElementById('bottomScore');
const scoreXEl = document.getElementById('scoreX');
const scoreOEl = document.getElementById('scoreO');
const modeScreen = document.getElementById('modeScreen');
const friendSetup = document.getElementById('friendSetup');
const modeNote = document.getElementById('modeNote');
const modeRoomLine = document.getElementById('modeRoomLine');
const modeRoomCode = document.getElementById('modeRoomCode');
const onlineNote = document.getElementById('onlineNote');
const roomLine = document.getElementById('roomLine');
const roomCode = document.getElementById('roomCode');

function showModeScreen() { document.body.classList.add('mode-active'); modeScreen.classList.remove('hidden'); }
function hideModeScreen() { document.body.classList.remove('mode-active'); modeScreen.classList.add('hidden'); }
function setOnlineNote(t) { onlineNote.textContent = t; }
function setModeNote(t) { modeNote.textContent = t; }
function showModeRoom(id) {
  modeRoomLine.classList.toggle('active', Boolean(id));
  modeRoomCode.textContent = id || '';
  document.getElementById('modeCopyBtn').style.display = id ? '' : 'none';
}
function showRoomLine(id) {
  roomLine.classList.toggle('active', Boolean(id));
  if (id) roomCode.textContent = roomUrl(id);
}
function setModeBusy(b) {
  ['createFriendBtn','joinCodeBtn','joinCodeInput'].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = b; });
}

// --- Render ---
function renderBoard() {
  boardEl.innerHTML = '';
  const winLine = result?.line || [];
  const disabled = !canMove();
  board.forEach((val, i) => {
    const btn = document.createElement('button');
    btn.className = 'cell' + (val ? ' ' + val.toLowerCase() : '') + (winLine.includes(i) ? ' win' : '');
    btn.textContent = val || '';
    btn.disabled = disabled || Boolean(val);
    btn.addEventListener('click', () => handleCell(i));
    boardEl.appendChild(btn);
  });
}

function canMove() {
  if (result) return false;
  if (onlineMode) { if (!roomState || roomState.status !== 'playing') return false; return playerMark === turn; }
  if (aiMode && turn === 'O') return false;
  return true;
}

function renderStatus() {
  if (!aiMode && !onlineMode && board.every(v => !v)) { statusMain.textContent = 'X goes first.'; statusSub.textContent = ''; return; }
  if (result) {
    if (result.draw) { statusMain.textContent = 'Draw!'; statusSub.textContent = 'No winner this round. Rematch?'; }
    else {
      const who = onlineMode ? (result.winner === playerMark ? 'You win!' : 'Opponent wins.') : aiMode ? (result.winner === 'X' ? 'You win!' : 'Computer wins.') : `${result.winner} wins!`;
      statusMain.textContent = who;
      statusSub.textContent = 'Click Rematch or New game.';
    }
    return;
  }
  if (onlineMode) {
    const waiting = !roomState || roomState.status === 'waiting';
    if (waiting) { statusMain.textContent = 'Waiting for opponent...'; statusSub.textContent = 'Copy the invite link and send it to your friend.'; return; }
    statusMain.textContent = turn === playerMark ? 'Your turn.' : "Opponent's turn.";
    statusSub.textContent = `${turn} to move. You are ${playerMark}.`;
    return;
  }
  if (aiMode && turn === 'O' && aiThinking) { statusMain.textContent = 'Computer is thinking...'; statusSub.textContent = ''; return; }
  statusMain.textContent = aiMode ? (turn === 'X' ? 'Your turn.' : "Computer's turn.") : `${turn}'s turn.`;
  statusSub.textContent = '';
}

function renderStrips() {
  // Top = O, Bottom = X always (no flip in ttt)
  const xLabel = onlineMode ? (playerMark === 'X' ? myName : opponentName) : aiMode ? myName : 'X Player';
  const oLabel = onlineMode ? (playerMark === 'O' ? myName : opponentName) : aiMode ? 'Computer' : 'O Player';
  topBadge.textContent = 'O'; topBadge.className = 'mark-badge o';
  bottomBadge.textContent = 'X'; bottomBadge.className = 'mark-badge x';
  topName.textContent = oLabel;
  bottomName.textContent = xLabel;
  topScore.textContent = scoreO;
  bottomScore.textContent = scoreX;
  topScore.className = 'strip-score o';
  bottomScore.className = 'strip-score x';
}

function renderSidePanel() {
  document.getElementById('friendBtn').disabled = onlineMode;
  document.getElementById('sideJoinInput').disabled = onlineMode;
  document.getElementById('sideJoinBtn').disabled = onlineMode;
  document.getElementById('leaveBtn').disabled = !onlineMode;
  document.getElementById('rematchBtn').disabled = !result && board.every(v => !v);
  showRoomLine(currentRoomId);
  scoreXEl.textContent = scoreX;
  scoreOEl.textContent = scoreO;
}

function render() { renderBoard(); renderStatus(); renderStrips(); renderSidePanel(); }

// --- Move handling ---
function handleCell(i) {
  if (!canMove() || board[i]) return;
  const next = [...board];
  next[i] = turn;
  if (onlineMode) { syncMove(next); return; }
  applyMove(next);
  if (aiMode) scheduleAi();
}

function applyMove(next) {
  const prevTurn = turn;
  board = next;
  result = checkResult(board);
  if (!result) turn = turn === 'X' ? 'O' : 'X';
  else { if (result.winner === 'X') scoreX++; else if (result.winner === 'O') scoreO++; }
  if (result?.winner) sfxWin();
  else if (result?.draw) sfxDraw();
  else sfxPlace(prevTurn);
  render();
}

// --- AI ---
function scheduleAi() {
  if (!aiMode || aiThinking || result || turn !== 'O') return;
  aiThinking = true;
  setTimeout(() => {
    if (!aiMode) { aiThinking = false; return; }
    const move = bestAiMove(board, 'O');
    if (move >= 0) { const next = [...board]; next[move] = 'O'; applyMove(next); }
    aiThinking = false;
  }, 350 + Math.random() * 300);
}

// --- Online ---
async function syncMove(next) {
  if (!currentRoomId) return;
  const nextTurn = turn === 'X' ? 'O' : 'X';
  const res = checkResult(next);
  const updates = { board: next, turn: nextTurn, updatedAt: serverTimestamp() };
  if (res) {
    updates.status = res.draw ? 'draw' : 'won';
    updates.winner = res.winner || null;
    updates.winLine = res.line || null;
    if (res.winner === 'X') updates.xScore = (roomState?.xScore || 0) + 1;
    else if (res.winner === 'O') updates.oScore = (roomState?.oScore || 0) + 1;
  }
  await update(rRef(currentRoomId), updates);
}

function applyRoomState(state) {
  const newBoard = state.board || Array(9).fill(null);
  let movedMark = null;
  for (let i = 0; i < 9; i++) { if (newBoard[i] && !prevBoard[i]) { movedMark = newBoard[i]; break; } }
  board = newBoard;
  prevBoard = [...newBoard];
  turn = state.turn || 'X';
  const res = state.status === 'won' ? { winner: state.winner, line: state.winLine || [] } : state.status === 'draw' ? { winner: null, line: null, draw: true } : null;
  if (movedMark) {
    if (res?.winner) sfxWin();
    else if (res?.draw) sfxDraw();
    else sfxPlace(movedMark);
  }
  result = res;
  scoreX = state.xScore || 0;
  scoreO = state.oScore || 0;
  opponentName = playerMark === 'X' ? (state.oName || 'Guest') : (state.xName || 'Guest');
}

function listenRoom(id) {
  if (roomUnsub) roomUnsub();
  roomUnsub = onValue(rRef(id), snap => {
    if (!snap.exists()) { leaveOnline(false); setOnlineNote('Room closed.'); render(); return; }
    const state = snap.val();
    roomState = state;
    if (!playerMark) playerMark = state.xPlayer === playerId ? 'X' : state.oPlayer === playerId ? 'O' : null;
    applyRoomState(state);
    if (onlineMode && state.xPlayer && state.oPlayer) { hideModeScreen(); showModeRoom(null); setModeBusy(false); }
    render();
  });
}

async function createRoom() {
  await leaveOnline(false);
  const id = makeId();
  currentRoomId = id; playerMark = 'X'; onlineMode = true; aiMode = false;
  board = Array(9).fill(null); turn = 'X'; result = null; scoreX = 0; scoreO = 0;
  roomState = { xPlayer: playerId, oPlayer: null, status: 'waiting' };
  opponentName = 'Guest';
  await set(rRef(id), { xPlayer: playerId, xName: myName, oPlayer: null, oName: null, board: Array(9).fill(null), turn: 'X', status: 'waiting', winner: null, winLine: null, xScore: 0, oScore: 0, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
  onDisconnect(ref(db, `tttRooms/${id}/xOnline`)).remove();
  await set(ref(db, `tttRooms/${id}/xOnline`), true);
  setUrlRoom(id);
  listenRoom(id);
  showModeRoom(id);
  setModeBusy(true);
  setModeNote(`Waiting for friend. Code: ${id}`);
  showModeScreen();
  render();
}

async function joinRoom(raw) {
  const id = (raw || '').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
  if (!id) { setModeNote('Enter a code first.'); return; }
  setModeNote(`Joining ${id}...`); setModeBusy(true);
  await leaveOnline(false);
  const snap = await get(rRef(id));
  if (!snap.exists()) { showModeRoom(null); setModeBusy(false); setModeNote('Room not found.'); return; }
  const existing = snap.val();
  if (existing.oPlayer && existing.oPlayer !== playerId) { showModeRoom(null); setModeBusy(false); setModeNote('Room is full.'); return; }
  const updates = {};
  if (!existing.oPlayer || existing.oPlayer === playerId) {
    if (existing.xPlayer !== playerId) { updates.oPlayer = playerId; updates.oName = myName; updates.status = 'playing'; updates.updatedAt = serverTimestamp(); }
  }
  if (Object.keys(updates).length) await update(rRef(id), updates);
  currentRoomId = id; onlineMode = true; aiMode = false;
  playerMark = (existing.oPlayer === playerId || updates.oPlayer) ? 'O' : 'X';
  roomState = { ...existing, ...updates };
  opponentName = playerMark === 'X' ? (roomState.oName || 'Guest') : (roomState.xName || 'Guest');
  applyRoomState(roomState);
  hideModeScreen(); showModeRoom(null); setModeBusy(false); setModeNote('');
  const onKey = playerMark === 'X' ? 'xOnline' : 'oOnline';
  onDisconnect(ref(db, `tttRooms/${id}/${onKey}`)).remove();
  await set(ref(db, `tttRooms/${id}/${onKey}`), true);
  setUrlRoom(id);
  listenRoom(id);
  render();
}

async function leaveOnline(updateUrl = true) {
  if (roomUnsub) { roomUnsub(); roomUnsub = null; }
  if (currentRoomId && playerMark) {
    const k = playerMark === 'X' ? 'xOnline' : 'oOnline';
    await remove(ref(db, `tttRooms/${currentRoomId}/${k}`)).catch(() => {});
  }
  onlineMode = false; currentRoomId = null; playerMark = null; roomState = null;
  setModeBusy(false); showModeRoom(null);
  if (updateUrl) setUrlRoom(null);
}

async function rematch() {
  if (onlineMode && currentRoomId) {
    prevBoard = Array(9).fill(null);
    await update(rRef(currentRoomId), { board: Array(9).fill(null), turn: 'X', status: 'playing', winner: null, winLine: null, updatedAt: serverTimestamp() });
    return;
  }
  board = Array(9).fill(null); prevBoard = Array(9).fill(null); turn = 'X'; result = null; aiThinking = false;
  render();
  if (aiMode) scheduleAi();
}

// --- Event listeners ---
document.getElementById('vsAiBtn').addEventListener('click', async () => {
  await leaveOnline(false); aiMode = true; onlineMode = false; playerMark = 'X';
  board = Array(9).fill(null); turn = 'X'; result = null; scoreX = 0; scoreO = 0; aiThinking = false;
  setUrlRoom(null); hideModeScreen(); setOnlineNote('vs Computer. You are X.'); render();
});

document.getElementById('sameDeviceBtn').addEventListener('click', async () => {
  await leaveOnline(false); aiMode = false; onlineMode = false; playerMark = null;
  board = Array(9).fill(null); turn = 'X'; result = null; scoreX = 0; scoreO = 0;
  setUrlRoom(null); hideModeScreen(); setOnlineNote('Same device - share the screen.'); render();
});

document.getElementById('friendModeBtn').addEventListener('click', () => {
  friendSetup.classList.toggle('open');
  if (friendSetup.classList.contains('open')) document.getElementById('joinCodeInput').focus();
  setModeNote('');
});

document.getElementById('createFriendBtn').addEventListener('click', () => {
  createRoom().catch(e => { console.error(e); showModeRoom(null); setModeBusy(false); setModeNote('Error: ' + (e?.message || e)); });
});

document.getElementById('joinCodeBtn').addEventListener('click', () => {
  joinRoom(document.getElementById('joinCodeInput').value).catch(e => { console.error(e); setModeBusy(false); setModeNote('Could not join.'); });
});

document.getElementById('joinCodeInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('joinCodeBtn').click(); });

document.getElementById('modeCopyBtn').addEventListener('click', async () => {
  if (!currentRoomId) return;
  try { await navigator.clipboard.writeText(roomUrl(currentRoomId)); setModeNote('Link copied!'); } catch { setModeNote(roomUrl(currentRoomId)); }
});

document.getElementById('modeCancelBtn').addEventListener('click', async () => {
  await leaveOnline(); board = Array(9).fill(null); turn = 'X'; result = null;
  showModeScreen(); setModeNote('Canceled.'); render();
});

document.getElementById('friendBtn').addEventListener('click', () => {
  createRoom().catch(e => { console.error(e); setOnlineNote('Error: ' + (e?.message || e)); });
});

document.getElementById('sideJoinBtn').addEventListener('click', () => {
  joinRoom(document.getElementById('sideJoinInput').value).catch(e => { console.error(e); setOnlineNote('Could not join.'); });
});

document.getElementById('sideJoinInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('sideJoinBtn').click(); });

document.getElementById('copyBtn').addEventListener('click', async () => {
  if (!currentRoomId) return;
  try { await navigator.clipboard.writeText(roomUrl(currentRoomId)); setOnlineNote('Link copied!'); } catch { setOnlineNote(roomUrl(currentRoomId)); }
});

document.getElementById('leaveBtn').addEventListener('click', async () => {
  await leaveOnline(); board = Array(9).fill(null); turn = 'X'; result = null; scoreX = 0; scoreO = 0;
  showModeScreen(); setOnlineNote('Left match.'); render();
});

document.getElementById('newGameBtn').addEventListener('click', async () => {
  if (onlineMode && currentRoomId) {
    await update(rRef(currentRoomId), { board: Array(9).fill(null), turn: 'X', status: 'playing', winner: null, winLine: null, xScore: 0, oScore: 0, updatedAt: serverTimestamp() });
    return;
  }
  board = Array(9).fill(null); turn = 'X'; result = null; scoreX = 0; scoreO = 0; aiThinking = false;
  render();
});

document.getElementById('rematchBtn').addEventListener('click', rematch);

window.addEventListener('beforeunload', () => {
  if (currentRoomId && playerMark) {
    const k = playerMark === 'X' ? 'xOnline' : 'oOnline';
    remove(ref(db, `tttRooms/${currentRoomId}/${k}`)).catch(() => {});
  }
});

// --- Init ---
if (urlRoom) {
  hideModeScreen();
  joinRoom(urlRoom).catch(e => {
    console.error(e); showModeScreen();
    friendSetup.classList.add('open');
    document.getElementById('joinCodeInput').value = urlRoom;
    setModeNote('Could not join that room.');
    render();
  });
} else {
  showModeScreen(); showModeRoom(null); setModeBusy(false); render();
}
</script>
