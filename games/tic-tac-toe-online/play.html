<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Tic Tac Toe - BonkerGames</title>
<style>
* { box-sizing: border-box; }

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #101218;
}

iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
</style>
</head>
<body>
<iframe id="gameFrame" src="index.html" allow="clipboard-write"></iframe>
<script>
const room = new URLSearchParams(location.search).get('room');
if (room) {
  document.getElementById('gameFrame').src = `index.html?room=${encodeURIComponent(room)}`;
}
</script>
</body>
</html>
