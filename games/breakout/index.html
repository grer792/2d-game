<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
:root { --bg:#13131f; --accent:#7c5cfc; --text:#ffffff; --text2:#9898b8; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:Inter,system-ui,sans-serif; }
canvas { position:absolute; inset:0; display:block; }
button { font:inherit; cursor:pointer; }
#overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; background:rgba(13,13,25,0.9); backdrop-filter:blur(5px);
}
#overlay h1 { font-size:clamp(2rem,8vw,3rem); font-weight:950; }
#overlay h1 span { color:var(--accent); }
#overlay p { color:var(--text2); font-size:0.92rem; }
#result { font-size:1.1rem; font-weight:800; display:none; }
#result.win { color:#4ade80; }
#result.lose { color:#ff6b7f; }
.btn { background:var(--accent); color:#fff; border:none; padding:13px 36px; border-radius:10px; font-size:1rem; font-weight:800; transition:background .15s; }
.btn:hover { background:#6a4de0; }
#mobile-hint { display:none; font-size:0.75rem; color:var(--text2); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>Bonker <span>Breakout</span></h1>
  <p>Break all the bricks. Don't let the ball drop.</p>
  <div id="result"></div>
  <button class="btn" id="startBtn">Play</button>
  <p id="mobile-hint">Tilt or drag to move the paddle</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Sound ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx;
function _ac(){if(!_ctx)_ctx=new AudioCtx();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function beep(freq,dur,type='sine',vol=0.15){
  try{const c=_ac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.start();o.stop(c.currentTime+dur);}catch(e){}
}
function sfxBrick(row){ beep(300+row*30, 0.08, 'square', 0.14); }
function sfxPaddle(){ beep(200, 0.06, 'sine', 0.1); }
function sfxWall(){ beep(180, 0.05, 'sine', 0.08); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sine',0.2),i*90)); }
function sfxLose(){ [330,220,150].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'sawtooth',0.18),i*120)); }

// --- State ---
let W, H, bw, bh, cols, rows;
const ROWS=6, COLS=10, BALL_R=7, PAD_H=12, PAD_W_RATIO=0.14;
let ball, pad, bricks, score, lives, running=false, raf;
let touchX=null;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  bw=W/COLS; bh=Math.min(H*0.045,28);
  if(running) drawFrame();
}
window.addEventListener('resize',resize);
resize();

const BRICK_COLORS=[
  ['#ff6b7f','#e05570'],['#ff8a6b','#e06050'],['#f5b84b','#d09a30'],
  ['#7c5cfc','#6040d0'],['#4dd6bc','#35b09a'],['#9b7dff','#7c5cdd']
];

function initBricks(){
  bricks=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    bricks.push({r,c,alive:true,col:BRICK_COLORS[r%BRICK_COLORS.length]});
}

function startGame(){
  const pw=W*PAD_W_RATIO;
  pad={x:W/2-pw/2,y:H-50,w:pw,h:PAD_H,speed:W*0.012};
  const angle=-Math.PI/2+(Math.random()-0.5)*0.6;
  const spd=Math.max(W,H)*0.007;
  ball={x:W/2,y:H-80,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:BALL_R};
  score=0; lives=3; running=true;
  initBricks();
  document.getElementById('overlay').style.display='none';
  document.getElementById('mobile-hint').style.display=isMobile()?'block':'none';
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(tick);
}

function isMobile(){return 'ontouchstart' in window;}

function tick(){
  if(!running){return;}
  update();
  drawFrame();
  raf=requestAnimationFrame(tick);
}

const keys={};
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);
document.addEventListener('mousemove',e=>{if(running){pad.x=e.clientX-pad.w/2;clampPad();}});
document.addEventListener('touchmove',e=>{
  if(running&&e.touches.length){e.preventDefault();touchX=e.touches[0].clientX;pad.x=touchX-pad.w/2;clampPad();}
},{passive:false});

function clampPad(){pad.x=Math.max(0,Math.min(W-pad.w,pad.x));}

function update(){
  if(keys['ArrowLeft']||keys['a']||keys['A']) pad.x-=pad.speed;
  if(keys['ArrowRight']||keys['d']||keys['D']) pad.x+=pad.speed;
  clampPad();

  ball.x+=ball.vx; ball.y+=ball.vy;

  // Walls
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-1;sfxWall();}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx*=-1;sfxWall();}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-1;sfxWall();}

  // Paddle
  if(ball.vy>0&&ball.y+ball.r>=pad.y&&ball.y+ball.r<=pad.y+pad.h+ball.r*2&&ball.x>=pad.x-ball.r&&ball.x<=pad.x+pad.w+ball.r){
    ball.vy=Math.abs(ball.vy)*-1;
    const hit=(ball.x-(pad.x+pad.w/2))/(pad.w/2);
    ball.vx=hit*Math.max(W,H)*0.008;
    sfxPaddle();
  }

  // Bricks
  const margin_top=H*0.12;
  for(const b of bricks){
    if(!b.alive) continue;
    const bx=b.c*bw, by=margin_top+b.r*bh;
    const pad2=3;
    if(ball.x+ball.r>bx+pad2&&ball.x-ball.r<bx+bw-pad2&&ball.y+ball.r>by+pad2&&ball.y-ball.r<by+bh-pad2){
      b.alive=false; score+=10*(b.r+1);
      // Figure out which side was hit
      const fromLeft=ball.x<bx+bw/2, fromTop=ball.y<by+bh/2;
      const ox=fromLeft?(ball.x+ball.r)-(bx+pad2):(bx+bw-pad2)-(ball.x-ball.r);
      const oy=fromTop?(ball.y+ball.r)-(by+pad2):(by+bh-pad2)-(ball.y-ball.r);
      if(ox<oy) ball.vx*=-1; else ball.vy*=-1;
      sfxBrick(b.r);
      break;
    }
  }

  // Ball lost
  if(ball.y-ball.r>H){
    lives--;
    if(lives<=0){ gameOver(false); return; }
    const pw=W*PAD_W_RATIO;
    pad.x=W/2-pw/2;
    const angle=-Math.PI/2+(Math.random()-0.5)*0.4;
    const spd=Math.max(W,H)*0.007;
    ball={x:W/2,y:H-80,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:BALL_R};
  }

  // All bricks gone
  if(bricks.every(b=>!b.alive)){ gameOver(true); }
}

function gameOver(win){
  running=false; cancelAnimationFrame(raf);
  const r=document.getElementById('result');
  r.textContent=win?`You cleared it! Score: ${score}`:`Game over! Score: ${score}`;
  r.className=win?'win':'lose';
  r.style.display='block';
  document.getElementById('startBtn').textContent='Play again';
  document.getElementById('overlay').style.display='flex';
  if(win) sfxWin(); else sfxLose();
}

function drawFrame(){
  ctx.fillStyle='#13131f'; ctx.fillRect(0,0,W,H);

  const margin_top=H*0.12;

  // Bricks
  bricks.forEach(b=>{
    if(!b.alive) return;
    const x=b.c*bw+3, y=margin_top+b.r*bh+3, w=bw-6, h=bh-6;
    const grd=ctx.createLinearGradient(x,y,x,y+h);
    grd.addColorStop(0,b.col[0]); grd.addColorStop(1,b.col[1]);
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
  });

  // HUD
  ctx.fillStyle='#9898b8'; ctx.font='700 0.82rem Inter,sans-serif'; ctx.textAlign='left';
  ctx.fillText(`Score: ${score}`, 16, 22);
  ctx.textAlign='right';
  ctx.fillText(`Lives: ${'❤️'.repeat(lives)}`, W-16, 22);

  // Paddle
  const grdP=ctx.createLinearGradient(pad.x,pad.y,pad.x,pad.y+pad.h);
  grdP.addColorStop(0,'#9b7dff'); grdP.addColorStop(1,'#7c5cfc');
  ctx.fillStyle=grdP;
  ctx.shadowColor='#7c5cfc'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.roundRect(pad.x,pad.y,pad.w,pad.h,6); ctx.fill();
  ctx.shadowBlur=0;

  // Ball
  ctx.shadowColor='#ff6b7f'; ctx.shadowBlur=14;
  ctx.fillStyle='#ff6b7f';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

document.getElementById('startBtn').addEventListener('click',startGame);

// Idle draw
(function idle(){if(!running){ctx.fillStyle='#13131f';ctx.fillRect(0,0,canvas.width,canvas.height);}requestAnimationFrame(idle);})();
</script>
</body>
</html>
