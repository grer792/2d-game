<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#13131f;color:#fff;font-family:Inter,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:12px;user-select:none}
h1{font-size:1.4rem;font-weight:800;color:#7c5cfc}
.topbar{display:flex;align-items:center;gap:20px;font-size:.9rem}
.topbar span{display:flex;align-items:center;gap:6px;color:#9898b8}
.topbar b{color:#fff;font-size:1.1rem;font-weight:700}
.face-btn{background:#252538;border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:6px 14px;cursor:pointer;font-size:1.3rem;transition:background .15s}
.face-btn:hover{background:#2e2e45}
.diff{display:flex;gap:8px}
.diff button{background:#252538;color:#9898b8;border:1.5px solid rgba(255,255,255,.07);padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s}
.diff button.active,.diff button:hover{background:#7c5cfc;color:#fff;border-color:#7c5cfc}
.grid{display:inline-grid;gap:3px;background:#1c1c2e;padding:10px;border-radius:14px;border:1.5px solid rgba(255,255,255,.07)}
.cell{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .1s,transform .1s;border:none;outline:none}
.cell.hidden{background:#252538}
.cell.hidden:hover{background:#2e2e45}
.cell.flagged{background:#252538;font-size:1rem}
.cell.revealed{background:#13131f;cursor:default}
.cell.mine{background:#ff4d6d!important;font-size:1rem}
.cell.exploded{background:#ff1144!important;animation:boom .3s ease}
@keyframes boom{0%{transform:scale(1.4)}100%{transform:scale(1)}}
.n1{color:#4a9eff}.n2{color:#4ade80}.n3{color:#ff4d6d}.n4{color:#7c5cfc}.n5{color:#f59e0b}.n6{color:#06b6d4}.n7{color:#ec4899}.n8{color:#9898b8}
.msg{font-size:1rem;font-weight:700;min-height:1.4rem;color:#4ade80}
.msg.lose{color:#ff4d6d}
</style>
</head>
<body>
<h1>Minesweeper</h1>
<div class="diff">
  <button onclick="setDiff('easy')" id="easy" class="active">Easy</button>
  <button onclick="setDiff('medium')" id="medium">Medium</button>
  <button onclick="setDiff('hard')" id="hard">Hard</button>
</div>
<div class="topbar">
  <span>&#128163;<b id="mcount">0</b></span>
  <button class="face-btn" id="face" onclick="startGame()">&#128512;</button>
  <span>&#9201;<b id="timer">0</b></span>
</div>
<div class="grid" id="grid"></div>
<div class="msg" id="msg"></div>

<script>
const DIFFS={easy:{r:9,c:9,m:10},medium:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
let rows,cols,mines,board,revealed,flagged,gameOver,firstClick,timerVal,timerInterval,diff='easy';

function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff button').forEach(b=>b.classList.remove('active'));
  document.getElementById(d).classList.add('active');
  startGame();
}

function startGame(){
  clearInterval(timerInterval);
  const D=DIFFS[diff];rows=D.r;cols=D.c;mines=D.m;
  board=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false;firstClick=true;timerVal=0;
  document.getElementById('mcount').textContent=mines;
  document.getElementById('timer').textContent='0';
  document.getElementById('face').textContent='&#128512;';
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='msg';
  renderGrid();
}

function placeMines(skipR,skipC){
  let placed=0;
  while(placed<mines){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(board[r][c]===-1)continue;
    if(Math.abs(r-skipR)<=1&&Math.abs(c-skipC)<=1)continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(board[r][c]===-1)continue;
    board[r][c]=neighbors(r,c).filter(([nr,nc])=>board[nr][nc]===-1).length;
  }
}

function neighbors(r,c){
  const n=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)n.push([nr,nc]);
  }return n;
}

function reveal(r,c){
  if(revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===0)neighbors(r,c).forEach(([nr,nc])=>reveal(nr,nc));
}

function click(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  if(firstClick){firstClick=false;placeMines(r,c);timerInterval=setInterval(()=>{timerVal++;document.getElementById('timer').textContent=timerVal;},1000);}
  if(board[r][c]===-1){
    revealed[r][c]=true;gameOver=true;
    document.getElementById('face').textContent='&#128565;';
    document.getElementById('msg').textContent='BOOM! Game over.';
    document.getElementById('msg').className='msg lose';
    clearInterval(timerInterval);
    for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++)if(board[rr][cc]===-1)revealed[rr][cc]=true;
    renderGrid(r,c);return;
  }
  reveal(r,c);checkWin();renderGrid();
}

function rightClick(e,r,c){
  e.preventDefault();if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  const fc=Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>flagged[r][c]?1:0)).flat().reduce((a,b)=>a+b,0);
  document.getElementById('mcount').textContent=mines-fc;
  renderGrid();
}

function checkWin(){
  const unrevealed=revealed.flat().filter(v=>!v).length;
  if(unrevealed===mines){
    gameOver=true;clearInterval(timerInterval);
    document.getElementById('face').textContent='&#129395;';
    document.getElementById('msg').textContent=`You won in ${timerVal}s!`;
  }
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.style.gridTemplateColumns=`repeat(${cols},34px)`;
  g.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const el=document.createElement('button');
    if(revealed[r][c]){
      if(board[r][c]===-1){el.className='cell mine';el.textContent='&#128163;';}
      else{el.className='cell revealed';el.textContent=board[r][c]||'';if(board[r][c]>0)el.classList.add('n'+board[r][c]);}
    }else if(flagged[r][c]){
      el.className='cell flagged';el.textContent='&#127988;';
    }else{
      el.className='cell hidden';
    }
    const rr=r,cc=c;
    el.addEventListener('click',()=>click(rr,cc));
    el.addEventListener('contextmenu',e=>rightClick(e,rr,cc));
    g.appendChild(el);
  }
}

startGame();
</script>
</body>
</html>
