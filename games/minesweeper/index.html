<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#13131f;font-family:Inter,system-ui,sans-serif;color:#fff;overflow:hidden;user-select:none}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#13131f;z-index:20;transition:opacity .3s}
.screen.hidden{opacity:0;pointer-events:none}
.logo{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:.85rem;color:#9898b8;margin-top:-10px}
.diff-row{display:flex;gap:10px}
.diff-btn{padding:9px 22px;border-radius:10px;border:1.5px solid rgba(255,255,255,.08);background:#252538;color:#9898b8;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.diff-btn:hover,.diff-btn.sel{background:#7c5cfc;color:#fff;border-color:#7c5cfc}
.play-btn{padding:13px 48px;border-radius:12px;border:none;background:#7c5cfc;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s}
.play-btn:hover{background:#6a4de0}
.diff-info{background:#1c1c2e;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 16px;font-size:.78rem;color:#9898b8;text-align:center;line-height:1.7}
.diff-info b{color:#a78bfa}

/* ── Game area ── */
#gameArea{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:0;pointer-events:none;transition:opacity .3s}
#gameArea.show{opacity:1;pointer-events:auto}

.topbar{display:flex;align-items:center;gap:16px}
.stat-box{display:flex;align-items:center;gap:7px;background:#1c1c2e;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px 14px;font-size:.82rem}
.stat-val{font-size:1.1rem;font-weight:800;color:#fff}
.face-btn{background:#252538;border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:6px 16px;cursor:pointer;font-size:1.4rem;transition:background .15s;line-height:1}
.face-btn:hover{background:#2e2e45}

/* ── Grid wrapper (scrollable on small screens) ── */
#gridWrap{overflow:auto;max-width:100vw;max-height:calc(100vh - 160px);border-radius:14px}
#gridWrap::-webkit-scrollbar{width:0;height:0}
.grid{display:inline-grid;gap:3px;background:#1c1c2e;padding:8px;border-radius:14px;border:1.5px solid rgba(255,255,255,.07)}

/* ── Cells ── */
.cell{border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;cursor:pointer;border:none;outline:none;font-family:inherit;transition:background .08s,transform .08s;flex-shrink:0}
.cell.hidden{background:#252538;color:#fff}
.cell.hidden:hover{background:#2e2e45}
.cell.flagged{background:#252538}
.cell.revealed{background:#13131f;cursor:default}
.cell.mine-hit{background:#ff4d6d!important;animation:boom .25s ease}
.cell.mine-show{background:#252538}
@keyframes boom{0%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes winPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.cell.win-flash{animation:winPop .4s ease}
.n1{color:#4a9eff}.n2{color:#4ade80}.n3{color:#ff4d6d}.n4{color:#c084fc}.n5{color:#f59e0b}.n6{color:#06b6d4}.n7{color:#ec4899}.n8{color:#9898b8}

/* ── Status bar ── */
.msg{font-size:.9rem;font-weight:700;color:#4ade80;min-height:1.2rem;text-align:center}
.msg.lose{color:#ff4d6d}

.bot-row{display:flex;gap:8px}
.bot-btn{padding:8px 18px;border-radius:9px;border:1.5px solid rgba(255,255,255,.08);background:#252538;color:#9898b8;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.bot-btn:hover{background:#2e2e45;color:#fff}
.back-btn{padding:8px 18px;border-radius:9px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:#9898b8;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.back-btn:hover{color:#fff;background:#252538}

#volWrap{position:absolute;bottom:10px;right:14px;display:flex;align-items:center;gap:6px;opacity:.5;transition:opacity .2s}
#volWrap:hover{opacity:1}
#volWrap label{font-size:.68rem;color:#9898b8}
#volSlider{width:68px;accent-color:#7c5cfc}
</style>
</head>
<body>

<!-- Start screen -->
<div class="screen" id="startScreen">
  <div class="logo">Minesweeper</div>
  <div class="sub">Clear the board without hitting mines</div>
  <div class="diff-row">
    <button class="diff-btn sel" id="dEasy"   onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn" id="dMedium" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn" id="dHard"   onclick="setDiff('hard')">Hard</button>
  </div>
  <div class="diff-info" id="diffInfo">9&times;9 &bull; <b>10</b> mines</div>
  <button class="play-btn" onclick="beginGame()">Play</button>
  <div style="font-size:.75rem;color:#9898b8">Right-click or long-press to flag</div>
</div>

<!-- Game area -->
<div id="gameArea">
  <div class="topbar">
    <div class="stat-box">&#128163; <span class="stat-val" id="mcount">0</span></div>
    <button class="face-btn" id="face" onclick="newGame()">&#128512;</button>
    <div class="stat-box">&#9201; <span class="stat-val" id="timer">0</span></div>
  </div>
  <div id="gridWrap"><div class="grid" id="grid"></div></div>
  <div class="msg" id="msg"></div>
  <div class="bot-row">
    <button class="bot-btn" onclick="newGame()">New Game</button>
    <button class="back-btn" onclick="showStart()">&#8592; Menu</button>
  </div>
</div>

<div id="volWrap">
  <label>Vol</label>
  <input type="range" id="volSlider" min="0" max="100" value="22" oninput="setVol(this.value)">
</div>

<script>
// ── Audio ──────────────────────────────────────────────
const ac=new(window.AudioContext||window.webkitAudioContext)();
const mg=ac.createGain();mg.gain.value=0.22;mg.connect(ac.destination);
function setVol(v){mg.gain.value=v/100;}
function tone(freq,dur=0.08,type='sine',vol=0.45){
  if(ac.state==='suspended')ac.resume();
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g);g.connect(mg);
  o.start();o.stop(ac.currentTime+dur+0.02);
}
const SFX={
  reveal:()=>tone(380,0.05,'sine',0.3),
  flag:()=>tone(440,0.06,'sine',0.35),
  boom:()=>{tone(80,0.3,'sawtooth',0.7);setTimeout(()=>tone(60,0.4,'sawtooth',0.5),80);},
  win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine'),i*100));}
};

// ── Difficulties ───────────────────────────────────────
const DIFFS={
  easy:  {r:9, c:9, m:10},
  medium:{r:16,c:16,m:40},
  hard:  {r:20,c:24,m:99}
};
const DIFF_LABELS={easy:'9\xd79 • 10 mines',medium:'16\xd716 • 40 mines',hard:'20\xd724 • 99 mines'};
let diff='easy';

function setDiff(d){
  diff=d;
  ['easy','medium','hard'].forEach(x=>{
    const el=document.getElementById('d'+x.charAt(0).toUpperCase()+x.slice(1));
    if(el)el.classList.toggle('sel',x===d);
  });
  document.getElementById('diffInfo').innerHTML=DIFF_LABELS[d].replace(' • ','&bull; ').replace(/(\d+ mines)/,'<b>$1</b>');
}

// ── State ──────────────────────────────────────────────
let rows,cols,mines,board,revealed,flagged,gameOver,firstClick,timerVal,timerInterval;
let longPressTimer=null;

function beginGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.add('show');
  newGame();
}

function showStart(){
  clearInterval(timerInterval);
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameArea').classList.remove('show');
}

function newGame(){
  clearInterval(timerInterval);
  const D=DIFFS[diff];rows=D.r;cols=D.c;mines=D.m;
  board=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false;firstClick=true;timerVal=0;
  document.getElementById('mcount').textContent=mines;
  document.getElementById('timer').textContent='0';
  document.getElementById('face').innerHTML='&#128512;';
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='msg';
  renderGrid();
}

function cellSize(){
  const maxW=window.innerWidth-32;
  const maxH=window.innerHeight-200;
  const byW=Math.floor((maxW-16-cols*3)/cols);
  const byH=Math.floor((maxH-16-rows*3)/rows);
  return Math.max(20,Math.min(byW,byH,40));
}

function placeMines(skipR,skipC){
  let placed=0;
  while(placed<mines){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(board[r][c]===-1)continue;
    if(Math.abs(r-skipR)<=1&&Math.abs(c-skipC)<=1)continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(board[r][c]===-1)continue;
    board[r][c]=nbrs(r,c).filter(([nr,nc])=>board[nr][nc]===-1).length;
  }
}

function nbrs(r,c){
  const n=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)n.push([nr,nc]);
  }return n;
}

function reveal(r,c){
  if(revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===0)nbrs(r,c).forEach(([nr,nc])=>reveal(nr,nc));
}

function clickCell(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  if(firstClick){
    firstClick=false;
    placeMines(r,c);
    timerInterval=setInterval(()=>{timerVal++;document.getElementById('timer').textContent=timerVal;},1000);
  }
  if(board[r][c]===-1){
    revealed[r][c]=true;gameOver=true;
    SFX.boom();
    document.getElementById('face').innerHTML='&#128565;';
    document.getElementById('msg').textContent='BOOM! Game over.';
    document.getElementById('msg').className='msg lose';
    clearInterval(timerInterval);
    for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++)if(board[rr][cc]===-1)revealed[rr][cc]=true;
    renderGrid(r,c);return;
  }
  SFX.reveal();
  reveal(r,c);
  checkWin();
  renderGrid();
}

function toggleFlag(r,c){
  if(gameOver||revealed[r][c])return;
  SFX.flag();
  flagged[r][c]=!flagged[r][c];
  let fc=0;for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++)if(flagged[rr][cc])fc++;
  document.getElementById('mcount').textContent=Math.max(0,mines-fc);
  renderGrid();
}

function checkWin(){
  let unrevealed=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!revealed[r][c])unrevealed++;
  if(unrevealed===mines){
    gameOver=true;clearInterval(timerInterval);
    SFX.win();
    document.getElementById('face').innerHTML='&#129395;';
    document.getElementById('msg').textContent=`You won in ${timerVal}s!`;
    // Animate safe cells
    setTimeout(()=>{
      document.querySelectorAll('.cell.revealed').forEach((el,i)=>{
        setTimeout(()=>el.classList.add('win-flash'),i*3);
      });
    },200);
  }
}

function renderGrid(hitR,hitC){
  const sz=cellSize();
  const fs=Math.max(10,Math.floor(sz*.5));
  const g=document.getElementById('grid');
  g.style.gridTemplateColumns=`repeat(${cols},${sz}px)`;
  g.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const el=document.createElement('button');
    el.style.width=el.style.height=sz+'px';
    el.style.fontSize=fs+'px';
    const isHit=hitR===r&&hitC===c;
    if(revealed[r][c]){
      if(board[r][c]===-1){
        el.className='cell '+(isHit?'mine-hit':'mine-show');
        el.innerHTML='&#128163;';
      }else{
        el.className='cell revealed'+(board[r][c]>0?' n'+board[r][c]:'');
        el.textContent=board[r][c]||'';
      }
    }else if(flagged[r][c]){
      el.className='cell flagged';
      el.innerHTML='&#127988;';
    }else{
      el.className='cell hidden';
    }
    const rr=r,cc=c;
    el.addEventListener('click',()=>clickCell(rr,cc));
    el.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(rr,cc);});
    // Long press for mobile flag
    el.addEventListener('touchstart',e=>{
      longPressTimer=setTimeout(()=>{toggleFlag(rr,cc);longPressTimer=null;},500);
    },{passive:true});
    el.addEventListener('touchend',()=>{if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}},{passive:true});
    el.addEventListener('touchmove',()=>{if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}},{passive:true});
    g.appendChild(el);
  }
}

window.addEventListener('resize',()=>{if(document.getElementById('gameArea').classList.contains('show'))renderGrid();});
</script>
</body>
</html>
