<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
:root {
  --bg: #13131f; --bg2: #1c1c2e; --bg3: #252538; --bg4: #2e2e45;
  --accent: #7c5cfc; --accent-h: #6a4de0;
  --text: #ffffff; --text2: #9898b8;
  --border: rgba(255,255,255,0.07);
  --snake: #7c5cfc; --food: #ff6b7f; --grid: rgba(255,255,255,0.03);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
button { font: inherit; cursor: pointer; }

#ui {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; pointer-events: none;
}
#score-display {
  position: absolute; top: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 32px;
  font-size: 0.85rem; font-weight: 700; color: var(--text2);
  pointer-events: none;
}
.score-item span { color: var(--text); font-size: 1.1rem; }

#overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; background: rgba(13,13,25,0.88); backdrop-filter: blur(4px);
}
#overlay h1 { font-size: clamp(2rem, 8vw, 3.2rem); font-weight: 950; letter-spacing: -0.02em; }
#overlay h1 span { color: var(--accent); }
#overlay p { color: var(--text2); font-size: 0.95rem; }
.btn-row { display: flex; gap: 10px; }
.btn {
  background: var(--accent); color: #fff; border: none;
  padding: 13px 32px; border-radius: 10px; font-size: 1rem; font-weight: 800;
  transition: background 0.15s; pointer-events: auto;
}
.btn:hover { background: var(--accent-h); }
.btn.secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
.btn.secondary:hover { background: var(--bg4); color: var(--text); }

#result-label { font-size: 1.1rem; font-weight: 800; color: var(--food); }
#result-label.win { color: #4ade80; }

#dpad {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: none; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: auto;
}
.dpad-row { display: flex; gap: 4px; }
.dpad-btn {
  width: 52px; height: 52px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2); font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.dpad-btn:active { background: var(--accent); color: #fff; }

canvas { position: absolute; inset: 0; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="score-display">
  <div class="score-item">Score <span id="scoreVal">0</span></div>
  <div class="score-item">Best <span id="bestVal">0</span></div>
</div>

<div id="overlay">
  <h1>Bonker <span>Snake</span></h1>
  <p>Eat the food. Don't hit the walls or yourself.</p>
  <div id="result-label" style="display:none"></div>
  <div class="btn-row">
    <button class="btn" id="startBtn">Play</button>
  </div>
  <p style="font-size:0.78rem;color:var(--text2)">Arrow keys or WASD · Swipe on mobile</p>
</div>

<div id="dpad">
  <div class="dpad-row"><button class="dpad-btn" data-dir="UP">▲</button></div>
  <div class="dpad-row">
    <button class="dpad-btn" data-dir="LEFT">◀</button>
    <button class="dpad-btn" data-dir="DOWN">▼</button>
    <button class="dpad-btn" data-dir="RIGHT">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const resultLabel = document.getElementById('result-label');
const scoreEl = document.getElementById('scoreVal');
const bestEl = document.getElementById('bestVal');
const dpad = document.getElementById('dpad');

// --- Sound ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx;
function _ac() { if (!_ctx) _ctx = new AudioCtx(); if (_ctx.state === 'suspended') _ctx.resume(); return _ctx; }
function beep(freq, dur, type = 'square', vol = 0.15) {
  try {
    const c = _ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}
function sfxEat()  { beep(440, 0.08, 'square', 0.18); setTimeout(() => beep(660, 0.08, 'square', 0.14), 60); }
function sfxDie()  { [220, 180, 140].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'sawtooth', 0.2), i * 100)); }
function sfxMove() { beep(300, 0.03, 'square', 0.04); }

// --- Game state ---
const CELL = 20;
let cols, rows, snake, dir, nextDir, food, score, best = 0, running = false, loop;
let touchStartX, touchStartY;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width  / CELL);
  rows = Math.floor(canvas.height / CELL);
  if (running) drawFrame();
}
window.addEventListener('resize', resize);
resize();

function rand(max) { return Math.floor(Math.random() * max); }

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let f;
  do { f = { x: rand(cols), y: rand(rows) }; } while (occupied.has(`${f.x},${f.y}`));
  return f;
}

function startGame() {
  const cx = Math.floor(cols / 2), cy = Math.floor(rows / 2);
  snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  food = placeFood();
  score = 0; running = true;
  scoreEl.textContent = 0;
  overlay.style.display = 'none';
  dpad.style.display = isMobile() ? 'flex' : 'none';
  clearInterval(loop);
  loop = setInterval(tick, 120);
}

function isMobile() { return window.matchMedia('(max-width: 768px)').matches; }

function tick() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) { die(); return; }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    if (score > best) best = score;
    scoreEl.textContent = score;
    bestEl.textContent = best;
    food = placeFood();
    sfxEat();
  } else {
    snake.pop();
    sfxMove();
  }
  drawFrame();
}

function die() {
  clearInterval(loop);
  running = false;
  sfxDie();
  resultLabel.textContent = score > 0 ? `Score: ${score} — ${score >= 20 ? '🔥 Amazing!' : score >= 10 ? 'Nice run!' : 'Try again!'}` : 'Game over!';
  resultLabel.className = score >= 20 ? 'win' : '';
  resultLabel.style.display = 'block';
  document.getElementById('startBtn').textContent = 'Play again';
  overlay.style.display = 'flex';
  dpad.style.display = 'none';
}

function drawFrame() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#13131f';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= cols; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke(); }
  for (let y = 0; y <= rows; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke(); }

  // Food — pulsing circle
  const pulse = 0.85 + Math.sin(Date.now() / 200) * 0.15;
  const fr = CELL / 2 * pulse;
  ctx.shadowColor = '#ff6b7f'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff6b7f';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, fr, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    ctx.shadowColor = '#7c5cfc';
    ctx.shadowBlur = i === 0 ? 14 : 0;
    ctx.fillStyle = i === 0 ? '#a07cff' : `rgba(124,92,252,${0.35 + ratio * 0.65})`;
    const pad = i === 0 ? 1 : 2;
    const r = i === 0 ? 6 : 4;
    roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, r);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// --- Controls ---
const OPPOSITE = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };
const DIR_MAP = { UP: { x: 0, y: -1 }, DOWN: { x: 0, y: 1 }, LEFT: { x: -1, y: 0 }, RIGHT: { x: 1, y: 0 } };
const KEY_MAP = { ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT', w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT', W: 'UP', S: 'DOWN', A: 'LEFT', D: 'RIGHT' };

function tryDir(name) {
  const curName = Object.keys(DIR_MAP).find(k => DIR_MAP[k].x === dir.x && DIR_MAP[k].y === dir.y);
  if (name !== OPPOSITE[curName]) nextDir = DIR_MAP[name];
}

document.addEventListener('keydown', e => {
  if (!running) return;
  const d = KEY_MAP[e.key];
  if (d) { e.preventDefault(); tryDir(d); }
});

document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  if (!running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) tryDir(dx > 0 ? 'RIGHT' : 'LEFT');
  else tryDir(dy > 0 ? 'DOWN' : 'UP');
}, { passive: true });

document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => { e.preventDefault(); if (running) tryDir(btn.dataset.dir); }, { passive: false });
  btn.addEventListener('mousedown', () => { if (running) tryDir(btn.dataset.dir); });
});

document.getElementById('startBtn').addEventListener('click', startGame);

// Idle animation
function idleLoop() { if (!running) { drawFrame(); requestAnimationFrame(idleLoop); } }
requestAnimationFrame(idleLoop);
</script>
</body>
</html>
