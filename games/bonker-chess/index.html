<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonker Chess</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #101219;
  --panel: #171b25;
  --panel2: #202635;
  --text: #f6f7fb;
  --muted: #9ca7bd;
  --accent: #3fbf8f;
  --danger: #ff5c7a;
  --gold: #f4c95d;
  --light: #d9c39a;
  --dark: #5b7354;
  --select: rgba(63,191,143,0.55);
  --move: rgba(255,255,255,0.38);
  --capture: rgba(255,92,122,0.38);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at 20% 0%, #1f2836 0, transparent 34%), var(--bg);
  color: var(--text);
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button {
  font: inherit;
}

.game {
  min-height: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(250px, 330px);
  gap: 18px;
  padding: 18px;
}

.board-zone {
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.board-shell {
  width: min(calc(100vh - 36px), calc(100vw - 400px), 760px);
  min-width: 280px;
  aspect-ratio: 1;
  position: relative;
  border: 10px solid #2b2130;
  border-radius: 8px;
  box-shadow: 0 22px 60px rgba(0,0,0,0.42), inset 0 0 0 1px rgba(255,255,255,0.08);
  overflow: hidden;
}

.board {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
}

.square {
  position: relative;
  border: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
}

.square.light { background: var(--light); }
.square.dark { background: var(--dark); }
.square.selected { box-shadow: inset 0 0 0 5px var(--select); }
.square.last { box-shadow: inset 0 0 0 5px rgba(244,201,93,0.45); }
.square.check { box-shadow: inset 0 0 0 5px rgba(255,92,122,0.75); }

.piece {
  font-size: clamp(30px, 7.5vmin, 72px);
  line-height: 1;
  filter: drop-shadow(0 3px 2px rgba(0,0,0,0.26));
  transform: translateY(-1px);
}

.square[data-color="b"] .piece {
  color: #171923;
  text-shadow: 0 1px 0 rgba(255,255,255,0.22);
}

.square[data-color="w"] .piece {
  color: #faf8ef;
  text-shadow: 0 2px 2px rgba(0,0,0,0.28);
}

.hint {
  width: 28%;
  height: 28%;
  border-radius: 50%;
  background: var(--move);
  position: absolute;
}

.hint.capture {
  width: 74%;
  height: 74%;
  background: transparent;
  border: 5px solid var(--capture);
}

.coord {
  position: absolute;
  font-size: 10px;
  font-weight: 800;
  opacity: 0.55;
  pointer-events: none;
}

.coord.file { right: 5px; bottom: 3px; }
.coord.rank { left: 5px; top: 3px; }

.side {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel {
  background: rgba(23,27,37,0.92);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  box-shadow: 0 14px 40px rgba(0,0,0,0.22);
}

.status {
  padding: 16px;
}

.eyebrow {
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

h1 {
  margin: 4px 0 10px;
  font-size: clamp(1.35rem, 4vw, 2rem);
  line-height: 1.05;
}

.status-line {
  color: var(--muted);
  font-size: 0.92rem;
  min-height: 40px;
  line-height: 1.45;
}

.turn-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

.turn-chip {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 8px;
  background: var(--panel2);
  color: var(--muted);
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.07);
  font-size: 0.82rem;
  font-weight: 800;
}

.turn-chip.active {
  color: var(--text);
  border-color: rgba(63,191,143,0.42);
  background: rgba(63,191,143,0.14);
}

.controls {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 12px;
}

.control-btn {
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--panel2);
  color: var(--text);
  border-radius: 7px;
  padding: 10px 8px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 800;
}

.control-btn:hover {
  border-color: rgba(63,191,143,0.45);
  background: #273044;
}

.online-box {
  padding: 12px;
  display: grid;
  gap: 10px;
}

.online-title {
  font-size: 0.8rem;
  font-weight: 900;
  color: var(--text);
}

.online-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.online-btn {
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--panel2);
  color: var(--text);
  border-radius: 7px;
  padding: 10px 8px;
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 850;
}

.online-btn.primary {
  background: var(--accent);
  color: #07120e;
}

.online-btn:hover {
  border-color: rgba(63,191,143,0.45);
  background: #273044;
}

.online-btn.primary:hover {
  background: #55d8a6;
}

.room-line {
  display: none;
  gap: 8px;
  align-items: center;
}

.room-line.active {
  display: flex;
}

.room-code {
  flex: 1;
  min-width: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px;
  padding: 8px 9px;
  color: var(--text);
  font-size: 0.78rem;
  font-weight: 800;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.small-btn {
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--panel2);
  color: var(--text);
  border-radius: 7px;
  padding: 8px 9px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 850;
}

.online-note {
  min-height: 30px;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.35;
}

.color-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  padding: 3px 7px;
  border-radius: 5px;
  background: rgba(63,191,143,0.12);
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 900;
  text-transform: uppercase;
}

.capture-box {
  padding: 12px;
  display: grid;
  gap: 10px;
}

.capture-row {
  min-height: 34px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.capture-label {
  color: var(--muted);
  font-size: 0.76rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.captured {
  flex: 1;
  min-height: 28px;
  text-align: right;
  font-size: 1.35rem;
  letter-spacing: 1px;
}

.moves {
  min-height: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.moves-head {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  font-size: 0.84rem;
  font-weight: 800;
}

.move-list {
  overflow: auto;
  padding: 8px 12px 14px;
  display: grid;
  grid-template-columns: 42px 1fr 1fr;
  gap: 5px 8px;
  color: var(--muted);
  font-size: 0.86rem;
}

.move-list span {
  min-height: 24px;
  padding: 4px 6px;
  border-radius: 5px;
}

.move-list .num {
  color: #647087;
  text-align: right;
}

.move-list .move {
  background: rgba(255,255,255,0.04);
  color: var(--text);
}

@media (max-width: 840px) {
  html, body { overflow: auto; }
  .game {
    height: auto;
    min-height: 100%;
    grid-template-columns: 1fr;
    padding: 12px;
  }
  .board-shell {
    width: min(94vw, 620px);
  }
  .moves {
    max-height: 220px;
  }
}

@media (max-width: 520px) {
  .game { padding: 8px; gap: 10px; }
  .board-shell { width: 100%; border-width: 6px; }
  .controls { grid-template-columns: 1fr; }
  .online-actions { grid-template-columns: 1fr; }
  .side { gap: 10px; }
  .piece { font-size: clamp(28px, 10vw, 54px); }
}
</style>
</head>
<body>
<main class="game">
  <section class="board-zone">
    <div class="board-shell">
      <div class="board" id="board" aria-label="Chess board"></div>
    </div>
  </section>

  <aside class="side">
    <section class="panel status">
      <div class="eyebrow">Strategy</div>
      <h1>Bonker Chess</h1>
      <div class="status-line" id="statusText">White to move. Pick a piece.</div>
      <div class="turn-row">
        <div class="turn-chip active" id="whiteTurn">White</div>
        <div class="turn-chip" id="blackTurn">Black</div>
      </div>
    </section>

    <section class="panel controls">
      <button class="control-btn" id="newGameBtn">New</button>
      <button class="control-btn" id="undoBtn">Undo</button>
      <button class="control-btn" id="flipBtn">Flip</button>
    </section>

    <section class="panel online-box">
      <div class="online-title">Online match</div>
      <div class="online-actions">
        <button class="online-btn primary" id="friendBtn">Play friend</button>
        <button class="online-btn" id="randomBtn">Play random</button>
      </div>
      <div class="room-line" id="roomLine">
        <div class="room-code" id="roomCode"></div>
        <button class="small-btn" id="copyBtn">Copy</button>
        <button class="small-btn" id="leaveBtn">Leave</button>
      </div>
      <div class="online-note" id="onlineNote">Local 2 player is ready. Start online to invite a friend or find a random player.</div>
    </section>

    <section class="panel capture-box">
      <div class="capture-row">
        <span class="capture-label">White took</span>
        <span class="captured" id="whiteCaptured"></span>
      </div>
      <div class="capture-row">
        <span class="capture-label">Black took</span>
        <span class="captured" id="blackCaptured"></span>
      </div>
    </section>

    <section class="panel moves">
      <div class="moves-head">Move history</div>
      <div class="move-list" id="moveList"></div>
    </section>
  </aside>
</main>

<script type="module">
import { Chess } from 'https://esm.run/chess.js@1.4.0';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import {
  getDatabase, ref, set, get, remove, update, onValue, onDisconnect, runTransaction, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';

const firebaseApp = initializeApp({
  apiKey: 'AIzaSyBQjDeFUKpleEsc2Fl3yZdnNje0cyAGaKU',
  authDomain: 'd-game-b50ef.firebaseapp.com',
  projectId: 'd-game-b50ef',
  storageBucket: 'd-game-b50ef.firebasestorage.app',
  messagingSenderId: '80712714092',
  appId: '1:80712714092:web:4b15f70196f05942905549'
});
const db = getDatabase(firebaseApp);

const boardEl = document.getElementById('board');
const statusText = document.getElementById('statusText');
const whiteTurn = document.getElementById('whiteTurn');
const blackTurn = document.getElementById('blackTurn');
const moveList = document.getElementById('moveList');
const whiteCaptured = document.getElementById('whiteCaptured');
const blackCaptured = document.getElementById('blackCaptured');
const friendBtn = document.getElementById('friendBtn');
const randomBtn = document.getElementById('randomBtn');
const roomLine = document.getElementById('roomLine');
const roomCode = document.getElementById('roomCode');
const copyBtn = document.getElementById('copyBtn');
const leaveBtn = document.getElementById('leaveBtn');
const onlineNote = document.getElementById('onlineNote');

const pieceMap = {
  wp: '♙', wn: '♘', wb: '♗', wr: '♖', wq: '♕', wk: '♔',
  bp: '♟', bn: '♞', bb: '♝', br: '♜', bq: '♛', bk: '♚'
};

const pieceValue = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
const captureGlyph = {
  wp: '♙', wn: '♘', wb: '♗', wr: '♖', wq: '♕',
  bp: '♟', bn: '♞', bb: '♝', br: '♜', bq: '♛'
};

let chess = new Chess();
let selected = null;
let legalTargets = [];
let flipped = false;
let lastMove = null;
let onlineMode = false;
let currentRoomId = null;
let playerColor = null;
let roomState = null;
let roomUnsubscribe = null;
let queueUnsubscribe = null;
let syncingRemote = false;

const playerId = getPlayerId();
const urlRoom = new URLSearchParams(location.search).get('room');

function files() {
  return flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];
}

function ranks() {
  return flipped ? ['1','2','3','4','5','6','7','8'] : ['8','7','6','5','4','3','2','1'];
}

function getPlayerId() {
  const existing = localStorage.getItem('bonkerChessPlayerId');
  if (existing) return existing;
  const id = `p_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
  localStorage.setItem('bonkerChessPlayerId', id);
  return id;
}

function makeRoomId() {
  return Math.random().toString(36).slice(2, 8).toUpperCase();
}

function roomRef(roomId) {
  return ref(db, `chessRooms/${roomId}`);
}

function queueRef(id = playerId) {
  return ref(db, `chessQueue/${id}`);
}

function roomUrl(roomId) {
  const url = new URL('play.html', location.href);
  url.searchParams.set('room', roomId);
  return url.toString();
}

function setUrlRoom(roomId) {
  const url = new URL(location.href);
  if (roomId) url.searchParams.set('room', roomId);
  else url.searchParams.delete('room');
  history.replaceState(null, '', url);
}

function setOnlineNote(text) {
  onlineNote.textContent = text;
}

function showRoomControls(roomId) {
  roomLine.classList.toggle('active', Boolean(roomId));
  roomCode.textContent = roomId ? roomUrl(roomId) : '';
}

function applyRemoteGame(state) {
  syncingRemote = true;
  const next = new Chess();
  try {
    if (state.pgn) next.loadPgn(state.pgn);
    else if (state.fen) next.load(state.fen);
  } catch (error) {
    console.warn('Could not load remote chess state', error);
  }
  chess = next;
  lastMove = state.lastMove || null;
  selected = null;
  legalTargets = [];
  syncingRemote = false;
}

function onlineStatusSuffix() {
  if (!onlineMode) return '';
  const color = playerColor === 'w' ? 'White' : playerColor === 'b' ? 'Black' : 'Spectator';
  const waiting = roomState && (!roomState.white || !roomState.black);
  if (waiting) return ` You are ${color}. Waiting for opponent.`;
  if (playerColor !== chess.turn()) return ` You are ${color}. Waiting for opponent move.`;
  return ` You are ${color}. Your move.`;
}

function renderBoard() {
  boardEl.innerHTML = '';
  const currentFiles = files();
  const currentRanks = ranks();
  const checkSquare = findCheckedKing();

  for (const rank of currentRanks) {
    for (const file of currentFiles) {
      const square = file + rank;
      const piece = chess.get(square);
      const button = document.createElement('button');
      const fileIndex = file.charCodeAt(0) - 97;
      const rankIndex = Number(rank) - 1;
      const isLight = (fileIndex + rankIndex) % 2 === 1;

      button.className = `square ${isLight ? 'light' : 'dark'}`;
      button.dataset.square = square;

      if (selected === square) button.classList.add('selected');
      if (lastMove && (lastMove.from === square || lastMove.to === square)) button.classList.add('last');
      if (checkSquare === square) button.classList.add('check');

      if (piece) {
        button.dataset.color = piece.color;
        const span = document.createElement('span');
        span.className = 'piece';
        span.textContent = pieceMap[piece.color + piece.type];
        button.appendChild(span);
      }

      const target = legalTargets.find(move => move.to === square);
      if (target) {
        const hint = document.createElement('span');
        hint.className = `hint ${target.captured ? 'capture' : ''}`;
        button.appendChild(hint);
      }

      if (file === currentFiles[7]) {
        const coord = document.createElement('span');
        coord.className = 'coord rank';
        coord.textContent = rank;
        button.appendChild(coord);
      }
      if (rank === currentRanks[7]) {
        const coord = document.createElement('span');
        coord.className = 'coord file';
        coord.textContent = file;
        button.appendChild(coord);
      }

      button.addEventListener('click', () => handleSquare(square));
      boardEl.appendChild(button);
    }
  }
}

function handleSquare(square) {
  if (onlineMode && (!roomState || !roomState.white || !roomState.black)) {
    setOnlineNote('Waiting for both players before the game starts.');
    return;
  }
  if (onlineMode && playerColor !== chess.turn()) {
    setOnlineNote('Not your turn yet.');
    return;
  }

  const piece = chess.get(square);

  if (selected) {
    const legalMove = legalTargets.find(move => move.to === square);
    if (legalMove) {
      const move = chess.move({
        from: selected,
        to: square,
        promotion: legalMove.promotion || 'q'
      });
      lastMove = move ? { from: move.from, to: move.to } : null;
      selected = null;
      legalTargets = [];
      if (onlineMode && move) {
        syncOnlineMove(move);
      }
      render();
      return;
    }
  }

  if (piece && piece.color === chess.turn()) {
    selected = square;
    legalTargets = chess.moves({ square, verbose: true });
  } else {
    selected = null;
    legalTargets = [];
  }

  render();
}

function findCheckedKing() {
  if (!chess.inCheck()) return null;
  const board = chess.board();
  const turn = chess.turn();
  for (let r = 0; r < 8; r++) {
    for (let f = 0; f < 8; f++) {
      const piece = board[r][f];
      if (piece && piece.type === 'k' && piece.color === turn) {
        return 'abcdefgh'[f] + (8 - r);
      }
    }
  }
  return null;
}

function renderStatus() {
  const turnName = chess.turn() === 'w' ? 'White' : 'Black';
  whiteTurn.classList.toggle('active', chess.turn() === 'w');
  blackTurn.classList.toggle('active', chess.turn() === 'b');

  if (chess.isCheckmate()) {
    statusText.textContent = `Checkmate. ${turnName === 'White' ? 'Black' : 'White'} wins.${onlineStatusSuffix()}`;
  } else if (chess.isDraw()) {
    statusText.textContent = `Draw. No legal winning path left.${onlineStatusSuffix()}`;
  } else if (chess.inCheck()) {
    statusText.textContent = `${turnName} is in check. Find a safe move.${onlineStatusSuffix()}`;
  } else if (selected) {
    statusText.textContent = `${turnName} to move. Choose where to move from ${selected}.${onlineStatusSuffix()}`;
  } else {
    statusText.textContent = `${turnName} to move. Pick a piece.${onlineStatusSuffix()}`;
  }
}

function renderMoves() {
  const history = chess.history();
  moveList.innerHTML = '';
  for (let i = 0; i < history.length; i += 2) {
    appendMove(`${Math.floor(i / 2) + 1}.`, 'num');
    appendMove(history[i] || '', 'move');
    appendMove(history[i + 1] || '', 'move');
  }
  moveList.scrollTop = moveList.scrollHeight;
}

function appendMove(text, className) {
  const span = document.createElement('span');
  span.className = className;
  span.textContent = text;
  moveList.appendChild(span);
}

function renderCaptures() {
  const board = chess.board().flat().filter(Boolean);
  const remaining = {
    wp: 0, wn: 0, wb: 0, wr: 0, wq: 0,
    bp: 0, bn: 0, bb: 0, br: 0, bq: 0
  };

  board.forEach(piece => {
    const key = piece.color + piece.type;
    if (key in remaining) remaining[key]++;
  });

  const starting = { p: 8, n: 2, b: 2, r: 2, q: 1 };
  const whiteLost = [];
  const blackLost = [];

  Object.entries(starting).forEach(([type, amount]) => {
    const whiteMissing = amount - remaining['w' + type];
    const blackMissing = amount - remaining['b' + type];
    for (let i = 0; i < whiteMissing; i++) blackLost.push({ key: 'w' + type, value: pieceValue[type] });
    for (let i = 0; i < blackMissing; i++) whiteLost.push({ key: 'b' + type, value: pieceValue[type] });
  });

  whiteCaptured.textContent = whiteLost.sort((a, b) => b.value - a.value).map(piece => captureGlyph[piece.key]).join('');
  blackCaptured.textContent = blackLost.sort((a, b) => b.value - a.value).map(piece => captureGlyph[piece.key]).join('');
}

function render() {
  renderBoard();
  renderStatus();
  renderMoves();
  renderCaptures();
  renderOnlinePanel();
}

function renderOnlinePanel() {
  showRoomControls(currentRoomId);
  friendBtn.disabled = onlineMode;
  randomBtn.disabled = onlineMode;
  leaveBtn.disabled = !onlineMode;
  document.getElementById('undoBtn').disabled = onlineMode;
  if (onlineMode) {
    const color = playerColor === 'w' ? 'White' : playerColor === 'b' ? 'Black' : 'Spectator';
    const status = roomState && roomState.white && roomState.black ? 'playing' : 'waiting';
    const badge = `<span class="color-badge">${color}</span>`;
    roomCode.innerHTML = `${currentRoomId} ${badge}`;
    if (status === 'waiting') setOnlineNote(`Room ${currentRoomId} is waiting. Copy the link and send it to your friend.`);
    else if (playerColor === chess.turn()) setOnlineNote('Online match connected. Your move.');
    else setOnlineNote('Online match connected. Waiting for opponent.');
  }
}

async function syncOnlineMove(move) {
  if (!currentRoomId || syncingRemote) return;
  const status = chess.isCheckmate() ? 'checkmate' : chess.isDraw() ? 'draw' : 'playing';
  await update(roomRef(currentRoomId), {
    fen: chess.fen(),
    pgn: chess.pgn(),
    turn: chess.turn(),
    lastMove: { from: move.from, to: move.to },
    status,
    updatedAt: serverTimestamp()
  });
}

async function createRoom(kind = 'friend') {
  await leaveOnline(false);
  const id = makeRoomId();
  currentRoomId = id;
  playerColor = 'w';
  onlineMode = true;
  roomState = {
    kind,
    white: playerId,
    black: null,
    fen: chess.fen(),
    pgn: '',
    turn: 'w',
    status: 'waiting',
    createdAt: Date.now()
  };

  chess = new Chess();
  lastMove = null;
  selected = null;
  legalTargets = [];
  flipped = false;

  await set(roomRef(id), {
    kind,
    white: playerId,
    black: null,
    fen: chess.fen(),
    pgn: '',
    turn: 'w',
    status: 'waiting',
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp()
  });
  onDisconnect(ref(db, `chessRooms/${id}/whiteOnline`)).remove();
  await set(ref(db, `chessRooms/${id}/whiteOnline`), true);
  setUrlRoom(id);
  listenToRoom(id);
  render();
}

async function joinRoom(id) {
  const cleanedId = String(id || '').trim().toUpperCase();
  if (!cleanedId) return;
  await leaveOnline(false);
  const target = roomRef(cleanedId);
  const result = await runTransaction(target, current => {
    if (!current) return;
    if (current.white === playerId || current.black === playerId) return current;
    if (!current.white) {
      current.white = playerId;
      current.status = current.black ? 'playing' : 'waiting';
      return current;
    }
    if (!current.black) {
      current.black = playerId;
      current.status = 'playing';
      return current;
    }
    return;
  });

  if (!result.committed || !result.snapshot.exists()) {
    setOnlineNote('That room is full or does not exist.');
    render();
    return;
  }

  const state = result.snapshot.val();
  currentRoomId = cleanedId;
  playerColor = state.white === playerId ? 'w' : state.black === playerId ? 'b' : null;
  onlineMode = true;
  roomState = state;
  flipped = playerColor === 'b';
  applyRemoteGame(state);
  const onlineKey = playerColor === 'w' ? 'whiteOnline' : 'blackOnline';
  if (onlineKey) {
    onDisconnect(ref(db, `chessRooms/${cleanedId}/${onlineKey}`)).remove();
    await set(ref(db, `chessRooms/${cleanedId}/${onlineKey}`), true);
  }
  setUrlRoom(cleanedId);
  listenToRoom(cleanedId);
  render();
}

function listenToRoom(id) {
  if (roomUnsubscribe) roomUnsubscribe();
  roomUnsubscribe = onValue(roomRef(id), snapshot => {
    if (!snapshot.exists()) {
      leaveOnline(false);
      setOnlineNote('Room closed.');
      render();
      return;
    }
    const state = snapshot.val();
    roomState = state;
    if (!playerColor) playerColor = state.white === playerId ? 'w' : state.black === playerId ? 'b' : null;
    applyRemoteGame(state);
    render();
  });
}

async function playRandom() {
  await leaveOnline(false);
  setOnlineNote('Looking for a random opponent...');
  const queueSnap = await get(ref(db, 'chessQueue'));
  const queue = queueSnap.val() || {};
  const candidateId = Object.keys(queue).find(id => id !== playerId);

  if (candidateId) {
    await remove(queueRef());
    const id = makeRoomId();
    currentRoomId = id;
    playerColor = 'b';
    onlineMode = true;
    chess = new Chess();
    flipped = true;
    await set(roomRef(id), {
      kind: 'random',
      white: candidateId,
      black: playerId,
      fen: chess.fen(),
      pgn: '',
      turn: 'w',
      status: 'playing',
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    await set(queueRef(candidateId), {
      playerId: candidateId,
      roomId: id,
      matchedAt: serverTimestamp()
    });
    onDisconnect(ref(db, `chessRooms/${id}/blackOnline`)).remove();
    await set(ref(db, `chessRooms/${id}/blackOnline`), true);
    setUrlRoom(id);
    listenToRoom(id);
    render();
    return;
  }

  await set(queueRef(), {
    playerId,
    createdAt: serverTimestamp()
  });
  onDisconnect(queueRef()).remove();
  setOnlineNote('Waiting for a random opponent...');

  if (queueUnsubscribe) queueUnsubscribe();
  queueUnsubscribe = onValue(queueRef(), snapshot => {
    const entry = snapshot.val();
    if (!entry || !entry.roomId) return;
    if (queueUnsubscribe) queueUnsubscribe();
    queueUnsubscribe = null;
    joinRoom(entry.roomId);
  });
}

async function leaveOnline(updateUrl = true) {
  if (queueUnsubscribe) {
    queueUnsubscribe();
    queueUnsubscribe = null;
  }
  if (roomUnsubscribe) {
    roomUnsubscribe();
    roomUnsubscribe = null;
  }
  await remove(queueRef()).catch(() => {});
  if (currentRoomId && playerColor) {
    const onlineKey = playerColor === 'w' ? 'whiteOnline' : 'blackOnline';
    await remove(ref(db, `chessRooms/${currentRoomId}/${onlineKey}`)).catch(() => {});
  }
  onlineMode = false;
  currentRoomId = null;
  playerColor = null;
  roomState = null;
  if (updateUrl) setUrlRoom(null);
}

document.getElementById('newGameBtn').addEventListener('click', () => {
  chess = new Chess();
  selected = null;
  legalTargets = [];
  lastMove = null;
  if (onlineMode && currentRoomId) {
    update(roomRef(currentRoomId), {
      fen: chess.fen(),
      pgn: '',
      turn: 'w',
      lastMove: null,
      status: roomState && roomState.white && roomState.black ? 'playing' : 'waiting',
      updatedAt: serverTimestamp()
    });
    return;
  }
  render();
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (onlineMode) return;
  chess.undo();
  selected = null;
  legalTargets = [];
  const verbose = chess.history({ verbose: true });
  const previous = verbose[verbose.length - 1];
  lastMove = previous ? { from: previous.from, to: previous.to } : null;
  render();
});

document.getElementById('flipBtn').addEventListener('click', () => {
  flipped = !flipped;
  selected = null;
  legalTargets = [];
  render();
});

friendBtn.addEventListener('click', () => {
  createRoom('friend').catch(error => {
    console.error(error);
    setOnlineNote('Could not create friend room. Try again.');
  });
});

randomBtn.addEventListener('click', () => {
  playRandom().catch(error => {
    console.error(error);
    setOnlineNote('Could not start random matchmaking. Try again.');
  });
});

copyBtn.addEventListener('click', async () => {
  if (!currentRoomId) return;
  const link = roomUrl(currentRoomId);
  try {
    await navigator.clipboard.writeText(link);
    setOnlineNote('Invite link copied.');
  } catch {
    setOnlineNote(link);
  }
});

leaveBtn.addEventListener('click', async () => {
  await leaveOnline();
  chess = new Chess();
  selected = null;
  legalTargets = [];
  lastMove = null;
  setOnlineNote('Left online match. Local 2 player is ready.');
  render();
});

window.addEventListener('beforeunload', () => {
  remove(queueRef()).catch(() => {});
});

if (urlRoom) {
  joinRoom(urlRoom).catch(error => {
    console.error(error);
    setOnlineNote('Could not join that room.');
    render();
  });
} else {
  render();
}

</script>
