<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Survival</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #hud {
      position: fixed; top: 10px; left: 10px;
      background: rgba(255,255,255,0.95); border: 2px solid #000;
      padding: 8px 14px; font-family: monospace; font-size: 13px;
      z-index: 10; line-height: 1.8; pointer-events: none;
    }
    #hint {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(255,255,255,0.95); border: 2px solid #000;
      padding: 6px 12px; font-family: monospace; font-size: 11px;
      z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>HP: <span id="ui-hp">100</span>/100 &nbsp; Hunger: <span id="ui-fm">10</span>/10</div>
    <div>Wood: <span id="ui-wood">0</span> &nbsp; Food: <span id="ui-food">0</span> &nbsp; Stone: <span id="ui-stone">0</span></div>
    <div id="ui-mode">Mode: EXPLORE</div>
  </div>
  <div id="hint">WASD: move | Click tree/rock/bush to gather | B: build wall (5 wood) | Click enemy wall: attack | ESC: cancel</div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
    import {
      getDatabase, ref, set, get, remove, update,
      onChildAdded, onChildChanged, onChildRemoved
    } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';

    const firebaseApp = initializeApp({
      apiKey: 'AIzaSyBQjDeFUKpleEsc2Fl3yZdnNje0cyAGaKU',
      authDomain: 'd-game-b50ef.firebaseapp.com',
      projectId: 'd-game-b50ef',
      storageBucket: 'd-game-b50ef.firebasestorage.app',
      messagingSenderId: '80712714092',
      appId: '1:80712714092:web:4b15f70196f05942905549'
    });
    const db = getDatabase(firebaseApp);

    // ── Constants ─────────────────────────────────────────────────────────────
    const PID      = 'p_' + Math.random().toString(36).substr(2, 9);
    const PCOLORS  = [0xe74c3c, 0x3498db, 0x9b59b6, 0xf39c12, 0x1abc9c, 0xe67e22];
    const MY_COLOR = PCOLORS[Math.floor(Math.random() * PCOLORS.length)];

    const MAP_W     = 3000;
    const MAP_H     = 3000;
    const SPEED     = 220;
    const P_RAD     = 16;
    const BLDG_SZ   = 44;
    const ATK_RNG   = 90;
    const ATK_DMG   = 15;
    const WALL_COST = 5;
    const BLDG_HP   = 100;
    const SYNC_MS   = 100;
    const RES_N     = 55;
    const FOOD_TICK = 20000;
    const MAX_FOOD  = 10;
    const MAX_HP    = 100;
    const HIT_CD    = 350;

    // resource type definitions: maxHp, what loot they drop, hit radius
    const RES_DEF = {
      tree: { maxHp: 3, loot: 'wood',  hitR: 20 },
      rock: { maxHp: 5, loot: 'stone', hitR: 16 },
      bush: { maxHp: 1, loot: 'food',  hitR: 13 }
    };

    // ── Player state ──────────────────────────────────────────────────────────
    const state = {
      x: 300 + Math.random() * (MAP_W - 600),
      y: 300 + Math.random() * (MAP_H - 600),
      hp: MAX_HP, food_meter: MAX_FOOD,
      wood: 0, food: 0, stone: 0
    };

    const others     = {};
    const resSpr     = {};
    const bldgSpr    = {};
    const resHitTime = {};
    let buildMode    = false;
    let bPrev, lastSync = 0, foodTimer = 0;

    // ── Scene ─────────────────────────────────────────────────────────────────
    class Game extends Phaser.Scene {
      constructor() { super('Game'); }

      create() {
        // tiny white square texture used as invisible physics body
        const tg = this.make.graphics({ x: 0, y: 0, add: false });
        tg.fillStyle(0xffffff, 1).fillRect(0, 0, P_RAD * 2, P_RAD * 2);
        tg.generateTexture('body', P_RAD * 2, P_RAD * 2);
        tg.destroy();

        this.physics.world.setBounds(0, 0, MAP_W, MAP_H);
        this.cameras.main.setBounds(0, 0, MAP_W, MAP_H);

        // white background + subtle grid
        this.add.rectangle(MAP_W / 2, MAP_H / 2, MAP_W, MAP_H, 0xffffff).setDepth(0);
        const grid = this.add.graphics().setDepth(0);
        grid.lineStyle(1, 0xe8e8e8, 1);
        for (let x = 0; x <= MAP_W; x += 100) { grid.moveTo(x, 0); grid.lineTo(x, MAP_H); }
        for (let y = 0; y <= MAP_H; y += 100) { grid.moveTo(0, y); grid.lineTo(MAP_W, y); }
        grid.strokePath();

        // player: invisible physics body + visible graphic
        this.pbody = this.physics.add.image(state.x, state.y, 'body');
        this.pbody.setAlpha(0.001).setCollideWorldBounds(true);
        this.pgfx = this.add.graphics().setDepth(4);
        this.redrawMe();
        this.cameras.main.startFollow(this.pbody, true, 0.12, 0.12);

        // build mode preview ghost
        bPrev = this.add.graphics().setDepth(6).setVisible(false);

        this.keys = this.input.keyboard.addKeys({
          up: 'W', down: 'S', left: 'A', right: 'D',
          up2: 'UP', down2: 'DOWN', left2: 'LEFT', right2: 'RIGHT',
          b: 'B', esc: 'ESC'
        });
        this.input.on('pointerdown', ptr => this.handleClick(ptr));

        this.setupFirebase();
        window.addEventListener('beforeunload', () => remove(ref(db, 'players/' + PID)));
        this.updateHUD();
      }

      // ── Firebase wiring ───────────────────────────────────────────────────────
      setupFirebase() {
        const sc = this;

        get(ref(db, 'resources')).then(snap => {
          const val = snap.val();
          // reseed if empty, count too low, or old format (no hp field)
          const keys = val ? Object.keys(val) : [];
          const needsReseed = keys.length < 10 || (keys.length > 0 && val[keys[0]].hp === undefined);
          if (needsReseed) {
            remove(ref(db, 'resources')).then(() => sc.seedMap());
          }
        });

        onChildAdded(ref(db, 'resources'), snap => {
          if (snap.val() && !resSpr[snap.key]) sc.mkRes(snap.key, snap.val());
        });
        onChildChanged(ref(db, 'resources'), snap => {
          if (snap.val() && resSpr[snap.key]) sc.rxRes(snap.key, snap.val());
        });
        onChildRemoved(ref(db, 'resources'), snap => {
          if (resSpr[snap.key]) { resSpr[snap.key].destroy(); delete resSpr[snap.key]; }
        });

        onChildAdded(ref(db, 'players'), snap => {
          if (snap.key !== PID && snap.val()) sc.mkOther(snap.key, snap.val());
        });
        onChildChanged(ref(db, 'players'), snap => {
          if (snap.key !== PID && snap.val()) sc.mvOther(snap.key, snap.val());
        });
        onChildRemoved(ref(db, 'players'), snap => {
          if (others[snap.key]) {
            others[snap.key].g.destroy();
            others[snap.key].l.destroy();
            delete others[snap.key];
          }
        });

        onChildAdded(ref(db, 'buildings'), snap => {
          if (snap.val() && !bldgSpr[snap.key]) sc.mkBldg(snap.key, snap.val());
        });
        onChildChanged(ref(db, 'buildings'), snap => {
          if (snap.val() && bldgSpr[snap.key]) sc.rxBldg(snap.key, snap.val());
        });
        onChildRemoved(ref(db, 'buildings'), snap => {
          if (bldgSpr[snap.key]) { bldgSpr[snap.key].destroy(); delete bldgSpr[snap.key]; }
        });
      }

      // ── Drawing ───────────────────────────────────────────────────────────────
      redrawMe() {
        this.pgfx.clear();
        this.pgfx.fillStyle(MY_COLOR, 1).fillCircle(0, 0, P_RAD);
        this.pgfx.lineStyle(2, 0x000000, 1).strokeCircle(0, 0, P_RAD);
      }

      drawOther(gfx, x, y, c) {
        gfx.clear();
        gfx.fillStyle(c, 1).fillCircle(x, y, P_RAD);
        gfx.lineStyle(2, 0x000000, 1).strokeCircle(x, y, P_RAD);
      }

      drawRes(gfx, d) {
        const { x, y, type } = d;
        const hp    = d.hp    !== undefined ? d.hp    : 1;
        const maxHp = d.maxHp !== undefined ? d.maxHp : 1;
        const ratio = maxHp > 0 ? hp / maxHp : 1;
        gfx.clear();

        if (type === 'tree') {
          // trunk
          gfx.fillStyle(0x7d5a3c, 1);
          gfx.fillRect(x - 5, y + 4, 10, 18);
          gfx.lineStyle(1, 0x000000, 1);
          gfx.strokeRect(x - 5, y + 4, 10, 18);
          // canopy: green when healthy, yellow when half-damaged
          gfx.fillStyle(ratio > 0.5 ? 0x27ae60 : 0xf0a500, 1);
          gfx.fillCircle(x, y - 4, 20);
          gfx.lineStyle(2, 0x000000, 1);
          gfx.strokeCircle(x, y - 4, 20);

        } else if (type === 'rock') {
          gfx.fillStyle(0x95a5a6, 1);
          gfx.fillCircle(x, y, 15);
          gfx.lineStyle(2, 0x000000, 1);
          gfx.strokeCircle(x, y, 15);
          // crack when damaged
          if (ratio < 0.8) {
            gfx.lineStyle(1.5, 0x636e72, 1);
            gfx.beginPath();
            gfx.moveTo(x - 5, y - 7);
            gfx.lineTo(x + 3, y + 5);
            gfx.strokePath();
          }

        } else { // bush
          gfx.fillStyle(0x2ecc71, 1);
          gfx.fillCircle(x, y, 13);
          gfx.lineStyle(2, 0x000000, 1);
          gfx.strokeCircle(x, y, 13);
          // small berries
          gfx.fillStyle(0xe74c3c, 1);
          gfx.fillCircle(x - 5, y - 4, 3);
          gfx.fillCircle(x + 4, y - 6, 3);
          gfx.fillCircle(x + 2, y + 4, 3);
        }

        // HP bar above if damaged
        if (hp < maxHp) {
          const bw = 32;
          gfx.fillStyle(0x2ecc71, 1);
          gfx.fillRect(x - bw / 2, y - 36, bw * ratio, 4);
          gfx.fillStyle(0xe74c3c, 1);
          gfx.fillRect(x - bw / 2 + bw * ratio, y - 36, bw * (1 - ratio), 4);
          gfx.lineStyle(1, 0x000000, 1);
          gfx.strokeRect(x - bw / 2, y - 36, bw, 4);
        }
      }

      drawBldg(gfx, d) {
        const hpRatio = d.hp / BLDG_HP;
        const fill = d.ownerId === PID ? 0xdfe6e9 : 0xffdad2;
        const bx = d.x - BLDG_SZ / 2, by = d.y - BLDG_SZ / 2;
        gfx.clear();
        gfx.fillStyle(fill, 1).fillRect(bx, by, BLDG_SZ, BLDG_SZ);
        gfx.lineStyle(2, 0x000000, 1).strokeRect(bx, by, BLDG_SZ, BLDG_SZ);
        gfx.fillStyle(0x2ecc71, 1).fillRect(bx, by - 7, BLDG_SZ * hpRatio, 4);
        gfx.fillStyle(0xe74c3c, 1).fillRect(bx + BLDG_SZ * hpRatio, by - 7, BLDG_SZ * (1 - hpRatio), 4);
        gfx.lineStyle(1, 0x000000, 1).strokeRect(bx, by - 7, BLDG_SZ, 4);
      }

      // ── Spawn / update helpers ────────────────────────────────────────────────
      mkRes(id, d) {
        const g = this.add.graphics().setDepth(1);
        this.drawRes(g, d);
        g._d = d;
        resSpr[id] = g;
      }

      rxRes(id, d) {
        resSpr[id]._d = d;
        this.drawRes(resSpr[id], d);
      }

      mkOther(id, d) {
        const g = this.add.graphics().setDepth(4);
        this.drawOther(g, d.x, d.y, d.color);
        const l = this.add.text(d.x, d.y - P_RAD - 10, id.substr(-4), {
          fontSize: '10px', color: '#000', fontFamily: 'monospace'
        }).setOrigin(0.5).setDepth(5);
        others[id] = { g, l };
      }

      mvOther(id, d) {
        if (!others[id]) { this.mkOther(id, d); return; }
        this.drawOther(others[id].g, d.x, d.y, d.color);
        others[id].l.setPosition(d.x, d.y - P_RAD - 10);
      }

      mkBldg(id, d) {
        const g = this.add.graphics().setDepth(2);
        this.drawBldg(g, d);
        g._d = d;
        bldgSpr[id] = g;
      }

      rxBldg(id, d) {
        bldgSpr[id]._d = d;
        this.drawBldg(bldgSpr[id], d);
      }

      seedMap() {
        const batch = {};
        Object.keys(RES_DEF).forEach(type => {
          const maxHp = RES_DEF[type].maxHp;
          for (let i = 0; i < RES_N; i++) {
            batch[type + '_' + i] = {
              x: 120 + Math.random() * (MAP_W - 240),
              y: 120 + Math.random() * (MAP_H - 240),
              type, hp: maxHp, maxHp
            };
          }
        });
        set(ref(db, 'resources'), batch);
      }

      // ── Click handler ─────────────────────────────────────────────────────────
      handleClick(ptr) {
        if (buildMode) { this.placeWall(ptr); return; }
        if (this.tryHitRes(ptr)) return;
        this.tryAtkBldg(ptr);
      }

      tryHitRes(ptr) {
        const px = this.pbody.x, py = this.pbody.y;
        for (const [id, g] of Object.entries(resSpr)) {
          const d = g._d;
          if (!d || !RES_DEF[d.type]) continue;

          // player must be within reach
          const pdx = d.x - px, pdy = d.y - py;
          if (Math.sqrt(pdx * pdx + pdy * pdy) > ATK_RNG + 30) continue;

          // click must land on the resource
          const hitR = RES_DEF[d.type].hitR;
          const cy   = d.type === 'tree' ? d.y - 4 : d.y;  // tree canopy center
          const cdx  = ptr.worldX - d.x;
          const cdy  = ptr.worldY - cy;
          if (Math.sqrt(cdx * cdx + cdy * cdy) > hitR + 8) continue;

          // hit cooldown per resource
          const now = Date.now();
          if (resHitTime[id] && now - resHitTime[id] < HIT_CD) continue;
          resHitTime[id] = now;

          const hp    = d.hp !== undefined ? d.hp : 1;
          const newHp = hp - 1;

          if (newHp <= 0) {
            // destroyed — give loot immediately, clean up locally right away
            const loot = RES_DEF[d.type].loot;
            state[loot]++;
            if (loot === 'food') state.food_meter = Math.min(MAX_FOOD, state.food_meter + 3);
            this.updateHUD();
            g.destroy();
            delete resSpr[id];
            delete resHitTime[id];
            remove(ref(db, 'resources/' + id));
            this.pop(d.x, d.y - 40, '+1 ' + loot, '#000');
          } else {
            // damaged — update Firebase; onChildChanged redraws for all players
            update(ref(db, 'resources/' + id), { hp: newHp });
            this.pop(d.x, d.y - 28, '  *chop*', '#5d4037');
          }
          return true;
        }
        return false;
      }

      tryAtkBldg(ptr) {
        const px = this.pbody.x, py = this.pbody.y;
        for (const [id, g] of Object.entries(bldgSpr)) {
          const d = g._d;
          if (d.ownerId === PID) continue;
          const dx = d.x - px, dy = d.y - py;
          if (Math.sqrt(dx * dx + dy * dy) > ATK_RNG) continue;
          if (Math.abs(ptr.worldX - d.x) < BLDG_SZ / 2 + 6 &&
              Math.abs(ptr.worldY - d.y) < BLDG_SZ / 2 + 6) {
            const newHp = d.hp - ATK_DMG;
            if (newHp <= 0) remove(ref(db, 'buildings/' + id));
            else update(ref(db, 'buildings/' + id), { hp: newHp });
            this.pop(d.x, d.y - 24, '-' + ATK_DMG, '#e74c3c');
            return;
          }
        }
      }

      placeWall(ptr) {
        if (state.wood < WALL_COST) {
          this.pop(this.pbody.x, this.pbody.y - 30, 'Need 5 wood!', '#e74c3c');
          return;
        }
        state.wood -= WALL_COST;
        this.updateHUD();
        const id = 'b_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        set(ref(db, 'buildings/' + id), {
          x: Math.round(ptr.worldX),
          y: Math.round(ptr.worldY),
          type: 'wall', ownerId: PID, hp: BLDG_HP
        });
      }

      pop(x, y, msg, color) {
        const t = this.add.text(x, y, msg, {
          fontSize: '13px', color, fontFamily: 'monospace', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(10);
        this.tweens.add({
          targets: t, y: y - 28, alpha: 0, duration: 900,
          onComplete: () => t.destroy()
        });
      }

      updateHUD() {
        document.getElementById('ui-hp').textContent    = Math.max(0, state.hp);
        document.getElementById('ui-fm').textContent    = state.food_meter;
        document.getElementById('ui-wood').textContent  = state.wood;
        document.getElementById('ui-food').textContent  = state.food;
        document.getElementById('ui-stone').textContent = state.stone;
        document.getElementById('ui-mode').textContent  =
          'Mode: ' + (buildMode ? 'BUILD  (5 wood per wall)' : 'EXPLORE');
      }

      // ── Game loop ─────────────────────────────────────────────────────────────
      update(time, delta) {
        const k = this.keys;
        let vx = 0, vy = 0;
        if (k.left.isDown  || k.left2.isDown)  vx = -SPEED;
        if (k.right.isDown || k.right2.isDown) vx =  SPEED;
        if (k.up.isDown    || k.up2.isDown)    vy = -SPEED;
        if (k.down.isDown  || k.down2.isDown)  vy =  SPEED;
        if (vx && vy) { vx *= 0.707; vy *= 0.707; }
        this.pbody.setVelocity(vx, vy);

        state.x = this.pbody.x;
        state.y = this.pbody.y;
        this.pgfx.setPosition(state.x, state.y);

        if (Phaser.Input.Keyboard.JustDown(k.b)) {
          buildMode = !buildMode;
          bPrev.setVisible(buildMode);
          this.updateHUD();
        }
        if (Phaser.Input.Keyboard.JustDown(k.esc)) {
          buildMode = false;
          bPrev.setVisible(false);
          this.updateHUD();
        }

        if (buildMode) {
          const p = this.input.activePointer;
          bPrev.clear();
          bPrev.fillStyle(0xdfe6e9, 0.55);
          bPrev.fillRect(p.worldX - BLDG_SZ / 2, p.worldY - BLDG_SZ / 2, BLDG_SZ, BLDG_SZ);
          bPrev.lineStyle(2, 0x000000, 1);
          bPrev.strokeRect(p.worldX - BLDG_SZ / 2, p.worldY - BLDG_SZ / 2, BLDG_SZ, BLDG_SZ);
        }

        // hunger drain
        foodTimer += delta;
        if (foodTimer >= FOOD_TICK) {
          foodTimer = 0;
          if (state.food_meter > 0) {
            state.food_meter--;
          } else {
            state.hp = Math.max(0, state.hp - 5);
          }
          this.updateHUD();
        }

        // sync position to Firebase
        if (time - lastSync > SYNC_MS) {
          lastSync = time;
          set(ref(db, 'players/' + PID), {
            x: Math.round(state.x),
            y: Math.round(state.y),
            color: MY_COLOR,
            hp: state.hp
          });
        }
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#ffffff',
      physics: { default: 'arcade', arcade: { debug: false } },
      scene: Game
    });
  </script>
</body>
</html>
