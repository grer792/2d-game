<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Survival</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ece2; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #hud {
      position: fixed; top: 12px; left: 12px;
      background: rgba(20,20,20,0.82); border: 1px solid #444;
      padding: 10px 16px; color: #ddd; font-size: 13px;
      z-index: 20; pointer-events: none; min-width: 200px;
      border-radius: 6px; line-height: 2;
    }
    .stat-row { display: flex; align-items: center; gap: 8px; }
    .bar { flex: 1; height: 7px; background: #333; border-radius: 3px; overflow: hidden; }
    .bar-inner { height: 100%; border-radius: 3px; transition: width .25s; }
    .lbl { width: 54px; font-size: 11px; color: #aaa; }
    .val { width: 28px; text-align: right; font-size: 12px; color: #fff; font-weight: 600; }
    #ui-resources { color: #bbb; font-size: 12px; }
    #ui-resources b { color: #fff; }
    #ui-mode-row { color: #7ec8e3; font-size: 11px; margin-top: 2px; }

    #scores {
      position: fixed; top: 12px; right: 12px;
      background: rgba(20,20,20,0.82); border: 1px solid #444;
      padding: 10px 14px; color: #ddd; font-size: 12px;
      z-index: 20; pointer-events: none; min-width: 150px;
      border-radius: 6px; line-height: 1.9;
    }
    #scores .title { color: #f0c040; font-size: 11px; letter-spacing: 1px; margin-bottom: 4px; }

    #toolbar {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 20;
    }
    .slot {
      width: 54px; height: 54px; background: rgba(20,20,20,0.82);
      border: 2px solid #444; border-radius: 6px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; cursor: pointer; transition: border-color .15s;
      user-select: none;
    }
    .slot:hover { border-color: #888; }
    .slot.active { border-color: #f0c040; background: rgba(40,35,10,0.9); }
    .slot-icon { font-size: 22px; line-height: 1; }
    .slot-label { font-size: 9px; color: #777; margin-top: 2px; letter-spacing: .5px; }
    .slot.active .slot-label { color: #f0c040; }
    .slot-key { font-size: 8px; color: #555; position: absolute; top: 3px; left: 5px; }

    #build-sub {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.9); border: 1px solid #555;
      padding: 8px 16px; border-radius: 6px; display: none;
      gap: 10px; z-index: 20; white-space: nowrap;
    }
    .bopt { display: inline-block; padding: 5px 12px; border-radius: 4px;
      border: 1px solid #555; color: #ccc; font-size: 12px; cursor: pointer; }
    .bopt:hover { border-color: #aaa; color: #fff; }
    .bopt.bsel { border-color: #f0c040; color: #f0c040; }

    #team-panel {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(15,15,15,0.95); border: 1px solid #555;
      padding: 24px 28px; border-radius: 8px; z-index: 30;
      color: #ddd; min-width: 260px;
    }
    #team-panel h3 { color: #f0c040; margin-bottom: 14px; font-size: 15px; }
    #team-panel input {
      width: 100%; padding: 7px 10px; background: #222; border: 1px solid #555;
      color: #fff; border-radius: 4px; font-size: 13px; margin: 8px 0;
      outline: none;
    }
    #team-panel button {
      padding: 7px 14px; border-radius: 4px; border: 1px solid #555;
      background: #333; color: #ccc; cursor: pointer; font-size: 12px; margin: 3px 2px;
    }
    #team-panel button:hover { background: #444; color: #fff; }
    #team-panel .close-btn { float: right; margin-top: -6px; }

    #hint {
      position: fixed; bottom: 80px; right: 12px;
      background: rgba(20,20,20,0.72); border: 1px solid #444;
      padding: 6px 12px; color: #888; font-size: 10px;
      border-radius: 5px; z-index: 20; pointer-events: none;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="stat-row">
    <span class="lbl">Health</span>
    <span class="bar"><span id="hp-bar" class="bar-inner" style="background:#e74c3c;width:100%"></span></span>
    <span class="val" id="ui-hp">100</span>
  </div>
  <div class="stat-row">
    <span class="lbl">Hunger</span>
    <span class="bar"><span id="hunger-bar" class="bar-inner" style="background:#f39c12;width:100%"></span></span>
    <span class="val" id="ui-fm">10</span>
  </div>
  <div id="ui-resources">
    Wood <b id="ui-wood">0</b> &nbsp; Stone <b id="ui-stone">0</b> &nbsp; Food <b id="ui-food">0</b>
  </div>
  <div id="ui-mode-row">Score <b id="ui-score" style="color:#f0c040">0</b> &nbsp; <span id="ui-mode">EXPLORE</span></div>
</div>

<div id="scores">
  <div class="title">LEADERBOARD</div>
  <div id="score-list">—</div>
</div>

<div id="toolbar">
  <div class="slot active" id="slot-0" onclick="selectSlot(0)">
    <div class="slot-icon">🪓</div><div class="slot-label">AXE</div>
  </div>
  <div class="slot" id="slot-1" onclick="selectSlot(1)">
    <div class="slot-icon">⛏</div><div class="slot-label">PICK</div>
  </div>
  <div class="slot" id="slot-2" onclick="selectSlot(2)">
    <div class="slot-icon">📐</div><div class="slot-label">BUILD</div>
  </div>
  <div class="slot" id="slot-3" onclick="selectSlot(3)">
    <div class="slot-icon">✊</div><div class="slot-label">FIST</div>
  </div>
</div>

<div id="build-sub">
  <span class="bopt bsel" id="bopt-wall"     onclick="setBuildType('wall')">    [1] Fence  5🪵</span>
  <span class="bopt"       id="bopt-door"     onclick="setBuildType('door')">    [2] Door   3🪵</span>
  <span class="bopt"       id="bopt-campfire" onclick="setBuildType('campfire')">[3] Fire   3🪵</span>
</div>

<div id="team-panel">
  <button class="close-btn" onclick="closeTeamPanel()">✕</button>
  <h3>TEAM</h3>
  <div style="color:#aaa;font-size:12px">Your team: <b id="tp-current" style="color:#fff">None</b></div>
  <input id="tp-input" maxlength="8" placeholder="Enter team code (e.g. RED)">
  <br>
  <button onclick="joinTeam()">Join / Create</button>
  <button onclick="leaveTeam()">Leave Team</button>
</div>

<div id="hint">
  WASD: move &nbsp; T: team<br>
  Click tree/rock: gather<br>
  Click player: attack<br>
  ESC: cancel
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import {
  getDatabase, ref, set, get, remove, update,
  onChildAdded, onChildChanged, onChildRemoved, onValue
} from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';

const firebaseApp = initializeApp({
  apiKey: 'AIzaSyBQjDeFUKpleEsc2Fl3yZdnNje0cyAGaKU',
  authDomain: 'd-game-b50ef.firebaseapp.com',
  projectId: 'd-game-b50ef',
  storageBucket: 'd-game-b50ef.firebasestorage.app',
  messagingSenderId: '80712714092',
  appId: '1:80712714092:web:4b15f70196f05942905549'
});
const db = getDatabase(firebaseApp);

// ── Constants ────────────────────────────────────────────────────────────────
const PID      = 'p_' + Math.random().toString(36).substr(2, 9);
const PNAME    = PID.substr(-4).toUpperCase();
const PCOLORS  = [0xe74c3c, 0x3498db, 0x9b59b6, 0xf39c12, 0x16a085, 0xe67e22];
const MY_COLOR = PCOLORS[Math.floor(Math.random() * PCOLORS.length)];

const MAP_W    = 3000, MAP_H = 3000;
const SPEED    = 210;
const P_RAD    = 13;
const ATK_RNG  = 80;
const ATK_DMG  = 15;
const SYNC_MS  = 100;
const RES_N    = 55;
const FOOD_TICK = 18000;
const MAX_FOOD = 10;
const MAX_HP   = 100;
const HIT_CD   = 320;
const FIRE_RNG = 70;

const BLDG_HP   = { wall: 120, door: 80, campfire: 50 };
const BLDG_COST = { wall: { wood: 5 }, door: { wood: 3 }, campfire: { wood: 3 } };
const RES_DEF   = {
  tree: { maxHp: 3, loot: 'wood',  hitR: 22 },
  rock: { maxHp: 5, loot: 'stone', hitR: 18 },
  bush: { maxHp: 1, loot: 'food',  hitR: 14 }
};

function seededRand(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 0x100000000; };
}
function teamColor(id) {
  const cols = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6, 0x1abc9c, 0xe67e22];
  let h = 0; for (const c of id) h = h * 31 + c.charCodeAt(0);
  return cols[Math.abs(h) % cols.length];
}
function lerpColor(a, b, t) {
  const ar = (a >> 16) & 0xff, ag = (a >> 8) & 0xff, ab = a & 0xff;
  const br = (b >> 16) & 0xff, bg = (b >> 8) & 0xff, bb = b & 0xff;
  return ((ar + (br-ar)*t) << 16) | ((ag + (bg-ag)*t) << 8) | (ab + (bb-ab)*t);
}

// ── Shared state ─────────────────────────────────────────────────────────────
const state = {
  x: 400 + Math.random() * (MAP_W - 800),
  y: 400 + Math.random() * (MAP_H - 800),
  hp: MAX_HP, food_meter: MAX_FOOD,
  wood: 0, food: 0, stone: 0, score: 0,
  teamId: null, dirX: 0, dirY: -1,
  prevX: 0, prevY: 0
};

const others     = {};  // pid → { g, nameGfx }
const playerData = {};  // pid → latest Firebase data
const resSpr     = {};  // id  → gfx
const bldgSpr    = {};  // id  → gfx
const resHitTime = {};

window._gameState  = state;
window._db         = db;
window._PID        = PID;
window._PNAME      = PNAME;

let selectedSlot = 0;
let buildMode    = false;
let buildType    = 'wall';
let bPrev;
let foodTimer  = 0;
let fireTimer  = 0;
let lastSync   = 0;

// ── Toolbar interaction (called from HTML) ────────────────────────────────────
window.selectSlot = function(n) {
  selectedSlot = n;
  document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === n));
  if (n === 2) {
    buildMode = true;
    document.getElementById('build-sub').style.display = 'flex';
  } else {
    buildMode = false;
    document.getElementById('build-sub').style.display = 'none';
    if (bPrev) bPrev.setVisible(false);
  }
  if (window._scene) window._scene.updateHUD();
};

window.setBuildType = function(t) {
  buildType = t;
  document.querySelectorAll('.bopt').forEach(el => el.classList.remove('bsel'));
  document.getElementById('bopt-' + t).classList.add('bsel');
};

window.openTeamPanel = function() {
  document.getElementById('tp-current').textContent = state.teamId || 'None';
  document.getElementById('team-panel').style.display = 'block';
};
window.closeTeamPanel = function() {
  document.getElementById('team-panel').style.display = 'none';
};
window.joinTeam = function() {
  const code = document.getElementById('tp-input').value.trim().toUpperCase().substr(0,8);
  if (!code) return;
  state.teamId = code;
  document.getElementById('tp-current').textContent = code;
};
window.leaveTeam = function() {
  state.teamId = null;
  document.getElementById('tp-current').textContent = 'None';
};

// ── Phaser Scene ──────────────────────────────────────────────────────────────
class Game extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    window._scene = this;
    const mk = (key, w, h, col = 0xffffff) => {
      const g = this.make.graphics({ add: false });
      g.fillStyle(col, 1).fillRect(0, 0, w, h);
      g.generateTexture(key, w, h); g.destroy();
    };
    mk('body', P_RAD * 2, P_RAD * 2);

    this.physics.world.setBounds(0, 0, MAP_W, MAP_H);
    this.cameras.main.setBounds(0, 0, MAP_W, MAP_H);

    this.drawTerrain();

    this.pbody = this.physics.add.image(state.x, state.y, 'body');
    this.pbody.setAlpha(0.001).setCollideWorldBounds(true);

    this.pgfx = this.add.graphics();
    this.nameTag = this.add.text(0, 0, PNAME, {
      fontSize: '11px', color: '#fff',
      stroke: '#000', strokeThickness: 3,
      fontFamily: 'Segoe UI'
    }).setOrigin(0.5).setDepth(99000);

    this.redrawMe();
    this.cameras.main.startFollow(this.pbody, true, 0.1, 0.1);

    bPrev = this.add.graphics().setDepth(98000).setVisible(false);

    this.keys = this.input.keyboard.addKeys({
      up:'W', dn:'S', lt:'A', rt:'D',
      up2:'UP', dn2:'DOWN', lt2:'LEFT', rt2:'RIGHT',
      esc:'ESC', t:'T',
      k1: Phaser.Input.Keyboard.KeyCodes.ONE,
      k2: Phaser.Input.Keyboard.KeyCodes.TWO,
      k3: Phaser.Input.Keyboard.KeyCodes.THREE,
      k4: Phaser.Input.Keyboard.KeyCodes.FOUR
    });

    this.input.on('pointerdown', ptr => this.handleClick(ptr));
    this.setupFirebase();
    window.addEventListener('beforeunload', () => remove(ref(db, 'players/' + PID)));
    this.updateHUD();
  }

  // ── Terrain ───────────────────────────────────────────────────────────────
  drawTerrain() {
    const bg = this.add.graphics().setDepth(-10);
    bg.fillStyle(0xf5f1e8, 1).fillRect(0, 0, MAP_W, MAP_H);

    const r = seededRand(9182);
    // scattered ground patches — grass, sand, dirt
    const patches = [
      { n:100, col:0xe8dfc8, minR:50, maxR:160 },
      { n:70,  col:0xd9cfb4, minR:30, maxR:90  },
      { n:50,  col:0xc8bc9c, minR:20, maxR:60  },
      { n:30,  col:0xe2d8bc, minR:15, maxR:45  },
    ];
    patches.forEach(({ n, col, minR, maxR }) => {
      bg.fillStyle(col, 1);
      for (let i = 0; i < n; i++) {
        const x  = r() * MAP_W, y  = r() * MAP_H;
        const rx = minR + r() * (maxR - minR);
        bg.fillEllipse(x, y, rx * 2, rx * (0.55 + r() * 0.6));
      }
    });

    // pebble dots
    bg.fillStyle(0xc0b898, 1);
    for (let i = 0; i < 400; i++) bg.fillCircle(r() * MAP_W, r() * MAP_H, 1.5 + r() * 2);

    // subtle grid
    const grid = this.add.graphics().setDepth(-9);
    grid.lineStyle(1, 0xe0d8c8, 0.6);
    for (let x = 0; x <= MAP_W; x += 60) { grid.moveTo(x,0); grid.lineTo(x, MAP_H); }
    for (let y = 0; y <= MAP_H; y += 60) { grid.moveTo(0,y); grid.lineTo(MAP_W, y); }
    grid.strokePath();
  }

  // ── Character drawing ─────────────────────────────────────────────────────
  redrawMe() {
    const g = this.pgfx;
    g.clear();

    const ang = Math.atan2(state.dirY, state.dirX);
    const hx = Math.cos(ang) * (P_RAD - 1), hy = Math.sin(ang) * (P_RAD - 1);

    // shadow
    g.fillStyle(0x000000, 0.18).fillEllipse(2, P_RAD + 5, P_RAD * 2.4, 8);

    // body — main fill
    g.fillStyle(MY_COLOR, 1).fillCircle(0, 0, P_RAD);
    // subtle inner highlight
    g.fillStyle(lerpColor(MY_COLOR, 0xffffff, 0.35), 0.5).fillCircle(-3, -3, P_RAD * 0.55);
    g.lineStyle(2.5, 0x000000, 0.85).strokeCircle(0, 0, P_RAD);

    // team ring
    if (state.teamId) {
      const tc = teamColor(state.teamId);
      g.lineStyle(3, tc, 0.85).strokeCircle(0, 0, P_RAD + 4);
    }

    // head
    g.fillStyle(0xf5d5a5, 1).fillCircle(hx, hy, 7);
    g.lineStyle(1.5, 0xc49060, 0.9).strokeCircle(hx, hy, 7);

    // eyes
    const r1 = ang + 0.55, r2 = ang - 0.55;
    g.fillStyle(0x222222, 1);
    g.fillCircle(hx + Math.cos(r1) * 3.2, hy + Math.sin(r1) * 3.2, 1.6);
    g.fillCircle(hx + Math.cos(r2) * 3.2, hy + Math.sin(r2) * 3.2, 1.6);

    // tool in hand
    const tx = Math.cos(ang) * (P_RAD + 10), ty = Math.sin(ang) * (P_RAD + 10);
    const pa = ang + Math.PI / 2;
    if (selectedSlot === 0) {        // axe
      g.fillStyle(0x8b5e3c, 1).fillRect(tx - 2, ty - 9, 4, 16);
      g.fillStyle(0x9ba8b2, 1);
      g.fillTriangle(tx - 7, ty - 9, tx + 5, ty - 9, tx + 1, ty - 2);
      g.lineStyle(1, 0x6a7a80, 1);
      g.strokeTriangle(tx - 7, ty - 9, tx + 5, ty - 9, tx + 1, ty - 2);
    } else if (selectedSlot === 1) { // pickaxe
      g.fillStyle(0x8b5e3c, 1).fillRect(tx - 2, ty - 8, 4, 14);
      g.fillStyle(0x8796a0, 1);
      g.fillRect(tx - 7, ty - 10, 14, 4);
      g.fillTriangle(tx - 7, ty - 6, tx - 1, ty - 6, tx - 7, ty + 2);
    } else if (selectedSlot === 2) { // blueprint
      g.fillStyle(0x2d7fc9, 0.9).fillRect(tx - 6, ty - 8, 12, 14);
      g.lineStyle(1, 0x87ceeb, 0.7);
      g.moveTo(tx-4, ty-5); g.lineTo(tx+4, ty-5);
      g.moveTo(tx-4, ty-1); g.lineTo(tx+4, ty-1);
      g.moveTo(tx-4, ty+3); g.lineTo(tx+4, ty+3);
      g.strokePath();
      g.lineStyle(1.5, 0x1a5c99, 1).strokeRect(tx-6, ty-8, 12, 14);
    }
    // slot 3 = fist = no tool drawn
  }

  drawOther(gfx, d) {
    gfx.clear();
    const { x, y, color, teamId: tid } = d;
    const c = color || 0x888888;
    const friendly = state.teamId && tid === state.teamId;
    const enemy    = tid && tid !== state.teamId;

    gfx.fillStyle(0x000000, 0.15).fillEllipse(x + 2, y + P_RAD + 5, P_RAD * 2.4, 8);
    gfx.fillStyle(c, 1).fillCircle(x, y, P_RAD);
    gfx.fillStyle(lerpColor(c, 0xffffff, 0.35), 0.5).fillCircle(x - 3, y - 3, P_RAD * 0.55);
    gfx.lineStyle(2.5, 0x000000, 0.85).strokeCircle(x, y, P_RAD);
    if (tid) {
      const ring = friendly ? 0x2ecc71 : (enemy ? 0xe74c3c : teamColor(tid));
      gfx.lineStyle(3, ring, 0.85).strokeCircle(x, y, P_RAD + 4);
    }
    // small face
    gfx.fillStyle(0xf5d5a5, 1).fillCircle(x, y - P_RAD + 1, 6);
    gfx.lineStyle(1, 0xc49060, 0.7).strokeCircle(x, y - P_RAD + 1, 6);
  }

  drawRes(gfx, d) {
    const { x, y, type } = d;
    const hp = d.hp !== undefined ? d.hp : 1;
    const maxHp = d.maxHp !== undefined ? d.maxHp : 1;
    const ratio = maxHp > 0 ? hp / maxHp : 1;
    gfx.clear();

    if (type === 'tree') {
      // shadow on ground
      gfx.fillStyle(0x000000, 0.12).fillEllipse(x + 4, y + 20, 40, 14);
      // trunk
      gfx.fillStyle(0x5c3a1a, 1).fillRect(x - 5, y + 4, 10, 20);
      gfx.fillStyle(0x7a4e2a, 1).fillRect(x - 3, y + 4, 4, 18); // highlight edge
      gfx.lineStyle(1.5, 0x3a2008, 1).strokeRect(x - 5, y + 4, 10, 20);
      // canopy — three overlapping circles for depth
      const dark  = ratio > 0.6 ? 0x2a6e2a : 0x7a7210;
      const mid   = ratio > 0.6 ? 0x388e38 : 0x9a9218;
      const light = ratio > 0.6 ? 0x4caf50 : 0xb8b030;
      gfx.fillStyle(dark,  1).fillCircle(x - 7, y - 2, 16);
      gfx.fillStyle(dark,  1).fillCircle(x + 7, y,     14);
      gfx.fillStyle(mid,   1).fillCircle(x,     y - 6, 19);
      gfx.fillStyle(light, 1).fillCircle(x - 1, y - 15, 11);
      gfx.lineStyle(2, 0x1a4a1a, 1).strokeCircle(x, y - 6, 19);

    } else if (type === 'rock') {
      gfx.fillStyle(0x000000, 0.14).fillEllipse(x + 4, y + 16, 40, 13);
      // three boulder shapes
      gfx.fillStyle(0x9aacb8, 1).fillCircle(x - 2, y,     15);
      gfx.fillStyle(0xaebecb, 1).fillCircle(x + 9, y - 1, 11);
      gfx.fillStyle(0x8898a4, 1).fillCircle(x - 1, y + 6, 10);
      // highlight
      gfx.fillStyle(0xcad8e0, 1).fillCircle(x - 7, y - 6,  5);
      gfx.lineStyle(2, 0x5a6a76, 1).strokeCircle(x - 2, y, 15);
      if (ratio < 0.8) {
        gfx.lineStyle(1.5, 0x546070, 1);
        gfx.beginPath();
        gfx.moveTo(x - 5, y - 8); gfx.lineTo(x + 2, y + 5);
        gfx.moveTo(x + 3, y - 3); gfx.lineTo(x + 9, y + 3);
        gfx.strokePath();
      }

    } else { // bush
      gfx.fillStyle(0x000000, 0.12).fillEllipse(x + 2, y + 15, 30, 10);
      gfx.fillStyle(0x27863a, 1).fillCircle(x - 7, y + 1,  10);
      gfx.fillStyle(0x2fa347, 1).fillCircle(x + 6, y + 1,  10);
      gfx.fillStyle(0x38c057, 1).fillCircle(x,     y - 4,  12);
      gfx.lineStyle(1.5, 0x1a5c28, 1).strokeCircle(x, y - 4, 12);
      gfx.fillStyle(0xc0392b, 1);
      gfx.fillCircle(x - 4, y - 2, 2.8);
      gfx.fillCircle(x + 4, y - 6, 2.8);
      gfx.fillCircle(x + 1, y + 2, 2.2);
    }

    // HP bar if damaged
    if (hp < maxHp) {
      const bw = 30;
      gfx.fillStyle(0x27ae60, 1).fillRect(x - bw/2, y - 36, bw * ratio, 4);
      gfx.fillStyle(0xc0392b, 1).fillRect(x - bw/2 + bw*ratio, y - 36, bw*(1-ratio), 4);
      gfx.lineStyle(1, 0x000000, 0.5).strokeRect(x - bw/2, y - 36, bw, 4);
    }
  }

  drawBldg(gfx, d) {
    const { x, y, type, hp, ownerId } = d;
    const maxHp = BLDG_HP[type] || 100;
    const hpR   = Math.max(0, hp / maxHp);
    const mine  = ownerId === PID;
    gfx.clear();

    if (type === 'wall') {
      // fence: two posts + two rails
      const postCol = mine ? 0xb5834a : 0x8b6042;
      const railCol = mine ? 0xd4a96a : 0xa07852;
      const dark    = mine ? 0x7a5228 : 0x5a3820;
      // posts
      gfx.fillStyle(postCol, 1);
      gfx.fillRoundedRect(x - 20, y - 13, 7, 26, 3);
      gfx.fillRoundedRect(x + 13, y - 13, 7, 26, 3);
      gfx.lineStyle(1.5, dark, 1);
      gfx.strokeRoundedRect(x - 20, y - 13, 7, 26, 3);
      gfx.strokeRoundedRect(x + 13, y - 13, 7, 26, 3);
      // rails
      gfx.fillStyle(railCol, 1);
      gfx.fillRoundedRect(x - 15, y - 9,  30, 5, 2);
      gfx.fillRoundedRect(x - 15, y + 4,  30, 5, 2);
      gfx.lineStyle(1, dark, 0.7);
      gfx.strokeRoundedRect(x - 15, y - 9, 30, 5, 2);
      gfx.strokeRoundedRect(x - 15, y + 4, 30, 5, 2);

    } else if (type === 'door') {
      const frame = mine ? 0x8b6042 : 0x5d3820;
      const panel = mine ? 0xd4a96a : 0xa07852;
      const dark  = mine ? 0x5a3820 : 0x3d2010;
      gfx.fillStyle(frame, 1).fillRect(x - 17, y - 20, 34, 40);
      gfx.fillStyle(panel, 1).fillRect(x - 12, y - 17, 24, 34);
      // planks
      gfx.lineStyle(1, dark, 0.5);
      for (let row = y - 13; row < y + 14; row += 8) {
        gfx.moveTo(x - 10, row); gfx.lineTo(x + 10, row);
      }
      gfx.moveTo(x - 10, y - 17); gfx.lineTo(x + 10, y + 17); // brace
      gfx.strokePath();
      gfx.fillStyle(0xf0c040, 1).fillCircle(mine ? x + 8 : x - 8, y, 3); // handle
      gfx.lineStyle(2, dark, 1).strokeRect(x - 17, y - 20, 34, 40);
      if (mine) { // owner tag: small green dot
        gfx.fillStyle(0x27ae60, 0.8).fillCircle(x, y - 25, 4);
      }

    } else if (type === 'campfire') {
      // stone ring
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        gfx.fillStyle(0x8796a0, 1).fillCircle(x + Math.cos(a) * 14, y + Math.sin(a) * 14, 5.5);
        gfx.lineStyle(1, 0x4a5560, 1).strokeCircle(x + Math.cos(a) * 14, y + Math.sin(a) * 14, 5.5);
      }
      // coals / embers
      gfx.fillStyle(0x3d1a08, 1).fillEllipse(x, y, 20, 12);
      gfx.fillStyle(0xb03010, 0.8).fillEllipse(x - 2, y, 12, 7);
      // fire layers
      gfx.fillStyle(0xd44000, 1).fillTriangle(x - 8, y + 2,  x + 8, y + 2,  x - 2, y - 14);
      gfx.fillStyle(0xf06020, 1).fillTriangle(x - 6, y + 2,  x + 6, y + 2,  x + 2, y - 18);
      gfx.fillStyle(0xf8a020, 1).fillTriangle(x - 4, y + 1,  x + 4, y + 1,  x,     y - 14);
      gfx.fillStyle(0xffd040, 1).fillTriangle(x - 2, y,      x + 2, y,      x,     y - 8);
    }

    // HP bar
    gfx.fillStyle(0x27ae60, 1).fillRect(x - 20, y - 30, 40 * hpR,     4);
    gfx.fillStyle(0xc0392b, 1).fillRect(x - 20 + 40*hpR, y - 30, 40*(1-hpR), 4);
    gfx.lineStyle(1, 0x000000, 0.4).strokeRect(x - 20, y - 30, 40, 4);
  }

  // ── Spawn helpers ────────────────────────────────────────────────────────────
  mkRes(id, d)  { const g = this.add.graphics().setDepth(d.y); this.drawRes(g,d); g._d=d; resSpr[id]=g; }
  rxRes(id, d)  { if (!resSpr[id]) return; resSpr[id]._d=d; this.drawRes(resSpr[id],d); }

  mkOther(id, d) {
    const g = this.add.graphics().setDepth(d.y);
    this.drawOther(g, d);
    const l = this.add.text(d.x, d.y - P_RAD - 15, d.name || id.substr(-4).toUpperCase(), {
      fontSize: '11px', color: '#fff', stroke: '#000', strokeThickness: 3,
      fontFamily: 'Segoe UI'
    }).setOrigin(0.5).setDepth(d.y + 1);
    others[id] = { g, l }; playerData[id] = d;
  }
  mvOther(id, d) {
    playerData[id] = d;
    if (!others[id]) { this.mkOther(id,d); return; }
    others[id].g.setDepth(d.y); this.drawOther(others[id].g, d);
    others[id].l.setPosition(d.x, d.y - P_RAD - 15).setDepth(d.y + 1);
    this.updateScoreboard();
  }

  mkBldg(id, d) { const g = this.add.graphics().setDepth(d.y + 5); this.drawBldg(g,d); g._d=d; bldgSpr[id]=g; }
  rxBldg(id, d) { if (!bldgSpr[id]) return; bldgSpr[id]._d=d; this.drawBldg(bldgSpr[id],d); }

  seedMap() {
    const batch = {};
    Object.keys(RES_DEF).forEach(type => {
      const maxHp = RES_DEF[type].maxHp;
      for (let i = 0; i < RES_N; i++) {
        batch[type + '_' + i] = {
          x: 150 + Math.random() * (MAP_W - 300),
          y: 150 + Math.random() * (MAP_H - 300),
          type, hp: maxHp, maxHp
        };
      }
    });
    set(ref(db, 'resources'), batch);
  }

  // ── Firebase ─────────────────────────────────────────────────────────────────
  setupFirebase() {
    const sc = this;

    get(ref(db, 'resources')).then(snap => {
      const val = snap.val(), keys = val ? Object.keys(val) : [];
      if (keys.length < 10 || (keys.length && val[keys[0]].hp === undefined))
        remove(ref(db, 'resources')).then(() => sc.seedMap());
    });

    onChildAdded(ref(db,'resources'),   s => { if (s.val()&&!resSpr[s.key])   sc.mkRes(s.key,s.val()); });
    onChildChanged(ref(db,'resources'), s => { if (s.val()&&resSpr[s.key])    sc.rxRes(s.key,s.val()); });
    onChildRemoved(ref(db,'resources'), s => { if (resSpr[s.key]) { resSpr[s.key].destroy(); delete resSpr[s.key]; } });

    onChildAdded(ref(db,'players'),   s => { if (s.key!==PID&&s.val()) sc.mkOther(s.key,s.val()); });
    onChildChanged(ref(db,'players'), s => { if (s.key!==PID&&s.val()) sc.mvOther(s.key,s.val()); });
    onChildRemoved(ref(db,'players'), s => {
      if (others[s.key]) { others[s.key].g.destroy(); others[s.key].l.destroy(); delete others[s.key]; }
      delete playerData[s.key]; sc.updateScoreboard();
    });

    onChildAdded(ref(db,'buildings'),   s => { if (s.val()&&!bldgSpr[s.key]) sc.mkBldg(s.key,s.val()); });
    onChildChanged(ref(db,'buildings'), s => { if (s.val()&&bldgSpr[s.key])  sc.rxBldg(s.key,s.val()); });
    onChildRemoved(ref(db,'buildings'), s => { if (bldgSpr[s.key]) { bldgSpr[s.key].destroy(); delete bldgSpr[s.key]; } });

    // incoming damage queue
    onChildAdded(ref(db, 'players/' + PID + '/hits'), snap => {
      if (!snap.val()) return;
      const { dmg } = snap.val();
      state.hp = Math.max(0, state.hp - dmg);
      sc.updateHUD(); sc.redrawMe();
      sc.pop(state.x, state.y - 24, '-' + dmg + ' HP', '#e74c3c');
      remove(ref(db, 'players/' + PID + '/hits/' + snap.key));
      if (state.hp <= 0) sc.handleDeath();
    });
  }

  // ── Click handling ─────────────────────────────────────────────────────────
  handleClick(ptr) {
    if (buildMode)           { this.placeBuilding(ptr); return; }
    if (this.tryHitRes(ptr)) return;
    if (this.tryAtkPlayer(ptr)) return;
    this.tryAtkBldg(ptr);
  }

  tryHitRes(ptr) {
    const px = this.pbody.x, py = this.pbody.y;
    for (const [id, g] of Object.entries(resSpr)) {
      const d = g._d;
      if (!d || !RES_DEF[d.type]) continue;
      const pdx = d.x - px, pdy = d.y - py;
      if (Math.sqrt(pdx*pdx + pdy*pdy) > ATK_RNG + 30) continue;
      const cy  = d.type === 'tree' ? d.y - 6 : d.y;
      const cdx = ptr.worldX - d.x, cdy = ptr.worldY - cy;
      if (Math.sqrt(cdx*cdx + cdy*cdy) > RES_DEF[d.type].hitR + 8) continue;
      const now = Date.now();
      if (resHitTime[id] && now - resHitTime[id] < HIT_CD) continue;
      resHitTime[id] = now;

      const hp = d.hp !== undefined ? d.hp : 1;
      if (hp - 1 <= 0) {
        const loot = RES_DEF[d.type].loot;
        state[loot]++; state.score++;
        if (loot === 'food') state.food_meter = Math.min(MAX_FOOD, state.food_meter + 3);
        this.updateHUD();
        g.destroy(); delete resSpr[id]; delete resHitTime[id];
        remove(ref(db, 'resources/' + id));
        this.pop(d.x, d.y - 44, '+1 ' + loot, '#a8d8a8');
      } else {
        update(ref(db, 'resources/' + id), { hp: hp - 1 });
        this.pop(d.x, d.y - 32, '  hit!', '#8b5e3c');
      }
      return true;
    }
    return false;
  }

  tryAtkPlayer(ptr) {
    if (selectedSlot !== 3 && selectedSlot !== 0) return false; // only fist or axe attacks players
    const px = this.pbody.x, py = this.pbody.y;
    for (const [id, od] of Object.entries(playerData)) {
      if (state.teamId && od.teamId === state.teamId) continue; // no friendly fire
      const dx = od.x - px, dy = od.y - py;
      if (Math.sqrt(dx*dx + dy*dy) > ATK_RNG) continue;
      const cdx = ptr.worldX - od.x, cdy = ptr.worldY - od.y;
      if (Math.sqrt(cdx*cdx + cdy*cdy) < P_RAD + 10) {
        set(ref(db, 'players/' + id + '/hits/' + Date.now()), { dmg: ATK_DMG, from: PID });
        state.score += 5; this.updateHUD();
        this.pop(od.x, od.y - 24, '-' + ATK_DMG, '#e74c3c');
        return true;
      }
    }
    return false;
  }

  tryAtkBldg(ptr) {
    const px = this.pbody.x, py = this.pbody.y;
    for (const [id, g] of Object.entries(bldgSpr)) {
      const d = g._d;
      if (d.ownerId === PID) continue;
      const dx = d.x - px, dy = d.y - py;
      if (Math.sqrt(dx*dx + dy*dy) > ATK_RNG) continue;
      if (Math.abs(ptr.worldX - d.x) < 22 && Math.abs(ptr.worldY - d.y) < 22) {
        const newHp = d.hp - ATK_DMG;
        if (newHp <= 0) {
          remove(ref(db, 'buildings/' + id));
          state.score += 10; this.updateHUD();
          this.pop(d.x, d.y - 26, 'DESTROYED!', '#e74c3c');
        } else {
          update(ref(db, 'buildings/' + id), { hp: newHp });
          this.pop(d.x, d.y - 22, '-' + ATK_DMG, '#e74c3c');
        }
        return;
      }
    }
  }

  placeBuilding(ptr) {
    const cost = BLDG_COST[buildType];
    for (const [res, amt] of Object.entries(cost)) {
      if (state[res] < amt) {
        this.pop(this.pbody.x, this.pbody.y - 30, `Need ${amt} ${res}!`, '#e74c3c');
        return;
      }
    }
    for (const [res, amt] of Object.entries(cost)) state[res] -= amt;
    state.score += 3; this.updateHUD();
    const id = buildType[0] + '_' + Date.now() + '_' + Math.random().toString(36).substr(2,3);
    set(ref(db, 'buildings/' + id), {
      x: Math.round(ptr.worldX), y: Math.round(ptr.worldY),
      type: buildType, ownerId: PID, hp: BLDG_HP[buildType]
    });
  }

  // ── Wall collision ────────────────────────────────────────────────────────
  resolveWalls() {
    let px = this.pbody.x, py = this.pbody.y;
    for (const g of Object.values(bldgSpr)) {
      const d = g._d;
      if (d.type !== 'wall' && d.type !== 'door') continue;
      if (d.type === 'door' && d.ownerId === PID) continue;
      const hw = d.type === 'wall' ? 20 : 17;
      const hh = d.type === 'wall' ? 13 : 20;
      const nearX = Math.max(d.x - hw, Math.min(px, d.x + hw));
      const nearY = Math.max(d.y - hh, Math.min(py, d.y + hh));
      const dx = px - nearX, dy = py - nearY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < P_RAD && dist > 0.01) {
        const push = P_RAD - dist;
        px += (dx / dist) * push;
        py += (dy / dist) * push;
      }
    }
    px = Math.max(P_RAD, Math.min(MAP_W - P_RAD, px));
    py = Math.max(P_RAD, Math.min(MAP_H - P_RAD, py));
    this.pbody.setPosition(px, py);
  }

  handleDeath() {
    state.wood  = Math.floor(state.wood  * 0.5);
    state.stone = Math.floor(state.stone * 0.5);
    state.food  = Math.floor(state.food  * 0.5);
    state.hp = MAX_HP;
    state.x = 400 + Math.random() * (MAP_W - 800);
    state.y = 400 + Math.random() * (MAP_H - 800);
    this.pbody.setPosition(state.x, state.y);
    this.cameras.main.centerOn(state.x, state.y);
    this.updateHUD();
    this.pop(state.x, state.y, 'RESPAWNED  (lost 50% resources)', '#ffffff');
  }

  pop(x, y, msg, color) {
    const t = this.add.text(x, y, msg, {
      fontSize: '13px', color,
      stroke: '#000', strokeThickness: 2,
      fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(99999);
    this.tweens.add({ targets: t, y: y - 34, alpha: 0, duration: 1000, onComplete: () => t.destroy() });
  }

  updateHUD() {
    document.getElementById('hp-bar').style.width     = (state.hp / MAX_HP * 100) + '%';
    document.getElementById('hunger-bar').style.width = (state.food_meter / MAX_FOOD * 100) + '%';
    document.getElementById('ui-hp').textContent    = Math.max(0, Math.round(state.hp));
    document.getElementById('ui-fm').textContent    = state.food_meter;
    document.getElementById('ui-wood').textContent  = state.wood;
    document.getElementById('ui-stone').textContent = state.stone;
    document.getElementById('ui-food').textContent  = state.food;
    document.getElementById('ui-score').textContent = state.score;
    const teamLabel = state.teamId ? ` [${state.teamId}]` : '';
    document.getElementById('ui-mode').textContent  = buildMode ? 'BUILD: ' + buildType.toUpperCase() : ('EXPLORE' + teamLabel);
    this.updateScoreboard();
  }

  updateScoreboard() {
    const all = [
      { name: PNAME + (state.teamId ? ` [${state.teamId}]` : ''), score: state.score, me: true },
      ...Object.entries(playerData).map(([id, d]) => ({
        name: (d.name || id.substr(-4).toUpperCase()) + (d.teamId ? ` [${d.teamId}]` : ''),
        score: d.score || 0, me: false
      }))
    ].sort((a,b) => b.score - a.score).slice(0, 7);
    document.getElementById('score-list').innerHTML =
      all.map(p => `<div style="color:${p.me?'#7ec8e3':'#ccc'}">${p.name}: <b style="color:${p.me?'#f0c040':'#fff'}">${p.score}</b></div>`).join('');
  }

  // ── Main loop ─────────────────────────────────────────────────────────────
  update(time, delta) {
    const k = this.keys;

    let vx = 0, vy = 0;
    if (k.lt.isDown  || k.lt2.isDown)  vx = -SPEED;
    if (k.rt.isDown  || k.rt2.isDown)  vx =  SPEED;
    if (k.up.isDown  || k.up2.isDown)  vy = -SPEED;
    if (k.dn.isDown  || k.dn2.isDown)  vy =  SPEED;
    if (vx && vy) { vx *= 0.707; vy *= 0.707; }
    this.pbody.setVelocity(vx, vy);

    if (vx !== 0 || vy !== 0) {
      const len = Math.sqrt(vx*vx + vy*vy);
      state.dirX = vx / len; state.dirY = vy / len;
      this.redrawMe();
    }

    this.resolveWalls();

    state.x = this.pbody.x; state.y = this.pbody.y;

    // Y-sort depth for player
    const depth = state.y;
    this.pgfx.setPosition(state.x, state.y).setDepth(depth);
    this.nameTag.setPosition(state.x, state.y - P_RAD - 15).setDepth(depth + 1);

    // keyboard shortcuts
    if (Phaser.Input.Keyboard.JustDown(k.esc)) {
      selectSlot(selectedSlot === 2 ? 0 : selectedSlot);
    }
    if (Phaser.Input.Keyboard.JustDown(k.t)) {
      const tp = document.getElementById('team-panel');
      tp.style.display = tp.style.display === 'none' ? 'block' : 'none';
      if (tp.style.display === 'block') document.getElementById('tp-current').textContent = state.teamId || 'None';
    }
    if (Phaser.Input.Keyboard.JustDown(k.k1)) selectSlot(0);
    if (Phaser.Input.Keyboard.JustDown(k.k2)) selectSlot(1);
    if (Phaser.Input.Keyboard.JustDown(k.k3)) selectSlot(2);
    if (Phaser.Input.Keyboard.JustDown(k.k4)) selectSlot(3);

    // build preview ghost
    if (buildMode) {
      const p = this.input.activePointer;
      bPrev.clear().setVisible(true);
      if (buildType === 'campfire') {
        bPrev.fillStyle(0xf06020, 0.35).fillCircle(p.worldX, p.worldY, 18);
        bPrev.lineStyle(2, 0xf06020, 0.7).strokeCircle(p.worldX, p.worldY, 18);
      } else if (buildType === 'door') {
        bPrev.fillStyle(0xd4a96a, 0.35).fillRect(p.worldX-17, p.worldY-20, 34, 40);
        bPrev.lineStyle(2, 0xd4a96a, 0.7).strokeRect(p.worldX-17, p.worldY-20, 34, 40);
      } else {
        bPrev.fillStyle(0xd4a96a, 0.35);
        bPrev.fillRoundedRect(p.worldX-20, p.worldY-13, 40, 26, 3);
        bPrev.lineStyle(2, 0xd4a96a, 0.7);
        bPrev.strokeRoundedRect(p.worldX-20, p.worldY-13, 40, 26, 3);
      }
    } else if (bPrev) { bPrev.setVisible(false); }

    // campfire healing
    fireTimer += delta;
    if (fireTimer >= 1600) {
      fireTimer = 0;
      if (state.hp < MAX_HP) {
        for (const g of Object.values(bldgSpr)) {
          const d = g._d;
          if (d.type !== 'campfire') continue;
          const dx = d.x - state.x, dy = d.y - state.y;
          if (Math.sqrt(dx*dx + dy*dy) < FIRE_RNG) {
            state.hp = Math.min(MAX_HP, state.hp + 2);
            this.updateHUD(); this.redrawMe();
            this.pop(state.x, state.y - 28, '+2 HP', '#f8a020');
            break;
          }
        }
      }
    }

    // hunger
    foodTimer += delta;
    if (foodTimer >= FOOD_TICK) {
      foodTimer = 0;
      if (state.food_meter > 0) {
        state.food_meter--;
      } else {
        state.hp = Math.max(0, state.hp - 5);
        if (state.hp <= 0) this.handleDeath();
      }
      this.updateHUD(); this.redrawMe();
    }

    // Firebase sync
    if (time - lastSync > SYNC_MS) {
      lastSync = time;
      set(ref(db, 'players/' + PID), {
        x: Math.round(state.x), y: Math.round(state.y),
        color: MY_COLOR, hp: state.hp,
        score: state.score, name: PNAME,
        teamId: state.teamId || null
      });
    }
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: '#f5f1e8',
  physics: { default: 'arcade', arcade: { debug: false } },
  scene: Game
});
</script>
</body>
